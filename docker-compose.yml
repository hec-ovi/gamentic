name: gamentic

# The Gamentic stack (run from the repo root: docker compose up -d --build).
# Config lives in ./.env (cp .env.example .env on first run).
# Services:
#   llm-text  - Gemma 4 26B-A4B MoE Heretic (Q4) via llama.cpp server, Vulkan backend (AMD Strix Halo APU)
#   image     - ComfyUI (ROCm / TheRock 7.13)  [added from the ComfyUI repo]
#   llm-voice - Maya1-3B (Q4) via llama.cpp server, Vulkan backend (SNAC token generation)
#   voice-api - decodes Maya1's SNAC tokens to audio on CPU, owns the /voice contract
#
# Config lives in .env. Models are mounted read-only from MODELS_DIR.
#
# ANNA MODE (one boolean in .env): the five local-inference services above carry the
# profile "local-inference-anna-${ANNA}", the two Anna services (anna-agent,
# anna-api) carry "anna-agent-anna-${ANNA}", and .env pins
# COMPOSE_PROFILES=local-inference-anna-false,anna-agent-anna-true. So with
# ANNA=false the local profile names match and the full local stack runs; with
# ANNA=true they don't, and `docker compose up` brings up orchestrator + frontend
# + anna-agent + anna-api (text goes through the Anna agent, image degrades to
# text-only play, voice is off). Nothing GPU or inference-shaped starts. Flip ANNA
# back and the same command restores the local stack: expansion, not restriction.
# ./up.sh wraps all of this including the mode-flip cleanup.
# Two rules of the trick: (1) ANNA takes the LITERAL values true/false only: the
# app reads any other set value as on, but compose profiles match only the
# literals, so a value like ANNA=1 starts NO inference services at all (up.sh
# refuses such values loudly); (2) when switching modes on a RUNNING stack,
# `docker compose down` BEFORE flipping ANNA in .env - down only sees the active
# profile, so a flip-first leaves the old containers running.

services:
  llm-text:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: gamentic-llm-text
    profiles: ["local-inference-anna-${ANNA:-false}"]
    restart: unless-stopped
    # AMD GPU access for the Vulkan backend
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "${RENDER_GID:-990}"
      - "${VIDEO_GID:-44}"
    volumes:
      - ${MODELS_DIR:-/home/hec/models/gguf}:/models:ro
    ports:
      - "${LLM_TEXT_PORT:-8080}:8080"
    # list form avoids shell-quoting issues: the image entrypoint is the server binary
    command:
      - --model
      - /models/${LLM_TEXT_MODEL}
      - --alias
      - ${LLM_ALIAS:-gemma-4-26b-a4b-heretic}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --n-gpu-layers
      - "99"
      - --ctx-size
      - "${LLM_CTX:-32768}"
      - --parallel
      - "${LLM_PARALLEL:-4}"
      - --jinja
      # Gemma 4 is a hybrid thinking model; a system message auto-enables thinking and
      # burns the token budget on reasoning. Disable it globally for roleplay output.
      - --chat-template-kwargs
      - '{"enable_thinking":false}'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 240s
    networks:
      - gamentic

  image:
    build:
      context: ./infra/comfyui
    image: gamentic-comfyui-strix:latest
    pull_policy: build
    container_name: gamentic-image
    profiles: ["local-inference-anna-${ANNA:-false}"]
    restart: unless-stopped
    # ComfyUI on ROCm needs full GPU access on Strix Halo
    privileged: true
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - "${RENDER_GID:-990}"
      - "${VIDEO_GID:-44}"
    ports:
      - "${COMFY_PORT:-8188}:8188"
    volumes:
      # Persistent: models, installed custom nodes, outputs, user settings, inputs, caches
      - ${COMFY_MODELS_DIR:-/home/hec/models/comfyui}:/app/ComfyUI/models
      - ./infra/comfyui/data/custom_nodes:/app/ComfyUI/custom_nodes
      - ./infra/comfyui/data/output:/app/ComfyUI/output
      - ./infra/comfyui/data/user:/app/ComfyUI/user
      - ./infra/comfyui/data/input:/app/ComfyUI/input
      - ./infra/comfyui/data/cache:/root/.cache
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - HIP_VISIBLE_DEVICES=0
      # Strix Halo unified-memory stability (avoids VAE-decode checkerboard / ring timeouts)
      - HSA_ENABLE_SDMA=0
      - HSA_USE_SVM=0
    ipc: host
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8188/system_stats || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 40
      start_period: 600s
    networks:
      - gamentic

  # image-api: thin REST adapter in front of ComfyUI. No GPU. Turns the gamentic
  # image contract (POST /image/generate -> {image_url}) into a ComfyUI prompt graph.
  image-api:
    build:
      context: ./infra/image-api
    image: gamentic-image-api:latest
    pull_policy: build
    container_name: gamentic-image-api
    profiles: ["local-inference-anna-${ANNA:-false}"]
    restart: unless-stopped
    depends_on:
      image:
        condition: service_healthy
    environment:
      - COMFY_URL=http://gamentic-image:8188
      - IMAGE_DEFAULT_WIDTH=${IMAGE_DEFAULT_WIDTH:-768}
      - IMAGE_DEFAULT_HEIGHT=${IMAGE_DEFAULT_HEIGHT:-768}
      - IMAGE_DEFAULT_STEPS=${IMAGE_DEFAULT_STEPS:-4}
      - IMAGE_GENERATE_TIMEOUT=${IMAGE_GENERATE_TIMEOUT:-120}
      - IMAGE_MAX_REFERENCES=${IMAGE_MAX_REFERENCES:-4}
      # Per-view character sizes (image-api owns these): face square, body tall full-body.
      - IMAGE_CHAR_FACE_WIDTH=${IMAGE_CHAR_FACE_WIDTH:-512}
      - IMAGE_CHAR_FACE_HEIGHT=${IMAGE_CHAR_FACE_HEIGHT:-512}
      - IMAGE_CHAR_BODY_WIDTH=${IMAGE_CHAR_BODY_WIDTH:-640}
      - IMAGE_CHAR_BODY_HEIGHT=${IMAGE_CHAR_BODY_HEIGHT:-1152}
      - COMFY_OUTPUT_DIR=/comfy/output
    volumes:
      # the ComfyUI staging dir, mounted so the DELETE endpoints can reclaim files the
      # moment the orchestrator owns its copy (owner rule: no timers, files die with
      # their adventure)
      - ./infra/comfyui/data/output:/comfy/output
    ports:
      - "${IMAGE_API_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://localhost:9001/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - gamentic

  # llm-voice: Maya1-3B GGUF on llama.cpp Vulkan, generating SNAC audio tokens.
  # Measured on the box: ~80 tok/s = ~1.1x realtime (SNAC needs ~83 tok/s for 1.0x).
  # Kokoro (fast but flat, no real emotion) was dropped for quality 2026-06-09;
  # Maya1 has native <laugh>/<whisper>/<angry>/<scream> tags and natural-language
  # voice design. See .research/local-tts-amd-strix-2026.
  llm-voice:
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    container_name: gamentic-llm-voice
    profiles: ["local-inference-anna-${ANNA:-false}"]
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "${RENDER_GID:-990}"
      - "${VIDEO_GID:-44}"
    volumes:
      - ${MODELS_DIR:-/home/hec/models/gguf}:/models:ro
    ports:
      - "${LLM_VOICE_PORT:-9091}:8080"
    command:
      - --model
      - /models/${LLM_VOICE_MODEL:-maya1/maya1-q4_k_m.gguf}
      - --alias
      - maya1
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --n-gpu-layers
      - "99"
      - --ctx-size
      - "${LLM_VOICE_CTX:-4096}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - gamentic

  # voice-api: the /voice contract. Builds Maya1 prompts (voice description +
  # inline emotion tags), pulls SNAC tokens from llm-voice and decodes them to
  # 24kHz audio with the ~80MB SNAC codec on CPU. Contract:
  # POST /voice/speak {text, voice_id} -> {audio_url}.
  voice-api:
    build:
      context: ./voice-api
    image: gamentic-voice-api:latest
    pull_policy: build
    container_name: gamentic-voice-api
    profiles: ["local-inference-anna-${ANNA:-false}"]
    restart: unless-stopped
    environment:
      - MAYA1_URL=http://llm-voice:8080
    volumes:
      # writable data dir: generated audio + the character voice registry
      - ./voice-api/data:/data
    ports:
      - "${VOICE_API_PORT:-9002}:8080"
    depends_on:
      llm-voice:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gamentic

  # anna-agent: the vendor's Anna CLI agent in its own container (the hackathon
  # "fit with Anna" requirement). Runs ONLY in Anna mode via the inverted profile
  # trick: "anna-agent-anna-${ANNA}" matches the pinned constant when ANNA=true.
  # Sign in once at http://localhost:19001 (Web UI); credentials persist on the
  # named volume, which is shared with the standalone infra/anna-agent compose
  # project (do not run both at once: same port, same job).
  anna-agent:
    build:
      context: ./infra/anna-agent
    image: anna-agent:1.1.0-beta.17
    pull_policy: build
    container_name: gamentic-anna-agent
    profiles: ["anna-agent-anna-${ANNA:-false}"]
    restart: unless-stopped
    volumes:
      - anna-data:/data
    ports:
      - "127.0.0.1:19001:19001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:19001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - gamentic

  # anna-api: thin REST adapter giving the Anna agent an OpenAI-compatible face
  # (/v1/chat/completions, /v1/models) so the orchestrator's Anna mode can use the
  # agent as its text backend with zero orchestrator changes. No GPU. Image
  # requests answer 501 and the game absorbs them (text-only play by design).
  anna-api:
    build:
      context: ./infra/anna-api
    image: gamentic-anna-api:latest
    pull_policy: build
    container_name: gamentic-anna-api
    profiles: ["anna-agent-anna-${ANNA:-false}"]
    restart: unless-stopped
    depends_on:
      anna-agent:
        condition: service_healthy
    environment:
      - ANNA_AGENT_URL=http://gamentic-anna-agent:19001
      # the agent's state volume (below, read-only): the adapter exchanges the
      # signed-in profile's refresh token for a local session, so no credentials
      # live in the environment
      - ANNA_AGENT_STATE_DIR=/agent-data/.matrix
      - ANNA_AGENT_USERNAME=${ANNA_AGENT_USERNAME:-}
      - ANNA_AGENT_PASSWORD=${ANNA_AGENT_PASSWORD:-}
      - ANNA_IMAGE_VIA_COPILOT=${ANNA_IMAGE_VIA_COPILOT:-false}
    volumes:
      - anna-data:/agent-data:ro
    ports:
      - "127.0.0.1:${ANNA_API_PORT:-9100}:9100"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://localhost:9100/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - gamentic

  # The game brain. Talks to llm-text (required) and image-api/voice-api (optional,
  # best-effort) by container name. State persists in ./orchestrator/data.
  orchestrator:
    build:
      context: ./orchestrator
    image: gamentic-orchestrator:latest
    pull_policy: build
    container_name: gamentic-orchestrator
    restart: unless-stopped
    depends_on:
      # required: false makes both waits optional: each mode profiles the other
      # mode's backend out of the project and the orchestrator only waits for the
      # one that is actually in play.
      llm-text:
        condition: service_healthy
        required: false
      anna-api:
        condition: service_healthy
        required: false
    environment:
      - LLM_BASE_URL=http://gamentic-llm-text:8080/v1
      - LLM_MODEL=${LLM_ALIAS:-gemma-4-26b-a4b-heretic}
      - IMAGE_API_URL=http://gamentic-image-api:9001
      # voice-api listens on 8080 inside the container (host maps 9002->8080)
      - VOICE_API_URL=http://gamentic-voice-api:8080
      - DB_PATH=/data/gamentic.db
      # orchestrator-owned image knobs (scene + view snapshot sizes, agentic prompts)
      - IMAGE_SCENE_W=${IMAGE_SCENE_W:-768}
      - IMAGE_SCENE_H=${IMAGE_SCENE_H:-768}
      - IMAGE_VIEW_W=${IMAGE_VIEW_W:-1152}
      - IMAGE_VIEW_H=${IMAGE_VIEW_H:-768}
      - IMAGE_AGENTIC_PROMPTS=${IMAGE_AGENTIC_PROMPTS:-false}
      - IMAGE_ART_DIRECTOR=${IMAGE_ART_DIRECTOR:-true}
      # item unlock cards + narrator-initiated image pacing
      - IMAGE_ITEMS=${IMAGE_ITEMS:-true}
      - IMAGE_ITEM_SIZE=${IMAGE_ITEM_SIZE:-320}
      - IMAGE_MAX_ITEMS_PER_TURN=${IMAGE_MAX_ITEMS_PER_TURN:-2}
      - IMAGE_NARRATOR_COOLDOWN_TURNS=${IMAGE_NARRATOR_COOLDOWN_TURNS:-4}
      - INTERPRET_FREE_TEXT=${INTERPRET_FREE_TEXT:-true}
      - CHARACTER_MAX_TOKENS=${CHARACTER_MAX_TOKENS:-0}
      # A/B knob for the 26B: request-level enable_thinking on the narrator call only
      - NARRATOR_THINKING=${NARRATOR_THINKING:-true}
      # whole-story memory: generous verbatim window + rolling facts-only recap
      - HISTORY_BEATS=${HISTORY_BEATS:-80}
      - SUMMARY_ENABLED=${SUMMARY_ENABLED:-true}
      - SUMMARY_EVERY_TURNS=${SUMMARY_EVERY_TURNS:-10}
      - SUMMARY_KEEP_TURNS=${SUMMARY_KEEP_TURNS:-8}
      # turn economy: a turn is a beat, not a chapter (voices per turn, cascade budget)
      - MAX_CHARACTER_REACTIONS=${MAX_CHARACTER_REACTIONS:-2}
      - TURN_MAX_ACTOR_STEPS=${TURN_MAX_ACTOR_STEPS:-4}
      - TURN_MAX_PER_CHARACTER=${TURN_MAX_PER_CHARACTER:-1}
      # character memory: per-character witnessed window + private rolling recap
      - CHAR_HISTORY_BEATS=${CHAR_HISTORY_BEATS:-30}
      - CHAR_SUMMARY_ENABLED=${CHAR_SUMMARY_ENABLED:-true}
      - CHAR_SUMMARY_EVERY=${CHAR_SUMMARY_EVERY:-12}
      - CHAR_SUMMARY_KEEP_TURNS=${CHAR_SUMMARY_KEEP_TURNS:-8}
      - CHAR_SUMMARY_MAX_TOKENS=${CHAR_SUMMARY_MAX_TOKENS:-320}
      # inference providers (per-modality; admin overrides at /admin beat these).
      # Defaults = this local stack. Empty base_url/model = the local URLs above
      # (LLM_BASE_URL/LLM_MODEL stay working aliases for TEXT_*).
      - TEXT_PROVIDER=${TEXT_PROVIDER:-local}
      - TEXT_BASE_URL=${TEXT_BASE_URL:-}
      - TEXT_API_KEY=${TEXT_API_KEY:-}
      - TEXT_MODEL=${TEXT_MODEL:-}
      - AUDIO_PROVIDER=${AUDIO_PROVIDER:-local}
      - AUDIO_BASE_URL=${AUDIO_BASE_URL:-}
      - AUDIO_API_KEY=${AUDIO_API_KEY:-}
      - AUDIO_MODEL=${AUDIO_MODEL:-}
      # elevenlabs only: comma-separated voice ids characters map onto deterministically
      - AUDIO_VOICE_POOL=${AUDIO_VOICE_POOL:-}
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-comfy}
      - IMAGE_BASE_URL=${IMAGE_BASE_URL:-}
      - IMAGE_API_KEY=${IMAGE_API_KEY:-}
      - IMAGE_MODEL=${IMAGE_MODEL:-}
      # set to require Authorization Bearer on /admin (page + API); empty = open
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      # Anna mode (cloud-only inference; see the header comment). The admin panel
      # boolean overrides ANNA at call time; these are the env layer underneath.
      # The :? guard makes a missing COMPOSE_PROFILES line FAIL LOUDLY instead of
      # silently skipping every local inference service (profiles are opt-in:
      # without the pinned constant nothing GPU-shaped would start and turns
      # would die against absent containers with no clue why).
      - ANNA_COMPOSE_GUARD=${COMPOSE_PROFILES:?missing from .env - copy the Anna block from .env.example, at minimum COMPOSE_PROFILES=local-inference-anna-false,anna-agent-anna-true, or the local inference services will not start}
      - ANNA=${ANNA:-false}
      - ANNA_API_KEY=${ANNA_API_KEY:-}
      # default = the in-stack anna-api adapter in front of the Anna agent; set a
      # real cloud gateway URL in .env (or the admin card) to bypass the agent
      - ANNA_BASE_URL=${ANNA_BASE_URL:-http://gamentic-anna-api:9100}
      - ANNA_TEXT_MODEL=${ANNA_TEXT_MODEL:-anna-copilot}
      - ANNA_IMAGE_MODEL=${ANNA_IMAGE_MODEL:-}
    volumes:
      - ./orchestrator/data:/data
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - gamentic

  # Static vanilla app served by nginx, which also reverse-proxies the media
  # services same-origin (/image, /voice, /audio) so the app's relative media
  # URLs resolve. Talks to the orchestrator cross-origin via CORS.
  frontend:
    build:
      context: ./frontend
    image: gamentic-frontend:latest
    pull_policy: build
    container_name: gamentic-frontend
    restart: unless-stopped
    depends_on:
      - orchestrator
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - gamentic

networks:
  gamentic:
    driver: bridge

volumes:
  # the Anna agent's state/config. The explicit name adopts the volume created by
  # the standalone infra/anna-agent compose project, so a sign-in done in either
  # place carries over to the other.
  anna-data:
    name: anna-agent_anna-data
