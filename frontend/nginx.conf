# Gamentic frontend: serve the static app and reverse-proxy the media services
# same-origin. This is REQUIRED because the app resolves media URLs against its
# own origin (safeUrl uses window.location.origin), and image-api/voice-api return
# RELATIVE paths (/image/file?..., /audio/*.wav). Proxying them here makes those
# relative URLs resolve correctly with no CORS.
#
# The orchestrator API stays cross-origin: the app calls it at its configured
# backendUrl (default http://localhost:8000) and the orchestrator allows CORS *.
#
# Upstreams are resolved at request time via Docker's embedded DNS, so nginx
# starts even if a media service is down (you just get 502 on that resource;
# the app already tolerates missing media and stays fully playable text-only).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # image-api: /image/file, /image/generate, /image/character
    location /image/ {
        set $image_upstream http://gamentic-image-api:9001;
        proxy_pass $image_upstream$request_uri;
    }

    # voice-api synthesis: /voice/speak, /voice/stream, /voice/assign
    location /voice/ {
        set $voice_upstream http://gamentic-voice-api:8080;
        proxy_pass $voice_upstream$request_uri;
    }

    # voice-api generated audio files returned by /voice/speak (audio_url=/audio/*.wav)
    location /audio/ {
        set $audio_upstream http://gamentic-voice-api:8080;
        proxy_pass $audio_upstream$request_uri;
    }

    # orchestrator-served per-game images (scene.image_url / character.face_url = /media/<gid>/...)
    location /media/ {
        set $media_upstream http://gamentic-orchestrator:8000;
        proxy_pass $media_upstream$request_uri;
    }
}
