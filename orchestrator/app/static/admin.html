<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gamentic · Providers</title>
<style>
  :root {
    --bg: #101216; --card: #181b21; --line: #262b33; --text: #d7dce3;
    --dim: #8a93a0; --accent: #6ea8fe; --ok: #4cc38a; --err: #e5484d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 32px 16px 64px; background: var(--bg); color: var(--text);
         font: 15px/1.5 system-ui, sans-serif; }
  main { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  p.sub { color: var(--dim); margin: 0 0 24px; font-size: 13px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
          padding: 20px; margin-bottom: 20px; }
  .card h2 { font-size: 15px; margin: 0 0 14px; text-transform: capitalize; }
  label { display: block; font-size: 12px; color: var(--dim); margin: 10px 0 3px; }
  input, select { width: 100%; padding: 8px 10px; border-radius: 6px; color: var(--text);
                  background: var(--bg); border: 1px solid var(--line); font: inherit; }
  input:focus, select:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  .row { display: flex; gap: 10px; align-items: center; margin-top: 16px; }
  button { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--line);
           background: #20242c; color: var(--text); font: inherit; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0b1020; }
  .notes { color: var(--dim); font-size: 12px; margin-top: 12px; padding-left: 16px; }
  .notes li { margin: 2px 0; }
  .result { font-size: 13px; flex: 1; }
  .result.ok { color: var(--ok); }
  .result.err { color: var(--err); }
  #token-row { margin-bottom: 24px; }
  #status { font-size: 13px; color: var(--dim); min-height: 20px; margin-top: -12px; margin-bottom: 16px; }
</style>
</head>
<body>
<main>
  <h1>Inference providers</h1>
  <p class="sub">Per modality: who serves it, where, with which key and model. Saving writes
  the override table; the next game call uses it immediately. Blank a field to fall back to
  the server's env. Keys are write-only: they are never shown back.</p>
  <div id="token-row" class="card" hidden>
    <label for="token">Admin token (this server requires one)</label>
    <input id="token" type="password" autocomplete="off">
  </div>
  <div id="status"></div>
  <div id="cards"></div>
</main>
<script>
const MODALITIES = ["text", "audio", "image"];
let ANNA_ON = false;
const token = () => document.getElementById("token").value || localStorage.getItem("gamentic_admin_token") || "";
const headers = () => {
  const h = { "Content-Type": "application/json" };
  if (token()) h["Authorization"] = "Bearer " + token();
  return h;
};
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function annaCard(cfg) {
  const notes = (cfg.notes || []).map(n => `<li>${esc(n)}</li>`).join("");
  return `<div class="card" id="card-anna" style="${cfg.enabled ? "border-color: var(--accent);" : ""}">
    <h2>Anna <span style="color:${cfg.enabled ? "var(--ok)" : "var(--dim)"}; font-size:12px;">${cfg.enabled ? "ON" : "off"}</span></h2>
    <label>Anna mode (cloud text + image, voice off)</label>
    <select id="anna-enabled">
      <option value="false" ${cfg.enabled ? "" : "selected"}>no</option>
      <option value="true" ${cfg.enabled ? "selected" : ""}>yes</option>
    </select>
    <label>API key ${cfg.api_key ? "(one is set; leave blank to keep it)" : "(none set)"}</label>
    <input id="anna-api_key" type="password" placeholder="${cfg.api_key ? "unchanged" : ""}" autocomplete="new-password">
    <label>Base URL (one URL; /v1 optional, normalized per modality)</label>
    <input id="anna-base_url" value="${esc(cfg.base_url)}" spellcheck="false" placeholder="https://...">
    <label>Text model</label>
    <input id="anna-text_model" value="${esc(cfg.text_model)}" spellcheck="false">
    <label>Image model (blank = gpt-image-2)</label>
    <input id="anna-image_model" value="${esc(cfg.image_model)}" spellcheck="false">
    <ul class="notes">${notes}</ul>
    <div class="row">
      <button class="primary" onclick="saveAnna()">Save</button>
      <button ${cfg.enabled ? "" : "disabled title=\"save with Anna ON first; while off this would test the local stack\""} onclick="test('text', 'anna')">Test text</button>
      <button ${cfg.enabled ? "" : "disabled title=\"save with Anna ON first; while off this would test the local stack\""} onclick="test('image', 'anna')">Test image</button>
      <span class="result" id="anna-result"></span>
    </div>
  </div>`;
}

function card(m, cfg) {
  const opts = cfg.dialects.map(d => `<option value="${d}" ${d === cfg.provider ? "selected" : ""}>${d}</option>`).join("");
  const annaNote = ANNA_ON
    ? `<li style="color: var(--accent);">${m === "audio"
        ? "Anna mode is ON: voice is off (text-only play)"
        : "Anna mode is ON: this modality is served by Anna; the fields below wait underneath"}</li>`
    : "";
  const notes = annaNote + (cfg.notes || []).map(n => `<li>${esc(n)}</li>`).join("");
  return `<div class="card" id="card-${m}">
    <h2>${m}</h2>
    <label>Provider</label>
    <select id="${m}-provider">${opts}</select>
    <label>Base URL</label>
    <input id="${m}-base_url" value="${esc(cfg.base_url)}" spellcheck="false">
    <label>API key ${cfg.api_key ? "(one is set; leave blank to keep it)" : "(none set)"}</label>
    <input id="${m}-api_key" type="password" placeholder="${cfg.api_key ? "unchanged" : ""}" autocomplete="new-password">
    <label>Model</label>
    <input id="${m}-model" value="${esc(cfg.model)}" spellcheck="false">
    <ul class="notes">${notes}</ul>
    <div class="row">
      <button class="primary" onclick="save('${m}')">Save</button>
      <button onclick="test('${m}')">Test</button>
      <span class="result" id="${m}-result"></span>
    </div>
  </div>`;
}

function render(data) {
  ANNA_ON = !!(data.anna && data.anna.enabled);
  $("cards").innerHTML = annaCard(data.anna || {}) + MODALITIES.map(m => card(m, data[m])).join("");
}

async function load() {
  const r = await fetch("/admin/providers", { headers: headers() });
  if (r.status === 401) { $("token-row").hidden = false; $("status").textContent = "Enter the admin token, then press Enter."; return; }
  if (!r.ok) { $("status").textContent = "Failed to load: HTTP " + r.status; return; }
  if (token()) localStorage.setItem("gamentic_admin_token", token());
  $("status").textContent = "";
  render(await r.json());
}

async function putFields(body, resultId) {
  const out = $(resultId);
  out.className = "result"; out.textContent = "saving…";
  const r = await fetch("/admin/providers", { method: "PUT", headers: headers(), body: JSON.stringify(body) });
  if (!r.ok) { out.className = "result err"; out.textContent = "save failed: " + (await r.text()).slice(0, 120); return; }
  render(await r.json());
  $(resultId).className = "result ok"; $(resultId).textContent = "saved ✓ (live now)";
}

async function save(m) {
  const fields = { provider: $(`${m}-provider`).value, base_url: $(`${m}-base_url`).value, model: $(`${m}-model`).value };
  const key = $(`${m}-api_key`).value;
  if (key) fields.api_key = key;            // write-only: only sent when retyped
  await putFields({ [m]: fields }, `${m}-result`);
}

async function saveAnna() {
  const fields = { enabled: $("anna-enabled").value, base_url: $("anna-base_url").value,
                   text_model: $("anna-text_model").value, image_model: $("anna-image_model").value };
  const key = $("anna-api_key").value;
  if (key) fields.api_key = key;            // write-only: only sent when retyped
  await putFields({ anna: fields }, "anna-result");
}

async function test(m, target) {
  const out = $(`${target || m}-result`);
  out.className = "result"; out.textContent = "testing…";
  const r = await fetch("/admin/providers/test", { method: "POST", headers: headers(), body: JSON.stringify({ modality: m }) });
  if (!r.ok) { out.className = "result err"; out.textContent = "HTTP " + r.status; return; }
  const d = await r.json();
  out.className = "result " + (d.ok ? "ok" : "err");
  out.textContent = d.ok ? `ok ✓ ${d.latency_ms} ms${d.detail ? " · " + d.detail : ""}`
                         : `failed · ${d.error || "unknown"} (${d.latency_ms} ms)`;
}

document.getElementById("token").addEventListener("keydown", e => { if (e.key === "Enter") load(); });
load();
</script>
</body>
</html>
