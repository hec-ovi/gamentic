# The Anna agent, run in its own container for the Gamentic + Anna integration.
# Build + start:  docker compose -f infra/anna-agent/docker-compose.yml up --build
name: anna-agent

services:
  anna:
    build:
      context: .
    image: anna-agent:1.1.0-beta.17
    container_name: anna-agent
    # the agent's own state/config persist on a named volume
    volumes:
      - anna-data:/data
    # its Web UI, reachable from this machine at http://localhost:19001
    ports:
      - "127.0.0.1:19001:19001"
    # the CLI agent is interactive
    stdin_open: true
    tty: true
    restart: "no"

volumes:
  anna-data:
