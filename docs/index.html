_messages"],"output": "WorldSheet"},"artdir": {"builder": "build_artdirector_messages","output": {"main_image": "prompt","characters": [{"name": "","descriptor": ""}]}},"imagePrompt": {"builder": "build_image_prompt_messages","output": "single image prompt string"},"imageJobs": {"jobs": ["generate_scene_image","generate_images_for_game","generate_item_image","generate_view_snapshot","generate_directed_image"]},"voice": {"identity": "assign_voices_for_game","playback": "frontend speakBeat -> /audio/speak","story_authority": "none"},"explain": {"builder": "build_explain_messages","output": "text only","state_mutation": false},"apiui": {"active": {"state": "mapped GameState","beats": "mapped Beat[]","revealQueue": "beat ids","profile": "profile view"}},"speechAnswer": {"character_speaks": "_character_reply -> [say]/[whisper] -> dialogue beat","narrator_speaks": "narrator content -> narration beat","guard": "stop at present character name-colon"}},"NODE_HELP": {"input": {"what": "The player payload for one turn.","how": "The player payload for one turn."},"state": {"what": "Games, player_state, scenes, characters, quests, lore, beats.","how": "Games, player_state, scenes, characters, quests, lore, beats."},"beats": {"what": "The transcript source. Public/private beats are filtered per context.","how": "The transcript source. Public/private beats are filtered per context."},"toolschemas": {"what": "The function schemas visible to narrator/character agents.","how": "The function schemas visible to narrator/character agents."},"interpreter": {"what": "Small LLM call only when typed text arrives without structured segments.","how": "Small LLM call only when typed text arrives without structured segments."},"gates": {"what": "Moves through known exits, validates attack/give, splits public/private.","how": "Moves through known exits, validates attack/give, splits public/private."},"narrator": {"what": "Omniscient story agent: narration, tool proposals, cues, image requests.","how": "Omniscient story agent: narration, tool proposals, cues, image requests."},"resolve": {"what": "Second narrator call when tools changed state but no prose landed.","how": "Second narrator call when tools changed state but no prose landed."},"dispatcher": {"what": "The only path from LLM proposals into authoritative state.","how": "The only path from LLM proposals into authoritative state."},"charMara": {"what": "One LLM call for one queued character. Example: Mara.","how": "One LLM call for one queued character. Example: Mara."},"charSentinel": {"what": "Same template, separate context and memory. Example: Vault Sentinel.","how": "Same template, separate context and memory. Example: Vault Sentinel."},"privateChar": {"what": "Same character agent, but every emitted beat is forced into one private thread.","how": "Same character agent, but every emitted beat is forced into one private thread."},"summaryGame": {"what": "Background LLM call compressing older beats into game-level recap.","how": "Background LLM call compressing older beats into game-level recap."},"summaryChar": {"what": "Background LLM call per character that crossed the witnessed-beat threshold.","how": "Background LLM call per character that crossed the witnessed-beat threshold."},"origin": {"what": "Focused LLM pass that fills thin character origins after finalize/import.","how": "Focused LLM pass that fills thin character origins after finalize/import."},"creator": {"what": "Creation contexts that interview and then emit the initial WorldSheet.","how": "Creation contexts that interview and then emit the initial WorldSheet."},"artdir": {"what": "One optional LLM call at creation for first-sight art prompts.","how": "One optional LLM call at creation for first-sight art prompts."},"imagePrompt": {"what": "Optional LLM call that rewrites state-grounded image context into a FLUX prompt.","how": "Optional LLM call that rewrites state-grounded image context into a FLUX prompt."},"imageJobs": {"what": "Non-story media layer. Renders prompts, persists files, then updates rows/beats.","how": "Non-story media layer. Renders prompts, persists files, then updates rows/beats."},"voice": {"what": "No story agent. It assigns/resolves stable narrator and character voices.","how": "No story agent. It assigns/resolves stable narrator and character voices."},"explain": {"what": "Spoiler-safe explanation call for tapped visible things.","how": "Spoiler-safe explanation call for tapped visible things."},"apiui": {"what": "Receives GameState and beats, maps them, animates reveal, fetches late media.","how": "Receives GameState and beats, maps them, animates reveal, fetches late media."},"speechAnswer": {"what": "Character dialogue beats come from character-agent calls. Narrator content is narration.","how": "Character dialogue beats come from character-agent calls. Narrator content is narration."}},"groups": [{"id": "agent","label": "agent contexts","nodeIds": ["interpreter","narrator","resolve","charMara","charSentinel","privateChar","summaryGame","summaryChar","origin","creator","artdir","imagePrompt","explain"]},{"id": "shared","label": "shared inputs","nodeIds": ["input","beats","speechAnswer"]},{"id": "persist","label": "state","nodeIds": ["state"]},{"id": "tool","label": "tools","nodeIds": ["toolschemas","gates","dispatcher"]},{"id": "enhancer","label": "enhancers (image / voice)","nodeIds": ["imageJobs","voice"]},{"id": "ui","label": "frontend","nodeIds": ["apiui"]}],"C": {"agent": "#e7b75f","shared": "#62c8d8","persist": "#65d08b","enhancer": "#e47ea5","ui": "#7ba7ff","tool": "#a895f2"},"textHTML": "<p class=\"intro\">Turn input \u2192 interpreter/gates \u2192 narrator (omniscient) \u2192 tool dispatcher \u2192 state/beats. Character agents read only their witnessed window; image and voice jobs read state and produce media/ids without deciding story truth.</p><h3 class=\"group\" id=\"grp-agent\">agent contexts</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Interpreter agent</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Small LLM call only when typed text arrives without structured segments.</p><div class=\"row\"><b>Reads / shared input:</b> present character names; player inventory; raw typed text</div><div class=\"row\"><b>Generates:</b> submit_segments tool call</div><div class=\"row\"><b>Writes / mutates:</b> none; output is runtime segments</div><div class=\"row\"><b>Key point:</b> Small LLM call only when typed text arrives without structured segments.</div><div class=\"row\"><b>IN:</b> input (free text only)</div><div class=\"row\"><b>OUT:</b> gates (segments)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_interpret_messages&quot;,\n  &quot;tools&quot;: [\n    &quot;submit_segments&quot;\n  ],\n  &quot;output&quot;: {\n    &quot;segments&quot;: &quot;Segment[]&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Narrator agent</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Omniscient story agent: narration, tool proposals, cues, image requests.</p><div class=\"row\"><b>Reads / shared input:</b> state block; recent beats; story_summary; lore matches; attempts; wish; tool schemas</div><div class=\"row\"><b>Generates:</b> narration beat text; tool_calls; cue_character; show_image request</div><div class=\"row\"><b>Writes / mutates:</b> indirectly through tools only; narrator beat through engine</div><div class=\"row\"><b>Key point:</b> Omniscient story agent: narration, tool proposals, cues, image requests.</div><div class=\"row\"><b>IN:</b> gates (public action + attempts); state (state block); beats (recent + recap); toolschemas (narrator tools)</div><div class=\"row\"><b>OUT:</b> dispatcher (tool_calls); beats (narration beat); resolve (state changed no prose); imageJobs (show_image request); speechAnswer (narration only)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_narrator_messages&quot;,\n  &quot;role&quot;: &quot;public scene narrator&quot;,\n  &quot;output&quot;: {\n    &quot;content&quot;: &quot;narration&quot;,\n    &quot;tool_calls&quot;: &quot;NARRATOR_TOOLS[]&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Narrator resolve</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Second narrator call when tools changed state but no prose landed.</p><div class=\"row\"><b>Reads / shared input:</b> current state; player action; state_notes</div><div class=\"row\"><b>Generates:</b> short narration only</div><div class=\"row\"><b>Writes / mutates:</b> narration beat through engine</div><div class=\"row\"><b>Key point:</b> Second narrator call when tools changed state but no prose landed.</div><div class=\"row\"><b>IN:</b> narrator (state changed no prose)</div><div class=\"row\"><b>OUT:</b> beats (short narration)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_narrator_resolve_messages&quot;,\n  &quot;tools&quot;: &quot;none&quot;,\n  &quot;output&quot;: &quot;short narration&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Character agent A</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">One LLM call for one queued character. Example: Mara.</p><div class=\"row\"><b>Reads / shared input:</b> own persona; own knowledge; own origin; own memory_summary; own witnessed beats; present roster; CHARACTER_TOOLS</div><div class=\"row\"><b>Generates:</b> [say]/[do]/[whisper] tags; character tool calls; memory marks</div><div class=\"row\"><b>Writes / mutates:</b> dialogue/action beats through engine; state through character tools</div><div class=\"row\"><b>Key point:</b> One LLM call for one queued character. Example: Mara.</div><div class=\"row\"><b>IN:</b> dispatcher (cue/reaction); state (own row); beats (witnessed beats); toolschemas (character tools)</div><div class=\"row\"><b>OUT:</b> beats (dialogue/action); dispatcher (character tool_calls); speechAnswer (character speech)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_character_messages&quot;,\n  &quot;instance&quot;: &quot;character_id=char_mara&quot;,\n  &quot;output&quot;: {\n    &quot;say&quot;: &quot;dialogue beat&quot;,\n    &quot;do&quot;: &quot;action beat&quot;,\n    &quot;whisper&quot;: &quot;private dialogue beat&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Character agent B</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Same template, separate context and memory. Example: Vault Sentinel.</p><div class=\"row\"><b>Reads / shared input:</b> its own row only; its own witnessed beats; same scene roster</div><div class=\"row\"><b>Generates:</b> its own dialogue/action/tool calls</div><div class=\"row\"><b>Writes / mutates:</b> beats as that character; state through character tools</div><div class=\"row\"><b>Key point:</b> Same template, separate context and memory. Example: Vault Sentinel.</div><div class=\"row\"><b>IN:</b> dispatcher (reaction); state (own row); beats (witnessed beats)</div><div class=\"row\"><b>OUT:</b> beats (dialogue/action); speechAnswer (character speech)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_character_messages&quot;,\n  &quot;instance&quot;: &quot;character_id=char_sentinel&quot;,\n  &quot;isolated_from&quot;: &quot;Mara private knowledge and memory&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Private character agent</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Same character agent, but every emitted beat is forced into one private thread.</p><div class=\"row\"><b>Reads / shared input:</b> target character context; private player whisper or gift impulse</div><div class=\"row\"><b>Generates:</b> private dialogue/action beats; optional private tool effects</div><div class=\"row\"><b>Writes / mutates:</b> beats.private_with = character id</div><div class=\"row\"><b>Key point:</b> Same character agent, but every emitted beat is forced into one private thread.</div><div class=\"row\"><b>IN:</b> gates (whisper exchange); dispatcher (gift reply impulse)</div><div class=\"row\"><b>OUT:</b> beats (private_with)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;private_with&quot;: &quot;character id&quot;,\n  &quot;impulse&quot;: &quot;optional gift line&quot;,\n  &quot;output&quot;: &quot;private thread beats&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Game summary fold</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Background LLM call compressing older beats into game-level recap.</p><div class=\"row\"><b>Reads / shared input:</b> beats older than keep window; previous story_summary</div><div class=\"row\"><b>Generates:</b> facts-only story summary</div><div class=\"row\"><b>Writes / mutates:</b> games.story_summary; games.summarized_through</div><div class=\"row\"><b>Key point:</b> Background LLM call compressing older beats into game-level recap.</div><div class=\"row\"><b>IN:</b> beats (old beats)</div><div class=\"row\"><b>OUT:</b> state (story_summary)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_summary_messages&quot;,\n  &quot;output&quot;: {\n    &quot;story_summary&quot;: &quot;text&quot;,\n    &quot;summarized_through&quot;: &quot;turn_index&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Character summary fold</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Background LLM call per character that crossed the witnessed-beat threshold.</p><div class=\"row\"><b>Reads / shared input:</b> that character witnessed beats only; previous memory_summary</div><div class=\"row\"><b>Generates:</b> private character memory recap</div><div class=\"row\"><b>Writes / mutates:</b> characters.memory_summary; characters.summarized_through</div><div class=\"row\"><b>Key point:</b> Background LLM call per character that crossed the witnessed-beat threshold.</div><div class=\"row\"><b>IN:</b> beats (witnessed old beats)</div><div class=\"row\"><b>OUT:</b> state (memory_summary)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_character_summary_messages&quot;,\n  &quot;one_per&quot;: &quot;alive character when threshold reached&quot;,\n  &quot;privacy&quot;: &quot;witnessed beats only&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Origin enrichment</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Focused LLM pass that fills thin character origins after finalize/import.</p><div class=\"row\"><b>Reads / shared input:</b> game setting/tone; character persona; description; knowledge; relation</div><div class=\"row\"><b>Generates:</b> private origin text</div><div class=\"row\"><b>Writes / mutates:</b> characters.origin</div><div class=\"row\"><b>Key point:</b> Focused LLM pass that fills thin character origins after finalize/import.</div><div class=\"row\"><b>IN:</b> creator (thin origins)</div><div class=\"row\"><b>OUT:</b> state (characters.origin)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_origin_messages&quot;,\n  &quot;output&quot;: {\n    &quot;origin&quot;: &quot;private backstory&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Creator chat/finalize</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Creation contexts that interview and then emit the initial WorldSheet.</p><div class=\"row\"><b>Reads / shared input:</b> creator_sessions.history; user design answers</div><div class=\"row\"><b>Generates:</b> WorldSheet JSON; characters; quests; lore; start state</div><div class=\"row\"><b>Writes / mutates:</b> games; player_state; characters; quests; lore; opening beat</div><div class=\"row\"><b>Key point:</b> Creation contexts that interview and then emit the initial WorldSheet.</div><div class=\"row\"><b>IN:</b> <i>none</i></div><div class=\"row\"><b>OUT:</b> state (create rows); origin (thin origins)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builders&quot;: [\n    &quot;build_creator_messages&quot;,\n    &quot;build_finalize_messages&quot;\n  ],\n  &quot;output&quot;: &quot;WorldSheet&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Art director agent</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">One optional LLM call at creation for first-sight art prompts.</p><div class=\"row\"><b>Reads / shared input:</b> world bible; cast descriptors; start location; time of day</div><div class=\"row\"><b>Generates:</b> main opening image prompt; character reference descriptors</div><div class=\"row\"><b>Writes / mutates:</b> no state directly; prompts feed image jobs</div><div class=\"row\"><b>Key point:</b> One optional LLM call at creation for first-sight art prompts.</div><div class=\"row\"><b>IN:</b> state (world bible)</div><div class=\"row\"><b>OUT:</b> imageJobs (opening prompts)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_artdirector_messages&quot;,\n  &quot;output&quot;: {\n    &quot;main_image&quot;: &quot;prompt&quot;,\n    &quot;characters&quot;: [\n      {\n        &quot;name&quot;: &quot;&quot;,\n        &quot;descriptor&quot;: &quot;&quot;\n      }\n    ]\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Image prompt agent</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Optional LLM call that rewrites state-grounded image context into a FLUX prompt.</p><div class=\"row\"><b>Reads / shared input:</b> place/time/mood; present characters; recent public beats; focus</div><div class=\"row\"><b>Generates:</b> hardened image prompt</div><div class=\"row\"><b>Writes / mutates:</b> no state directly</div><div class=\"row\"><b>Key point:</b> Optional LLM call that rewrites state-grounded image context into a FLUX prompt.</div><div class=\"row\"><b>IN:</b> state (visual context); beats (recent public action)</div><div class=\"row\"><b>OUT:</b> imageJobs (prompt string)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_image_prompt_messages&quot;,\n  &quot;output&quot;: &quot;single image prompt string&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Explain agent</h4><span class=\"kindtag\">agent</span></div><p class=\"sum\">Spoiler-safe explanation call for tapped visible things.</p><div class=\"row\"><b>Reads / shared input:</b> player-visible facts only; visible items; public character card; scene/quest/beat facts</div><div class=\"row\"><b>Generates:</b> short in-world explanation</div><div class=\"row\"><b>Writes / mutates:</b> none</div><div class=\"row\"><b>Key point:</b> Spoiler-safe explanation call for tapped visible things.</div><div class=\"row\"><b>IN:</b> state (visible facts only)</div><div class=\"row\"><b>OUT:</b> apiui (aside text)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_explain_messages&quot;,\n  &quot;output&quot;: &quot;text only&quot;,\n  &quot;state_mutation&quot;: false\n}</pre></details></div><h3 class=\"group\" id=\"grp-shared\">shared inputs</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>Turn input</h4><span class=\"kindtag\">shared</span></div><p class=\"sum\">The player payload for one turn.</p><div class=\"row\"><b>Reads / shared input:</b> browser composer; action buttons; profile whisper panel</div><div class=\"row\"><b>Generates:</b> ActionIn.action or ActionIn.segments; optional wish</div><div class=\"row\"><b>Writes / mutates:</b> none</div><div class=\"row\"><b>Key point:</b> The player payload for one turn.</div><div class=\"row\"><b>IN:</b> <i>none</i></div><div class=\"row\"><b>OUT:</b> interpreter (free text only); gates (segments/direct)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;action&quot;: &quot;string | null&quot;,\n  &quot;segments&quot;: [\n    &quot;Segment[] | null&quot;\n  ],\n  &quot;wish&quot;: &quot;string | null&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>Beats windows</h4><span class=\"kindtag\">shared</span></div><p class=\"sum\">The transcript source. Public/private beats are filtered per context.</p><div class=\"row\"><b>Reads / shared input:</b> narrator; character agents; fold agents; image context; frontend</div><div class=\"row\"><b>Generates:</b> narrator transcript; character witnessed window; story log stream</div><div class=\"row\"><b>Writes / mutates:</b> turn engine emits beats; media image beats</div><div class=\"row\"><b>Key point:</b> The transcript source. Public/private beats are filtered per context.</div><div class=\"row\"><b>IN:</b> dispatcher (receipts); narrator (narration beat); resolve (short narration); charMara (dialogue/action); charSentinel (dialogue/action); privateChar (private_with)</div><div class=\"row\"><b>OUT:</b> narrator (recent + recap); charMara (witnessed beats); charSentinel (witnessed beats); summaryGame (old beats); summaryChar (witnessed old beats); imagePrompt (recent public action); apiui (story stream)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;recent_beats&quot;: &quot;global verbatim window&quot;,\n  &quot;witnessed_beats_for_character&quot;: &quot;per-character memory window&quot;,\n  &quot;private_with&quot;: &quot;character id | null&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>Speech ownership rule</h4><span class=\"kindtag\">shared</span></div><p class=\"sum\">Character dialogue beats come from character-agent calls. Narrator content is narration.</p><div class=\"row\"><b>Reads / shared input:</b> narrator content; character [say]/[whisper] tags; stop sequences</div><div class=\"row\"><b>Generates:</b> ownership boundary</div><div class=\"row\"><b>Writes / mutates:</b> none</div><div class=\"row\"><b>Key point:</b> Character dialogue beats come from character-agent calls. Narrator content is narration.</div><div class=\"row\"><b>IN:</b> narrator (narration only); charMara (character speech); charSentinel (character speech)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;character_speaks&quot;: &quot;_character_reply -&gt; [say]/[whisper] -&gt; dialogue beat&quot;,\n  &quot;narrator_speaks&quot;: &quot;narrator content -&gt; narration beat&quot;,\n  &quot;guard&quot;: &quot;stop at present character name-colon&quot;\n}</pre></details></div><h3 class=\"group\" id=\"grp-persist\">state</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>SQLite state</h4><span class=\"kindtag\">persist</span></div><p class=\"sum\">Games, player_state, scenes, characters, quests, lore, beats.</p><div class=\"row\"><b>Reads / shared input:</b> all prompt builders; repo.game_state; media jobs; voice resolver</div><div class=\"row\"><b>Generates:</b> current scene; present cast; prompt state blocks; API projection</div><div class=\"row\"><b>Writes / mutates:</b> tools; turn engine; background media; folds; settings API</div><div class=\"row\"><b>Key point:</b> Games, player_state, scenes, characters, quests, lore, beats.</div><div class=\"row\"><b>IN:</b> dispatcher (validated writes); summaryGame (story_summary); summaryChar (memory_summary); creator (create rows); origin (characters.origin); imageJobs (media URLs); voice (voice ids)</div><div class=\"row\"><b>OUT:</b> gates (current scene + inventory); narrator (state block); charMara (own row); charSentinel (own row); artdir (world bible); imagePrompt (visual context); voice (identity fields); explain (visible facts only); apiui (GameState)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;games&quot;: &quot;row&quot;,\n  &quot;player_state&quot;: &quot;row&quot;,\n  &quot;scenes&quot;: &quot;rows&quot;,\n  &quot;characters&quot;: &quot;rows&quot;,\n  &quot;beats&quot;: &quot;rows&quot;,\n  &quot;lore&quot;: &quot;rows&quot;\n}</pre></details></div><h3 class=\"group\" id=\"grp-tool\">tools</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>Tool schemas</h4><span class=\"kindtag\">tool</span></div><p class=\"sum\">The function schemas visible to narrator/character agents.</p><div class=\"row\"><b>Reads / shared input:</b> tools/__init__.py; settings flags</div><div class=\"row\"><b>Generates:</b> narrator_tools(); CHARACTER_TOOLS</div><div class=\"row\"><b>Writes / mutates:</b> none; schemas only</div><div class=\"row\"><b>Key point:</b> The function schemas visible to narrator/character agents.</div><div class=\"row\"><b>IN:</b> <i>none</i></div><div class=\"row\"><b>OUT:</b> narrator (narrator tools); charMara (character tools)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;narrator_tools&quot;: [\n    &quot;state tools&quot;,\n    &quot;cue_character&quot;,\n    &quot;spawn/kill&quot;,\n    &quot;reject_attempt conditional&quot;,\n    &quot;show_image conditional&quot;\n  ],\n  &quot;character_tools&quot;: [\n    &quot;attack&quot;,\n    &quot;give_item&quot;,\n    &quot;share_past&quot;,\n    &quot;mark_moment&quot;,\n    &quot;admit_trait&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>Deterministic gates</h4><span class=\"kindtag\">tool</span></div><p class=\"sum\">Moves through known exits, validates attack/give, splits public/private.</p><div class=\"row\"><b>Reads / shared input:</b> segments; current scene exits; inventory; present cast</div><div class=\"row\"><b>Generates:</b> public action text; pending attempts; private exchanges; reaction queue</div><div class=\"row\"><b>Writes / mutates:</b> move_location can apply before narrator; system failure beats</div><div class=\"row\"><b>Key point:</b> Moves through known exits, validates attack/give, splits public/private.</div><div class=\"row\"><b>IN:</b> interpreter (segments); input (segments/direct); state (current scene + inventory)</div><div class=\"row\"><b>OUT:</b> narrator (public action + attempts); privateChar (whisper exchange); imageJobs (look/private look)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;pending_attempts&quot;: [\n    &quot;attack/give&quot;\n  ],\n  &quot;public&quot;: [\n    &quot;non-whisper segments&quot;\n  ],\n  &quot;private&quot;: [\n    &quot;whisper segments&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>Tool dispatcher</h4><span class=\"kindtag\">tool</span></div><p class=\"sum\">The only path from LLM proposals into authoritative state.</p><div class=\"row\"><b>Reads / shared input:</b> tool name; arguments; actor character or narrator; SQLite state</div><div class=\"row\"><b>Generates:</b> state receipt; invalid reason; cue; reactions; image_request</div><div class=\"row\"><b>Writes / mutates:</b> SQLite through repo functions</div><div class=\"row\"><b>Key point:</b> The only path from LLM proposals into authoritative state.</div><div class=\"row\"><b>IN:</b> narrator (tool_calls); charMara (character tool_calls)</div><div class=\"row\"><b>OUT:</b> state (validated writes); beats (receipts); charMara (cue/reaction); charSentinel (reaction); privateChar (gift reply impulse)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;apply_tool&quot;: {\n    &quot;name&quot;: &quot;string&quot;,\n    &quot;arguments&quot;: {},\n    &quot;actor&quot;: &quot;null | character row&quot;\n  },\n  &quot;result&quot;: {\n    &quot;kind&quot;: &quot;state | cue | invalid | image | spawn | kill | reject&quot;\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-enhancer\">enhancers (image / voice)</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><h4>Image jobs</h4><span class=\"kindtag\">enhancer</span></div><p class=\"sum\">Non-story media layer. Renders prompts, persists files, then updates rows/beats.</p><div class=\"row\"><b>Reads / shared input:</b> state-grounded prompts; character reference images; media provider</div><div class=\"row\"><b>Generates:</b> scene art; portraits; item cards; look/show_image beats</div><div class=\"row\"><b>Writes / mutates:</b> scenes.image_url; characters.*_url; item.image_url; beats.kind=image; SSE events</div><div class=\"row\"><b>Key point:</b> Non-story media layer. Renders prompts, persists files, then updates rows/beats.</div><div class=\"row\"><b>IN:</b> artdir (opening prompts); narrator (show_image request); gates (look/private look); imagePrompt (prompt string)</div><div class=\"row\"><b>OUT:</b> state (media URLs); apiui (SSE/refetch)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;jobs&quot;: [\n    &quot;generate_scene_image&quot;,\n    &quot;generate_images_for_game&quot;,\n    &quot;generate_item_image&quot;,\n    &quot;generate_view_snapshot&quot;,\n    &quot;generate_directed_image&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><h4>Voice resolver/synth</h4><span class=\"kindtag\">enhancer</span></div><p class=\"sum\">No story agent. It assigns/resolves stable narrator and character voices.</p><div class=\"row\"><b>Reads / shared input:</b> characters.gender/description/persona; voice_design; narrator_gender; audio provider</div><div class=\"row\"><b>Generates:</b> voice_design; voice_id; speech audio on demand</div><div class=\"row\"><b>Writes / mutates:</b> games.narrator_voice_id; characters.voice_design; characters.voice_id; characters.voice_provider</div><div class=\"row\"><b>Key point:</b> No story agent. It assigns/resolves stable narrator and character voices.</div><div class=\"row\"><b>IN:</b> state (identity fields); apiui (speak button)</div><div class=\"row\"><b>OUT:</b> state (voice ids)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;identity&quot;: &quot;assign_voices_for_game&quot;,\n  &quot;playback&quot;: &quot;frontend speakBeat -&gt; /audio/speak&quot;,\n  &quot;story_authority&quot;: &quot;none&quot;\n}</pre></details></div><h3 class=\"group\" id=\"grp-ui\">frontend</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><h4>API + frontend mirror</h4><span class=\"kindtag\">ui</span></div><p class=\"sum\">Receives GameState and beats, maps them, animates reveal, fetches late media.</p><div class=\"row\"><b>Reads / shared input:</b> repo.game_state; /beats; SSE events; voice ids on beats</div><div class=\"row\"><b>Generates:</b> mapped UI state; reveal queue; speak requests</div><div class=\"row\"><b>Writes / mutates:</b> frontend memory only; localStorage PM seen markers</div><div class=\"row\"><b>Key point:</b> Receives GameState and beats, maps them, animates reveal, fetches late media.</div><div class=\"row\"><b>IN:</b> imageJobs (SSE/refetch); explain (aside text); beats (story stream); state (GameState)</div><div class=\"row\"><b>OUT:</b> voice (speak button)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;active&quot;: {\n    &quot;state&quot;: &quot;mapped GameState&quot;,\n    &quot;beats&quot;: &quot;mapped Beat[]&quot;,\n    &quot;revealQueue&quot;: &quot;beat ids&quot;,\n    &quot;profile&quot;: &quot;profile view&quot;\n  }\n}</pre></details></div>","chartHTML": "<p class=\"intro\">Turn input \u2192 interpreter/gates \u2192 narrator (omniscient) \u2192 tool dispatcher \u2192 state/beats. Character agents read only their witnessed window; image and voice jobs read state and produce media/ids without deciding story truth.</p><h3 class=\"group\" id=\"grp-agent\">agent contexts</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"interpreter\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Interpreter agent</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Small LLM call only when typed text arrives without structured segments.</p><div class=\"meta\">free text -&gt; segments \u00b7 IN 1 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"narrator\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Narrator agent</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Omniscient story agent: narration, tool proposals, cues, image requests.</p><div class=\"meta\">main public story pass \u00b7 IN 4 \u00b7 OUT 5</div></div><div class=\"gcard\" data-node=\"resolve\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Narrator resolve</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Second narrator call when tools changed state but no prose landed.</p><div class=\"meta\">dead-air fallback \u00b7 IN 1 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"charMara\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Character agent A</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">One LLM call for one queued character. Example: Mara.</p><div class=\"meta\">public queued instance \u00b7 IN 4 \u00b7 OUT 3</div></div><div class=\"gcard\" data-node=\"charSentinel\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Character agent B</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Same template, separate context and memory. Example: Vault Sentinel.</p><div class=\"meta\">public queued instance \u00b7 IN 3 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"privateChar\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Private character agent</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Same character agent, but every emitted beat is forced into one private thread.</p><div class=\"meta\">whisper / gift reply \u00b7 IN 2 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"summaryGame\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Game summary fold</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Background LLM call compressing older beats into game-level recap.</p><div class=\"meta\">old story -&gt; recap \u00b7 IN 1 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"summaryChar\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Character summary fold</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Background LLM call per character that crossed the witnessed-beat threshold.</p><div class=\"meta\">per-character memory \u00b7 IN 1 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"origin\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Origin enrichment</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Focused LLM pass that fills thin character origins after finalize/import.</p><div class=\"meta\">creation/import backstory \u00b7 IN 1 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"creator\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Creator chat/finalize</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Creation contexts that interview and then emit the initial WorldSheet.</p><div class=\"meta\">world sheet agent \u00b7 IN 0 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"artdir\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Art director agent</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">One optional LLM call at creation for first-sight art prompts.</p><div class=\"meta\">optional creation image prompt \u00b7 IN 1 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"imagePrompt\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Image prompt agent</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Optional LLM call that rewrites state-grounded image context into a FLUX prompt.</p><div class=\"meta\">optional per-render rewrite \u00b7 IN 2 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"explain\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Explain agent</b><span class=\"kindtag\">agent</span></div><p class=\"sum\">Spoiler-safe explanation call for tapped visible things.</p><div class=\"meta\">read-only aside \u00b7 IN 1 \u00b7 OUT 1</div></div></div><h3 class=\"group\" id=\"grp-shared\">shared inputs</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"input\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><b>Turn input</b><span class=\"kindtag\">shared</span></div><p class=\"sum\">The player payload for one turn.</p><div class=\"meta\">action / segments / wish \u00b7 IN 0 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"beats\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><b>Beats windows</b><span class=\"kindtag\">shared</span></div><p class=\"sum\">The transcript source. Public/private beats are filtered per context.</p><div class=\"meta\">recent + witnessed \u00b7 IN 6 \u00b7 OUT 7</div></div><div class=\"gcard\" data-node=\"speechAnswer\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><b>Speech ownership rule</b><span class=\"kindtag\">shared</span></div><p class=\"sum\">Character dialogue beats come from character-agent calls. Narrator content is narration.</p><div class=\"meta\">answer \u00b7 IN 3 \u00b7 OUT 0</div></div></div><h3 class=\"group\" id=\"grp-persist\">state</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"state\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>SQLite state</b><span class=\"kindtag\">persist</span></div><p class=\"sum\">Games, player_state, scenes, characters, quests, lore, beats.</p><div class=\"meta\">single source of truth \u00b7 IN 7 \u00b7 OUT 9</div></div></div><h3 class=\"group\" id=\"grp-tool\">tools</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"toolschemas\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><b>Tool schemas</b><span class=\"kindtag\">tool</span></div><p class=\"sum\">The function schemas visible to narrator/character agents.</p><div class=\"meta\">allowed actions \u00b7 IN 0 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"gates\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><b>Deterministic gates</b><span class=\"kindtag\">tool</span></div><p class=\"sum\">Moves through known exits, validates attack/give, splits public/private.</p><div class=\"meta\">not LLM \u00b7 IN 3 \u00b7 OUT 3</div></div><div class=\"gcard\" data-node=\"dispatcher\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><b>Tool dispatcher</b><span class=\"kindtag\">tool</span></div><p class=\"sum\">The only path from LLM proposals into authoritative state.</p><div class=\"meta\">validated mutation \u00b7 IN 2 \u00b7 OUT 5</div></div></div><h3 class=\"group\" id=\"grp-enhancer\">enhancers (image / voice)</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"imageJobs\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><b>Image jobs</b><span class=\"kindtag\">enhancer</span></div><p class=\"sum\">Non-story media layer. Renders prompts, persists files, then updates rows/beats.</p><div class=\"meta\">media enhancer \u00b7 IN 4 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"voice\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><b>Voice resolver/synth</b><span class=\"kindtag\">enhancer</span></div><p class=\"sum\">No story agent. It assigns/resolves stable narrator and character voices.</p><div class=\"meta\">audio enhancer \u00b7 IN 2 \u00b7 OUT 1</div></div></div><h3 class=\"group\" id=\"grp-ui\">frontend</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"apiui\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><b>API + frontend mirror</b><span class=\"kindtag\">ui</span></div><p class=\"sum\">Receives GameState and beats, maps them, animates reveal, fetches late media.</p><div class=\"meta\">projection / reveal / speech \u00b7 IN 4 \u00b7 OUT 1</div></div></div>"},"infra": {"id": "infra","title": "Infra","dot": "var(--pink)","view": "grouped","subtitle": "The Docker stack: seven services on one bridge network.","panelSections": [{"label": "Lifecycle / profile","field": "lifecycle","type": "text"},{"label": "Config / env / ports","field": "populated","type": "list"},{"label": "Defined in","field": "mutators","type": "list"},{"label": "Talks to / mounts","field": "reads","type" ds": [],"note": "llm-text alone carries profiles: [local]; harness mode selects a profile nothing carries, so only llm-text drops out.","json": {"local_services": "","pin": ""},"help": {"what": "How one boolean swaps the whole backend.","how": ""}},{"id": "net","kind": "infra","label": "gamentic network","sub": "bridge","summary": "The single user-defined bridge network. Every service joins it and resolves peers by container name.","lifecycle": "Created with the project.","populated": ["driver: bridge","DNS by container_name (gamentic-llm-text, gamentic-image-api, ...)"],"mutators": ["docker-compose.yml networks: gamentic"],"reads": ["all 9 services"],"note": "Internal URLs use container names + INTERNAL ports (e.g. voice-api is :8080 inside, :9002 on the host).","json": {"networks": {"gamentic": {"driver": "bridge"}}},"help": {"what": "The container network.","how": "Bridge; name-based service discovery."}},{"id": "vols","kind": "infra","label": "volumes & mounts","sub": "persistent state","summary": "Host-mounted state so nothing important lives inside a container; mostly bind mounts.","lifecycle": "Persist across rebuilds; data dirs gitignored.","populated": ["MODELS_DIR -> /models :ro (bind, gguf)","COMFY_MODELS_DIR + infra/comfyui/data (bind)","voice-api/data (bind)","orchestrator/data: db + /media (bind)"],"mutators": ["docker-compose.yml volumes: + per-service mounts"],"reads": ["the services that mount them"],"note": "The single host dir infra/comfyui/data/output is mounted into BOTH image (writes) and image-api (serves+reclaims).","json": {"models": "${MODELS_DIR}:/models:ro (bind)","orch": "./orchestrator/data:/data (bind)"},"help": {"what": "Where state lives.","how": "Bind mounts + one named volume; models read-only."}},{"id": "frontend","kind": "edge","label": "frontend","sub": "nginx + vanilla SPA","summary": "nginx serving the no-build SPA; reverse-proxies /image /voice /audio same-origin so relative media URLs resolve.","lifecycle": "Always up (no profile). depends_on orchestrator.","populated": ["port ${FRONTEND_PORT:-5173}:80","build ./frontend","image gamentic-frontend"],"mutators": ["docker-compose.yml service frontend","./frontend/Dockerfile"],"reads": ["orchestrator (REST+SSE, CORS)","nginx /image -> image-api, /voice + /audio -> voice-api, /media -> orchestrator"],"note": "Talks to the orchestrator cross-origin; media is reached through the same-origin nginx proxy (resolver 127.0.0.11, lazy upstreams, so nginx starts even if a media service is down).","json": {"container": "gamentic-frontend","ports": ["5173:80"],"depends_on": ["orchestrator"]},"help": {"what": "The browser app server.","how": "Static SPA + media reverse-proxy."}},{"id": "orchestrator","kind": "brain","label": "orchestrator","sub": "the game brain","summary": "FastAPI brain: the REST+SSE API and the turn engine. Talks to inference services by container name.","lifecycle": "Always up (no profile). Holds state in ./orchestrator/data.","populated": ["port ${ORCHESTRATOR_PORT:-8000}:8000","LLM_BASE_URL=http://gamentic-llm-text:8080/v1","IMAGE_API_URL=http://gamentic-image-api:9001","VOICE_API_URL=http://gamentic-voice-api:8080","DB_PATH=/data/gamentic.db"],"mutators": ["docker-compose.yml service orchestrator","./orchestrator (build)","app/config.py defaults"],"reads": ["llm-text (required:false)","image-api + voice-api best-effort"],"note": "depends_on uses required:false so each mode only waits for the backend it actually uses.","json": {"container": "gamentic-orchestrator","ports": ["8000:8000"],"volumes": ["./orchestrator/data:/data"],"depends_on": {"llm-text": "required:false"}},"help": {"what": "The brain container.","how": "FastAPI; talks to peers by name; one DB on a host mount."}},{"id": "llmtext","kind": "inference","label": "llm-text","sub": "Gemma 4 26B-A4B MoE","summary": "The text model: Gemma 4 26B-A4B Heretic (Q4) on llama.cpp server, Vulkan backend (AMD Strix Halo).","lifecycle": "Profile local. Up in the default mode; harne trix Halo).","how": "A hybrid thinking model: thinking is disabled globally for roleplay output speed."},"image": {"what": "ComfyUI (ROCm / TheRock) running FLUX.2 [klein] 4B distilled. Full GPU access on Strix Halo.","how": "Stability env on unified memory avoids VAE-decode checkerboard / ring timeouts."},"imageapi": {"what": "Thin REST adapter: turns POST /image/generate -> {image_url} into a ComfyUI prompt graph.","how": "Mounts the Comfy output dir so DELETE endpoints reclaim files the instant the orchestrator owns its copy."},"llmvoice": {"what": "Maya1-3B (Q4) on llama.cpp server Vulkan, generating SNAC audio tokens.","how": "~80 tok/s on the box = ~1.1x realtime (SNAC needs ~83 tok/s for 1.0x)."},"voiceapi": {"what": "Owns the /voice contract: builds Maya1 prompts, pulls SNAC tokens from llm-voice, decodes to 24kHz on CPU.","how": "POST /voice/speak {text, voice_id} -> {audio_url}. Audio is owned per game_id."}},"groups": [{"id": "host","label": "host & config","nodeIds": ["env","upsh","profiles"]},{"id": "edge","label": "edge (frontend)","nodeIds": ["frontend"]},{"id": "brain","label": "brain (orchestrator)","nodeIds": ["orchestrator"]},{"id": "inference","label": "","nodeIds": ["llmtext","image","imageapi","llmvoice","voiceapi"]},{"id": "","label": "","nodeIds": []},{"id": "infra","label": "network & volumes","nodeIds": ["net","vols"]}],"C": {"brain": "#65d08b","edge": "#7ba7ff","inference": "#e7b75f","host": "#62c8d8","infra": "#aab4a3"},"textHTML": "<h3 class=\"group\" id=\"grp-host\">host &amp; config</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>.env</h4><span class=\"kindtag\">host</span></div><p class=\"sum\">The only config layer. The setup faces (gamentic-setup / setup.html) write it; compose reads it on the next up.</p><div class=\"row\"><b>Lifecycle / profile:</b> Read at every compose up; never baked into an image.</div><div class=\"row\"><b>Config / env / ports:</b> COMPOSE_PROFILES pin; MODELS_DIR, *_PORT, *_GID; LLM_TEXT_MODEL / LLM_VOICE_MODEL; TEXT_/IMAGE_/AUDIO_ provider knobs.</div><div class=\"row\"><b>Defined in:</b> infra/setup/schema.js -&gt; cli.py + setup.html; .env.example is generated from the schema</div><div class=\"row\"><b>Talks to / mounts:</b> docker-compose.yml interpolation; up.sh (reads ); orchestrator env</div><div class=\"row\"><b>Key point:</b> must be the literal true or false: any other value starts NO inference services (compose matches no profile).</div><div class=\"row\"><b>IN:</b> <i>none</i></div><div class=\"row\"><b>OUT:</b> upsh ( + ports); orchestrator (provider + env)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\"></pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>up.sh</h4><span class=\"kindtag\">host</span></div><p class=\"sum\">Wraps docker compose: the default mode runs the full stack, harness mode runs everything but llm-text, then up -d --build.</p><div class=\"row\"><b>Lifecycle / profile:</b> Run by the operator: ./up.sh  (./up.sh down to stop).</div><div class=\"row\"><b>Config / env / ports:</b> refuses non-literal loudly; ALL_PROFILES for cross-mode cleanup</div><div class=\"row\"><b>Defined in:</b> up.sh</div><div class=\"row\"><b>Talks to / mounts:</b> env (); docker compose</div><div class=\"row\"><b>Key point:</b> Compose alone cannot clean up the OTHER mode&#x27;s containers on a flip; up.sh does that one extra thing.</div><div class=\"row\"><b>IN:</b> env ( + ports)</div><div class=\"row\"><b>OUT:</b> profiles (selects world)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\"></pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>COMPOSE_PROFILES</h4><span class=\"kindtag\">host</span></div><p class=\"sum\">Service selection by profile: llm-text alone carries profiles: [local]; harness mode selects a profile nothing carries, so only llm-text drops out.</p><div class=\"row\"><b>Lifecycle / profile:</b> Evaluated by compose at up using .env.</div><div class=\"row\"><b>Config / env / ports:</b> =false -&gt; local names match -&gt; full local stack; =true -&gt.</div><div class=\"row\"><b>Defined in:</b> docker-compose.yml profiles: on each service; .env COMPOSE_PROFILES</div><div class=\"row\"><b>Talks to / mounts:</b> boolean</div><div class=\"row\"><b>Key point:</b> Expansion not restriction: flip and the same up command restores the other world.</div><div class=\"row\"><b>IN:</b> upsh (selects world)</div><div class=\"row\"><b>OUT:</b> llmtext (local profile); image (local profile); imageapi (local profile); llmvoice (local profile); voiceapi (local profile).</div><details><summary>JSON shape</summary><pre class=\"jsonbox\"></pre></details></div><h3 class=\"group\" id=\"grp-edge\">edge (frontend)</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><h4>frontend</h4><span class=\"kindtag\">edge</span></div><p class=\"sum\">nginx serving the no-build SPA; reverse-proxies /image /voice /audio same-origin so relative media URLs resolve.</p><div class=\"row\"><b>Lifecycle / profile:</b> Always up (no profile). depends_on orchestrator.</div><div class=\"row\"><b>Config / env / ports:</b> port ${FRONTEND_PORT:-5173}:80; build ./frontend; image gamentic-frontend</div><div class=\"row\"><b>Defined in:</b> docker-compose.yml service frontend; ./frontend/Dockerfile</div><div class=\"row\"><b>Talks to / mounts:</b> orchestrator (REST+SSE, CORS); nginx /image -&gt; image-api, /voice + /audio -&gt; voice-api, /media -&gt; orchestrator</div><div class=\"row\"><b>Key point:</b> Talks to the orchestrator cross-origin; media is reached through the same-origin nginx proxy (resolver 127.0.0.11, lazy upstreams, so nginx starts even if a media service is down).</div><div class=\"row\"><b>IN:</b> net (bridge)</div><div class=\"row\"><b>OUT:</b> orchestrator (API + SSE (CORS)); imageapi (nginx /image); voiceapi (nginx /voice,/audio)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;container&quot;: &quot;gamentic-frontend&quot;,\n  &quot;ports&quot;: [\n    &quot;5173:80&quot;\n  ],\n  &quot;depends_on&quot;: [\n    &quot;orchestrator&quot;\n  ]\n}</pre></details></div><h3 class=\"group\" id=\"grp-brain\">brain (orchestrator)</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>orchestrator</h4><span class=\"kindtag\">brain</span></div><p class=\"sum\">FastAPI brain: the REST+SSE API and the turn engine. Talks to inference services by container name.</p><div class=\"row\"><b>Lifecycle / profile:</b> Always up (no profile). Holds state in ./orchestrator/data.</div><div class=\"row\"><b>Config / env / ports:</b> port ${ORCHESTRATOR_PORT:-8000}:8000; LLM_BASE_URL=http://gamentic-llm-text:8080/v1; IMAGE_API_URL=http://gamentic-image-api:9001; VOICE_API_URL=http://gamentic-voice-api:8080; DB_PATH=/data/gamentic.db; + TEXT_/IMAGE_/AUDIO_ provider knobs</div><div class=\"row\"><b>Defined in:</b> docker-compose.yml service orchestrator; ./orchestrator (build); app/config.py defaults</div><div class=\"row\"><b>Talks to / mounts:</b> llm-text (required:false); image-api + voice-api best-effort</div><div class=\"row\"><b>Key point:</b> depends_on uses required:false so each mode only waits for the backend it actually uses.</div><div class=\"row\"><b>IN:</b> env (provider + env); frontend (API + SSE (CORS)); vols (orchestrator/data); net (bridge (all join))</div><div class=\"row\"><b>OUT:</b> llmtext (LLM_BASE_URL :8080/v1); imageapi (IMAGE_API_URL :9001); voiceapi (VOICE_API_URL :8080).</div><details><summary>JSON shape</summary><pre class=\"jsonbox\"></pre></details></div><h3 class=\"group\" id=\"grp-infra\">network &amp; volumes</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>gamentic network</h4><span class=\"kindtag\">infra</span></div><p class=\"sum\">The single user-defined bridge network. Every service joins it and resolves peers by container name.</p><div class=\"row\"><b>Lifecycle / profile:</b> Created with the project.</div><div class=\"row\"><b>Config / env / ports:</b> driver: bridge; DNS by container_name (gamentic-llm-text, gamentic-image-api, ...)</div><div class=\"row\"><b>Defined in:</b> docker-compose.yml networks: gamentic</div><div class=\"row\"><b>Talks to / mounts:</b> all 9 services</div><div class=\"row\"><b>Key point:</b> Internal URLs use container names + INTERNAL ports (e.g. voice-api is :8080 inside, :9002 on the host).</div><div class=\"row\"><b>IN:</b> <i>none</i></div><div class=\"row\"><b>OUT:</b> orchestrator (bridge (all join)); frontend (bridge)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;networks&quot;: {\n    &quot;gamentic&quot;: {\n      &quot;driver&quot;: &quot;bridge&quot;\n    }\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>volumes &amp; mounts</h4><span class=\"kindtag\">infra</span></div><div class=\"row\"><b>Lifecycle / profile:</b> Persist across rebuilds; data dirs gitignored.</div><div class=\"row\"><b>Config / env / ports:</b> MODELS_DIR -&gt; /models :ro (bind, gguf); COMFY_MODELS_DIR + infra/comfyui/data (bind); voice-api/data (bind); orchestrator/data: db + /media (bind).</div><div class=\"row\"><b>Defined in:</b> docker-compose.yml volumes: + per-service mounts</div><div class=\"row\"><b>Talks to / mounts:</b> the services that mount them</div><div class=\"row\"><b>Key point:</b> The single host dir infra/comfyui/data/output is mounted into BOTH image (writes) and image-api (serves+reclaims).</div><div class=\"row\"><b>IN:</b> <i>none</i></div><div class=\"row\"><b>OUT:</b> llmtext (models :ro); llmvoice (models :ro); image (comfy models+data); imageapi (comfy output); voiceapi (voice-api/data); orchestrator (orchestrator/data).</div><details><summary>JSON shape</summary><pre class=\"jsonbox\"></pre></details></div>","chartHTML": "<h3 class=\"group\" id=\"grp-host\">host &amp; config</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"env\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><b>.env</b><span class=\"kindtag\">host</span></div><p class=\"sum\">The only config layer. The setup faces (gamentic-setup / setup.html) write it; compose reads it on the next up.</p><div class=\"meta\">single config layer \u00b7 IN 0 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"upsh\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><b>up.sh</b><span class=\"kindtag\">host</span></div><div class=\"meta\">mode-aware launcher \u00b7 IN 1 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"profiles\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><b>COMPOSE_PROFILES</b><span class=\"kindtag\">host</span></div><div class=\"meta\">one profile: [local] \u00b7 IN 1 \u00b7 OUT 7</div></div></div><h3 class=\"group\" id=\"grp-edge\">edge (frontend)</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"frontend\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><b>frontend</b><span class=\"kindtag\">edge</span></div><p class=\"sum\">nginx serving the no-build SPA; reverse-proxies /image /voice /audio same-origin so relative media URLs resolve.</p><div class=\"meta\">nginx + vanilla SPA \u00b7 IN 1 \u00b7 OUT 3</div></div></div><h3 class=\"group\" id=\"grp-brain\">brain (orchestrator)</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"orchestrator\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>orchestrator</b><span class=\"kindtag\">brain</span></div><p class=\"sum\">FastAPI brain: the REST+SSE API and the turn engine. Talks to inference services by container name.</p><div class=\"meta\">the game brain \u00b7 IN 4 \u00b7 OUT 4</div></div></div><h3 class=\"group\" id=\"grp-infra\">network &amp; volumes</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"net\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>gamentic network</b><span class=\"kindtag\">infra</span></div><p class=\"sum\">The single user-defined bridge network. Every service joins it and resolves peers by container name.</p><div class=\"meta\">bridge \u00b7 IN 0 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"vols\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>volumes &amp; mounts</b><span class=\"kindtag\">infra</span></div><div class=\"meta\">persistent state \u00b7 IN 0 \u00b7 OUT 8</div></div></div>"},"folders": {"id": "folders","title": "Folders","dot": "var(--blue)","view": "tree","subtitle": "Where each part of the code lives: an indented tree of the repo, one job per file (from the INDEX maps).","panelSections": [{"label": "One job","field": "lifecycle","type": "text"},{"label": "Key files / dirs","field": "populated","type": "list"},{"label": "Entry / owner","field": "mutators","type": "list"},{"label": "Produces","field": "reads","type": "list"}],"nodes": [{"id": "root","kind": "root","label": "gamentic/","sub": "repo","summary": "Self-hosted AI dungeon RPG monorepo: the game brain (orchestrator), the no-build UI (frontend), the media services (infra, voice-api), the compose stack and the setup faces, all docs.","reads": [],"generates": [],"writes": [".env (via setup faces)"],"mutators": ["up.sh","gamentic-setup","setup.html","docker-compose.yml"],"note": "Writes: .env (via setup faces)","json_shape": {"services": ["orchestrator","frontend","comfyui","image-api","voice-api"],"config": ".env (single layer)"},"lifecycle": "","populated": ["docker-compose.yml","up.sh","gamentic-setup","setup.html","README.md","CHANGELOG.md",".env.example"]},{"id": "orchestrator","kind": "brain","label": "orchestrator/","sub": "brain","summary": "The game brain service: FastAPI orchestrator that resolves one turn per POST, plus its Dockerfile, prompts, tests and SQLite data.","reads": ["one fully-resolved turn per /games/{id}/action"],"generates": ["one fully-resolved turn per /games/{id}/action"],"writes": ["gamentic.db (SQLite, WAL)"],"mutators": ["app/main.py"],"note": "Writes: gamentic.db (SQLite, WAL)","json_shape": {"entrypoint": "app/main.py","db": "gamentic.db"},"lifecycle": "The REST surface plus the turn loop; one turn = one commit.","populated": ["app/","prompts/","tests/","Dockerfile","INDEX.md","requirements.txt"]},{"id": "app","kind": "brain","label": "orchestrator/app/","sub": "package","summary": "The Python package: every route, the turn engine, the tool registry, the SQL layer, media glue, prompts assembly and config; one file/subpackage per concern.","reads": ["resolved GameState + beats"],"generates": ["resolved GameState + beats"],"writes": ["SQLite via repo/"],"mutators": ["app/main.py","app/engine/turn.py"],"note": "Writes: SQLite via repo/","json_shape": {"facades": ["engine","tools","repo","integrate","providers"]},"lifecycle": "Each file has one job; the INDEX is the resolver.","populated": ["main.py","prompts.py","db.py","models.py","config.py","engine/","tools/","repo/","integrate/","providers/","constants.py","voice_design.py"]},{"id": "engine","kind": "brain","label": "app/engine/","sub": "turn-loop","summary": "The turn loop, one module per concern: player beats, deterministic adjudication, the narrator call, the bounded character cascade, whispers, the context meter, prose scrubbing, the new-item diff, background memory folds.","reads": ["adjudicated turn, scrubbed beats, memory folds"],"generates": ["adjudicated turn, scrubbed beats, memory folds"],"writes": ["beats, character/game summaries (via repo)"],"mutators": ["app/engine/turn.py: run_turn","app/engine/parsing.py","app/engine/folds.py"],"note": "Writes: beats, character/game summaries (via repo)","json_shape": {"modules": ["turn.py","parsing.py","folds.py"],"key": "run_turn, interpret_action"},"lifecycle": "The turn loop: run_turn does everything; folds open their own conns.","populated": ["turn.py","parsing.py","folds.py","__init__.py","INDEX.md"]},{"id": "tools","kind": "brain","label": "app/tools/","sub": "registry","summary": "The model's ONLY way to change state: one module per domain, each tool's JSON schema beside its handler, composed by a registry. A tool the schema does not describe does not exist.","reads": ["state-change receipts {kind,text,cue,reactions}"],"generates": ["state-change receipts {kind,text,cue,reactions}"],"writes": ["game state via repo (the only writers)"],"mutators": ["app/tools/base.py: @tool registry","app/tools/__init__.py: apply_tool"],"note": "Writes: game state via repo (the only writers)","json_shape": {"handler": "(conn,gid,args,actor) -> {kind,text,cue,reactions}","kind": "state|cue|memory|invalid|spawn|kill|reject|image"},"lifecycle": "The model's ONLY way to change state.","populated": ["combat.py","items.py","characters.py","progression.py","scene.py","world.py","narrative.py","base.py","__init__.py","INDEX.md"]},{"id": "repo","kind": "brain","label": "app/repo/","sub": "data","summary": "All SQL, one module per domain (games, players, characters, items, scenes, quests, lore, beats, clock, state). Callers just use repo.<fn>; the engine owns the transaction.","reads": ["the assembled GameState the API serves (state.py: game_state)"],"generates": ["the assembled GameState the API serves (state.py: game_state)"],"writes": ["every SQLite table"],"mutators": ["app/repo/state.py: game_state","app/repo/items.py (item-blob rules)"],"note": "Writes: every SQLite table","json_shape": {"assembled_by": "state.py: game_state","items": "JSON lists on owner rows"},"lifecycle": "Data access; one turn = one commit; names normalized on every write.","populated": ["games.py","players.py","characters.py","items.py","scenes.py","quests.py","lore.py","beats.py","clock.py","state.py","base.py","INDEX.md"]},{"id": "integrate","kind": "brain","label": "app/integrate/","sub": "media-glue","summary": "Glue to the media services: image prompt composition (gender net, no-text guard, identity references), voice assignment, media persistence, all background generation jobs. Best-effort: media down never breaks the game.","reads": ["background art/voice jobs, persisted /media files"],"generates": ["background art/voice jobs, persisted /media files"],"writes": ["per-game /media folder, scene/item/character image urls"],"mutators": ["app/integrate/jobs.py","app/integrate/storage.py: _persist","app/integrate/image_prompts.py"],"note": "Writes: per-game /media folder, scene/item/character image urls","json_shape": {"modules": ["voice.py","image_prompts.py","storage.py","jobs.py"]},"lifecycle": "Never hold a DB conn across a render; re-check the game exists before writing.","populated": ["voice.py","image_prompts.py","storage.py","jobs.py","events.py","__init__.py","INDEX.md"]},{"id": "providers","kind": "brain","label": "app/providers/","sub": "providers","summary": "The inference-providers layer: one interface per modality, dialect classes for pure JSON shaping (httpx only, no SDKs), and the config spine. Config resolves at call time (env -> default).","reads": ["resolved ProviderConfig per call (text/image/audio)"],"generates": ["resolved ProviderConfig per call (text/image/audio)"],"writes": ["nothing (stateless dialects)"],"mutators": ["app/providers/image.py","app/providers/audio.py"],"note": "Writes: nothing (stateless dialects)","json_shape": {"modalities": ["text","image","audio"],"dialects": ["comfy","openai","gemini","fal","local","elevenlabs"]},"lifecycle": ".env is the single config layer; defaults reproduce the local stack byte-for-byte.","populated": ["base.py","image.py","audio.py","__init__.py","INDEX.md"]},{"id": "prompts","kind": "brain","label": "orchestrator/prompts/","sub": "prose","summary": "The actual prose of every promp
