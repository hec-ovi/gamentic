ent world state. It informs the narrator but does not mutate by itself."},"beats": {"what": "The story log. It is also the source of narrator history, character witnessed memory, folds, private threads, and late image beats.","how": "Privacy is stored here: private_with + witnesses decides who can remember what."},"charctx": {"what": "A character prompt is built from its persona, private knowledge, own memory summary, own moments/traits, and only beats it witnessed.","how": "A late arrival cannot inherit earlier room talk because beats are witness-stamped."},"cascade": {"what": "Cued characters speak/act with their own context. They can call attack, give_item, share_past, mark_moment, admit_trait.","how": "Whisper-only turns skip the narrator and go directly here."},"folds": {"what": "Background summarizers compress older beats into games.story_summary and characters.memory_summary.","how": "This is the long-context solution: recent beats stay verbatim; older material becomes factual recap."},"media": {"what": "Slow image/voice work runs after the turn and fills URLs or appends image beats when ready.","how": "Late results push SSE events; the frontend refetches state/beats."},"api": {"what": "Every response contains a full view model assembled from SQLite. It is not stored separately.","how": "Frontend truth is replaced from this after every turn."},"ui": {"what": "The browser keeps active game view state: mapped backend state, beats, profile tab, reveal queue, pending media, local settings.","how": "It can animate and cache, but it does not decide game truth."}},"groups": [{"id": "ingest","label": "linear ingestion","nodeIds": ["input","interpret","gates","tools"]},{"id": "boundary","label": "LLM boundary","nodeIds": ["narrator","cascade"]},{"id": "derived","label": "derived context / projection","nodeIds": ["nctx","charctx","api"]},{"id": "persistent","label": "persistent state (SQLite)","nodeIds": ["db","games","player","scenes","characters","quests","lore","beats"]},{"id": "background","label": "history, folds, late media","nodeIds": ["folds","media"]},{"id": "ui","label": "frontend mirror","nodeIds": ["ui"]}],"C": {"ingest": "#e7b75f","persistent": "#65d08b","derived": "#62c8d8","background": "#e47ea5","boundary": "#a895f2","danger": "#ef756f","ui": "#7ba7ff"},"textHTML": "<p class=\"intro\">Player input flows along one line: input \u2192 interpreter \u2192 deterministic gates \u2192 narrator context \u2192 narrator LLM \u2192 tool dispatcher. Below it sits the persistent SQLite state; player_state.location selects the current scene and present cast is derived. The model never owns state.</p><h3 class=\"group\" id=\"grp-ingest\">linear ingestion</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Player input</h4><span class=\"kindtag\">ingest</span></div><p class=\"sum\">The player sends free text or composer-built segments. This is not state yet.</p><div class=\"row\"><b>Lifecycle:</b> Ephemeral request payload.</div><div class=\"row\"><b>Populated with:</b> ActionIn.action: freeform text; ActionIn.segments: say/do/look/attack/give/whisper; wish: hope channel, not an action</div><div class=\"row\"><b>Modified by / where:</b> frontend/src/composer.js: buildSegment; frontend/src/app/turns.js: takeTurn; orchestrator/app/models.py: ActionIn</div><div class=\"row\"><b>Read by:</b> Current UI state for chips, target names, inventory ids.</div><div class=\"row\"><b>Key point:</b> Free text may be reinterpreted before the turn. Structured segments skip that LLM step.</div><div class=\"row\"><b>IN:</b> <i>none</i></div><div class=\"row\"><b>OUT:</b> interpret (typed only); gates (segments)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;action&quot;: &quot;string | null&quot;,\n  &quot;wish&quot;: &quot;string | null&quot;,\n  &quot;segments&quot;: [\n    {\n      &quot;type&quot;: &quot;say | do | look | attack | give | whisper&quot;,\n      &quot;text&quot;: &quot;string&quot;,\n      &quot;target&quot;: &quot;character id/name | null&quot;,\n      &quot;item&quot;: &quot;item id/name | null&quot;,\n      &quot;amount&quot;: &quot;number | null&quot;,\n      &quot;mode&quot;: &quot;say | do | look | null&quot;,\n      &quot;refs&quot;: [\n        {\n          &quot;kind&quot;: &quot;character | item&quot;,\n          &quot;id&quot;: &quot;string&quot;,\n          &quot;name&quot;: &quot;string&quot;\n        }\n      ]\n    }\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Interpreter</h4><span class=\"kindtag\">ingest</span></div><p class=\"sum\">A small one-call agent normalizes typed input into the same segment contract as the UI composer.</p><div class=\"row\"><b>Lifecycle:</b> Optional and stateless.</div><div class=\"row\"><b>Populated with:</b> submit_segments tool result; max 6 interpreted segments accepted by engine</div><div class=\"row\"><b>Modified by / where:</b> orchestrator/app/engine/turn.py: interpret_action; orchestrator/app/prompts.py: build_interpret_messages</div><div class=\"row\"><b>Read by:</b> player_state.inventory; present characters at player_state.location</div><div class=\"row\"><b>Key point:</b> Failure falls back to raw text, so this does not block a turn.</div><div class=\"row\"><b>IN:</b> input (typed only)</div><div class=\"row\"><b>OUT:</b> gates (segments)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;tool&quot;: &quot;submit_segments&quot;,\n  &quot;arguments&quot;: {\n    &quot;segments&quot;: [\n      {\n        &quot;type&quot;: &quot;say | do | attack | give | whisper | look&quot;,\n        &quot;text&quot;: &quot;faithful short text&quot;,\n        &quot;target&quot;: &quot;present character name when clear&quot;,\n        &quot;item&quot;: &quot;inventory item when clear&quot;,\n        &quot;amount&quot;: &quot;only if stated&quot;,\n        &quot;mode&quot;: &quot;say | do&quot;\n      }\n    ]\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Deterministic gates</h4><span class=\"kindtag\">ingest</span></div><p class=\"sum\">Plain code handles movement through known exits, impossible attempts, echo beats, and the automatic story-clock tick before narrator reasoning.</p><div class=\"row\"><b>Lifecycle:</b> Runs every public turn.</div><div class=\"row\"><b>Populated with:</b> player beat; system rejection beats; pending attack/give attempts; arrival_note on return</div><div class=\"row\"><b>Modified by / where:</b> run_turn; _compose; _match_exit; _why_impossible; repo.advance_time</div><div class=\"row\"><b>Read by:</b> player_state.location; scenes.exits; characters location/present/alive; player inventory</div><div class=\"row\"><b>Key point:</b> This is where the engine prevents the model from narrating impossible handovers or attacks as successful.</div><div class=\"row\"><b>IN:</b> interpret (segments); input (segments)</div><div class=\"row\"><b>OUT:</b> nctx (public turn)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;turn_scratch&quot;: {\n    &quot;turn_index&quot;: &quot;next beat turn&quot;,\n    &quot;action_text&quot;: &quot;composed public action&quot;,\n    &quot;directed&quot;: [\n      {\n        &quot;tool&quot;: &quot;attack | give_item | _address&quot;,\n        &quot;args&quot;: {}\n      }\n    ],\n    &quot;pending_attempts&quot;: [\n      {\n        &quot;family&quot;: &quot;attack | give&quot;,\n        &quot;line&quot;: &quot;for narrator&quot;,\n        &quot;handled&quot;: false,\n        &quot;rejected&quot;: false\n      }\n    ],\n    &quot;failures&quot;: [\n      &quot;friendly system beat text&quot;\n    ],\n    &quot;queue&quot;: [\n      &quot;character ids to react&quot;\n    ]\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Tool dispatcher</h4><span class=\"kindtag\">ingest</span></div><p class=\"sum\">Every model mutation goes through a registered tool handler. Unknown or bad calls return invalid, not a crash.</p><div class=\"row\"><b>Lifecycle:</b> Runs for narrator and character tool calls.</div><div class=\"row\"><b>Populated with:</b> state receipts; cue targets; reactions queue; invalid reasons; image requests</div><div class=\"row\"><b>Modified by / where:</b> orchestrator/app/tools/__init__.py: apply_tool; tools/* handlers</div><div class=\"row\"><b>Read by:</b> Current DB rows for validation and normalization.</div><div class=\"row\"><b>Key point:</b> This is the hard boundary between fiction and stored state.</div><div class=\"row\"><b>IN:</b> narrator (tool_calls); cascade (character tools)</div><div class=\"row\"><b>OUT:</b> db (validated writes); beats (receipts); charctx (cue_character)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;result&quot;: {\n    &quot;kind&quot;: &quot;state | cue | memory | invalid | spawn | kill | reject | image&quot;,\n    &quot;text&quot;: &quot;system receipt | image description | invalid reason | null&quot;,\n    &quot;cue&quot;: {\n      &quot;id&quot;: &quot;character id&quot;,\n      &quot;name&quot;: &quot;name&quot;,\n      &quot;reason&quot;: &quot;why cued&quot;\n    },\n    &quot;reactions&quot;: [\n      &quot;character ids&quot;\n    ]\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-boundary\">LLM boundary</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>Narrator LLM</h4><span class=\"kindtag\">boundary</span></div><p class=\"sum\">The narrator reasons about next state, writes prose, and proposes tool calls. It does not directly own state.</p><div class=\"row\"><b>Lifecycle:</b> One call per public turn, plus a short resolve pass only if needed.</div><div class=\"row\"><b>Populated with:</b> assistant content; OpenAI-style tool_calls; usage.prompt_tokens</div><div class=\"row\"><b>Modified by / where:</b> orchestrator/app/llm.py: chat; orchestrator/prompts/narrator.system.md</div><div class=\"row\"><b>Read by:</b> The prompt stack only.</div><div class=\"row\"><b>Key point:</b> Tool calls are proposals until the dispatcher validates them.</div><div class=\"row\"><b>IN:</b> nctx (messages)</div><div class=\"row\"><b>OUT:</b> tools (tool_calls); beats (narration)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;content&quot;: &quot;scrubbed into narration beat&quot;,\n  &quot;tool_calls&quot;: [\n    {\n      &quot;name&quot;: &quot;tool_name&quot;,\n      &quot;arguments&quot;: {}\n    }\n  ],\n  &quot;finish_reason&quot;: &quot;stop | length | tool_calls&quot;,\n  &quot;usage&quot;: {\n    &quot;prompt_tokens&quot;: 0,\n    &quot;completion_tokens&quot;: 0,\n    &quot;total_tokens&quot;: 0\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>Character LLMs</h4><span class=\"kindtag\">boundary</span></div><p class=\"sum\">Cued characters speak/act with their own context. They can call attack, give_item, share_past, mark_moment, admit_trait.</p><div class=\"row\"><b>Lifecycle:</b> Only when cued or privately addressed.</div><div class=\"row\"><b>Populated with:</b> dialogue/action beats; character tool calls; private replies</div><div class=\"row\"><b>Modified by / where:</b> _character_reply; parse_character_output_with_marks</div><div class=\"row\"><b>Read by:</b> character context</div><div class=\"row\"><b>Key point:</b> Whisper-only turns skip the narrator and go directly here.</div><div class=\"row\"><b>IN:</b> charctx (messages)</div><div class=\"row\"><b>OUT:</b> tools (character tools); beats (dialogue/action)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;raw_reply&quot;: &quot;[say]...[/say][do]...[/do]&quot;,\n  &quot;parsed_segments&quot;: [\n    {\n      &quot;kind&quot;: &quot;say | do | whisper&quot;,\n      &quot;text&quot;: &quot;clean display text&quot;,\n      &quot;emotion&quot;: &quot;tone&quot;\n    }\n  ],\n  &quot;tool_calls&quot;: [\n    {\n      &quot;name&quot;: &quot;attack | give_item | share_past | mark_moment | admit_trait&quot;,\n      &quot;arguments&quot;: {}\n    }\n  ],\n  &quot;emitted_beats&quot;: [\n    &quot;dialogue/action beats&quot;\n  ]\n}</pre></details></div><h3 class=\"group\" id=\"grp-derived\">derived context / projection</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>Narrator context</h4><span class=\"kindtag\">derived</span></div><p class=\"sum\">The narrator prompt is rebuilt from current state, recent beats, folded recap, lore, and situational protocol blocks.</p><div class=\"row\"><b>Lifecycle:</b> Derived per narrator call; never stored.</div><div class=\"row\"><b>Populated with:</b> GAME STATE block; STORY SO FAR; EARLIER CHAPTERS; tool error feedback; look/new-place/returning/attempt blocks</div><div class=\"row\"><b>Modified by / where:</b> orchestrator/app/prompts.py: build_narrator_messages; _state_block; _situation_blocks</div><div class=\"row\"><b>Read by:</b> games; player_state; characters; scenes; quests; lore; beats</div><div class=\"row\"><b>Key point:</b> This is the main context-engineering seam.</div><div class=\"row\"><b>IN:</b> gates (public turn); beats (recent + recap); games (global state); scenes (place state); characters (cast state); quests (progression); lore (matched facts)</div><div class=\"row\"><b>OUT:</b> narrator (messages)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;narrator.system + state + situational blocks + lore&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;summary + transcript + tool_errors + player action + attempts + wish&quot;\n    }\n  ],\n  &quot;tools&quot;: [\n    &quot;NARRATOR_TOOLS&quot;,\n    &quot;reject_attempt when pending&quot;,\n    &quot;show_image when images on&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>Character context</h4><span class=\"kindtag\">derived</span></div><p class=\"sum\">A character prompt is built from its persona, private knowledge, own memory summary, own moments/traits, and only beats it witnessed.</p><div class=\"row\"><b>Lifecycle:</b> Derived per character call.</div><div class=\"row\"><b>Populated with:</b> WHAT YOU REMEMBER; CURRENT SCENE transcript; YOUR STATE; present roster; trait anchor</div><div class=\"row\"><b>Modified by / where:</b> build_character_messages; witnessed_beats_for_character</div><div class=\"row\"><b>Read by:</b> characters; beats; player_state</div><div class=\"row\"><b>Key point:</b> A late arrival cannot inherit earlier room talk because beats are witness-stamped.</div><div class=\"row\"><b>IN:</b> tools (cue_character); beats (witnessed window); characters (persona + memory)</div><div class=\"row\"><b>OUT:</b> cascade (messages)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;character.system + persona + private knowledge + state&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;memory block + witnessed transcript + directed impulse&quot;\n    }\n  ],\n  &quot;tools&quot;: [\n    &quot;attack&quot;,\n    &quot;give_item&quot;,\n    &quot;share_past&quot;,\n    &quot;mark_moment&quot;,\n    &quot;admit_trait&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>GameState API</h4><span class=\"kindtag\">derived</span></div><p class=\"sum\">Every response contains a full view model assembled from SQLite. It is not stored separately.</p><div class=\"row\"><b>Lifecycle:</b> Derived on /state and turn responses.</div><div class=\"row\"><b>Populated with:</b> current scene; visible items; present characters; available actions; meters; clock; quests</div><div class=\"row\"><b>Modified by / where:</b> repo.game_state</div><div class=\"row\"><b>Read by:</b> games; player_state; scenes; characters; quests</div><div class=\"row\"><b>Key point:</b> Frontend truth is replaced from this after every turn.</div><div class=\"row\"><b>IN:</b> db (game_state())</div><div class=\"row\"><b>OUT:</b> ui (full replacement)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;turn_response&quot;: {\n    &quot;beats&quot;: [\n      &quot;Beat[] just created this turn&quot;\n    ],\n    &quot;state&quot;: &quot;GameState&quot;\n  },\n  &quot;GameState&quot;: {\n    &quot;game_id&quot;: &quot;gid&quot;,\n    &quot;title&quot;: &quot;string&quot;,\n    &quot;status&quot;: &quot;active | won | lost&quot;,\n    &quot;current_goal&quot;: &quot;string&quot;,\n    &quot;scene&quot;: &quot;SceneOut&quot;,\n    &quot;player&quot;: &quot;PlayerStateOut&quot;,\n    &quot;characters&quot;: [\n      &quot;CharacterOut&quot;\n    ],\n    &quot;quests&quot;: [\n      &quot;QuestOut&quot;\n    ],\n    &quot;context&quot;: {\n      &quot;used&quot;: 0,\n      &quot;max&quot;: 131072\n    },\n    &quot;settings&quot;: {\n      &quot;difficulty&quot;: &quot;normal&quot;,\n      &quot;history_beats&quot;: 80,\n      &quot;context_tokens&quot;: 0\n    },\n    &quot;time&quot;: {\n      &quot;minutes&quot;: 0,\n      &quot;day&quot;: 1,\n      &quot;hour&quot;: 8,\n      &quot;part&quot;: &quot;morning&quot;,\n      &quot;label&quot;: &quot;Day 1, morning&quot;\n    }\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-persistent\">persistent state (SQLite)</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>SQLite</h4><span class=\"kindtag\">persistent</span></div><p class=\"sum\">The model never owns state. SQLite does. One turn holds one transaction, then returns a full state snapshot.</p><div class=\"row\"><b>Lifecycle:</b> Always present while the game exists.</div><div class=\"row\"><b>Populated with:</b> games; player_state; characters; scenes; quests/objectives; lore; beats</div><div class=\"row\"><b>Modified by / where:</b> orchestrator/app/db.py: get_conn; repo/*; tools/*</div><div class=\"row\"><b>Read by:</b> all prompts; API state; background jobs; frontend via REST</div><div class=\"row\"><b>Key point:</b> A turn can be slow because the transaction spans LLM calls.</div><div class=\"row\"><b>IN:</b> tools (validated writes)</div><div class=\"row\"><b>OUT:</b> games (table); player (table); scenes (table); characters (table); quests (table); lore (table); beats (table); media (state-grounded prompts); api (game_state())</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;games&quot;: &quot;global row&quot;,\n  &quot;player_state&quot;: &quot;hero row&quot;,\n  &quot;characters&quot;: &quot;cast rows&quot;,\n  &quot;scenes&quot;: &quot;place rows&quot;,\n  &quot;quests&quot;: &quot;quest rows + objective rows&quot;,\n  &quot;lore&quot;: &quot;fact rows&quot;,\n  &quot;beats&quot;: &quot;story log rows&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>games</h4><span class=\"kindtag\">persistent</span></div><p class=\"sum\">World identity, story FSM, clock, current goal, memory folds, settings, and context meter.</p><div class=\"row\"><b>Lifecycle:</b> Created once by create_game; deleted with the adventure.</div><div class=\"row\"><b>Populated with:</b> title/setting/tone/opening_scenario/art_style; status: active|won|lost; current_goal; time_minutes; story_summary; last_tool_errors; history/context/turn pacing dials</div><div class=\"row\"><b>Modified by / where:</b> create_game; set_goal; set_game_status; advance_time; remember; maybe_update_summary; PATCH /settings; run_turn post checks</div><div class=\"row\"><b>Read by:</b> narrator context; state API; image prompt style; clock labels</div><div class=\"row\"><b>Key point:</b> Always there. It is not the world; it is the global control row.</div><div class=\"row\"><b>IN:</b> db (table); folds (story_summary)</div><div class=\"row\"><b>OUT:</b> nctx (global state)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;id&quot;: &quot;gid&quot;,\n  &quot;title&quot;: &quot;string&quot;,\n  &quot;setting&quot;: &quot;string&quot;,\n  &quot;tone&quot;: &quot;string&quot;,\n  &quot;narrator_persona&quot;: &quot;string&quot;,\n  &quot;opening_scenario&quot;: &quot;string&quot;,\n  &quot;art_style&quot;: &quot;string&quot;,\n  &quot;status&quot;: &quot;active | won | lost&quot;,\n  &quot;current_goal&quot;: &quot;string&quot;,\n  &quot;time_minutes&quot;: 0,\n  &quot;arrival_note&quot;: &quot;transient return note&quot;,\n  &quot;difficulty&quot;: &quot;easy | normal | hard&quot;,\n  &quot;memory&quot;: &quot;- durable fact&quot;,\n  &quot;story_summary&quot;: &quot;folded older story&quot;,\n  &quot;summarized_through&quot;: 0,\n  &quot;context_used&quot;: 0,\n  &quot;last_tool_errors&quot;: [\n    &quot;fed back once&quot;\n  ],\n  &quot;history_beats&quot;: 0,\n  &quot;summary_every&quot;: 0,\n  &quot;context_tokens&quot;: 0,\n  &quot;turn_voices&quot;: 0,\n  &quot;turn_acts&quot;: 0\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>player_state</h4><span class=\"kindtag\">persistent</span></div><p class=\"sum\">The hero row. Its location is the pointer that selects the current scene and present cast.</p><div class=\"row\"><b>Lifecycle:</b> Created once by create_game.</div><div class=\"row\"><b>Populated with:</b> life/max_life; points; location; inventory; flags</div><div class=\"row\"><b>Modified by / where:</b> set_location; apply_damage/heal; award_points; add/remove/give/take_item; set_flag</div><div class=\"row\"><b>Read by:</b> current_scene(); present_characters(); narrator state block; UI state</div><div class=\"row\"><b>Key point:</b> Your intuition is correct: current stage is not a separate object. It is scenes[player_state.location].</div><div class=\"row\"><b>IN:</b> db (table)</div><div class=\"row\"><b>OUT:</b> scenes (location -&gt; current scene); characters (location -&gt; present cast)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;game_id&quot;: &quot;gid&quot;,\n  &quot;life&quot;: 20,\n  &quot;max_life&quot;: 20,\n  &quot;points&quot;: 0,\n  &quot;location&quot;: &quot;scene name key&quot;,\n  &quot;inventory&quot;: [\n    {\n      &quot;id&quot;: &quot;item id&quot;,\n      &quot;name&quot;: &quot;item&quot;,\n      &quot;description&quot;: &quot;string&quot;,\n      &quot;qty&quot;: 1,\n      &quot;image_url&quot;: &quot;url | null&quot;\n    }\n  ],\n  &quot;flags&quot;: {\n    &quot;flag_key&quot;: &quot;value&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>scenes</h4><span class=\"kindtag\">persistent</span></div><p class=\"sum\">All places that exist. Start scene is seeded; other scenes are created when movement first points to them.</p><div class=\"row\"><b>Lifecycle:</b> Populated over play. Rows persist even after leaving.</div><div class=\"row\"><b>Populated with:</b> name; description: empty means NEW PLACE; background; status; exits; items; left_at_minutes; draft; image_url</div><div class=\"row\"><b>Modified by / where:</b> get_or_create_scene; move_location/set_location; describe_scene; set_scene_status; add_exit; place/reveal/take_item; note_scene; generate_scene_image</div><div class=\"row\"><b>Read by:</b> narrator state block; movement router; image prompts; state API</div><div class=\"row\"><b>Key point:</b> History feeds scenes through draft + left_at_minutes. Returning sets arrival_note so the narrator can make elapsed changes real.</div><div class=\"row\"><b>IN:</b> db (table); player (location -&gt; current scene); media (scene art)</div><div class=\"row\"><b>OUT:</b> nctx (place state)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;id&quot;: &quot;scene id&quot;,\n  &quot;game_id&quot;: &quot;gid&quot;,\n  &quot;name&quot;: &quot;location key&quot;,\n  &quot;description&quot;: &quot;card text; empty means new place&quot;,\n  &quot;background&quot;: &quot;deeper place context&quot;,\n  &quot;status&quot;: &quot;calm | tense | dangerous&quot;,\n  &quot;exits&quot;: [\n    {\n      &quot;id&quot;: &quot;exit id&quot;,\n      &quot;label&quot;: &quot;button label&quot;,\n      &quot;target&quot;: &quot;scene name&quot;\n    }\n  ],\n  &quot;items&quot;: [\n    {\n      &quot;id&quot;: &quot;item id&quot;,\n      &quot;name&quot;: &quot;item&quot;,\n      &quot;description&quot;: &quot;string&quot;,\n      &quot;hidden&quot;: false,\n      &quot;fixed&quot;: false,\n      &quot;image_url&quot;: &quot;url | null&quot;\n    }\n  ],\n  &quot;offers&quot;: [\n    {\n      &quot;id&quot;: &quot;offer id&quot;,\n      &quot;label&quot;: &quot;action label&quot;\n    }\n  ],\n  &quot;visited&quot;: 1,\n  &quot;left_at_minutes&quot;: &quot;number | null&quot;,\n  &quot;draft&quot;: &quot;open threads left here&quot;,\n  &quot;image_url&quot;: &quot;url | null&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>characters</h4><span class=\"kindtag\">persistent</span></div><p class=\"sum\">Each row is both a stateful character and the seed for a separate character agent context.</p><div class=\"row\"><b>Lifecycle:</b> Created at world start or via spawn_character. Death sets alive=0; row remains.</div><div class=\"row\"><b>Populated with:</b> persona/knowledge/origin; gender/appearance/voice/image identity; location/present/following/alive; life; disposition; relation; inventory; traits; moments; memory_summary; context_used</div><div class=\"row\"><b>Modified by / where:</b> spawn_character; kill_character; set_following; set_disposition; set_relation; describe_character; note_trait; note_moment; reveal_origin; give_item; apply_damage/heal; character summary folds</div><div class=\"row\"><b>Read by:</b> narrator state block; character prompts; present cast; profile endpoint; voice/image jobs</div><div class=\"row\"><b>Key point:</b> Actual present characters are computed: alive + present + same location as player.</div><div class=\"row\"><b>IN:</b> db (table); player (location -&gt; present cast); folds (memory_summary); media (portraits/voice)</div><div class=\"row\"><b>OUT:</b> nctx (cast state); charctx (persona + memory)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;id&quot;: &quot;character id&quot;,\n  &quot;game_id&quot;: &quot;gid&quot;,\n  &quot;name&quot;: &quot;Mara&quot;,\n  &quot;persona&quot;: &quot;agent system context&quot;,\n  &quot;knowledge&quot;: &quot;private knowledge&quot;,\n  &quot;origin&quot;: &quot;full private backstory&quot;,\n  &quot;origin_revealed&quot;: [\n    {\n      &quot;id&quot;: &quot;fact id&quot;,\n      &quot;text&quot;: &quot;learned fact&quot;,\n      &quot;minutes&quot;: 0\n    }\n  ],\n  &quot;gender&quot;: &quot;female | male | &#x27;&#x27;&quot;,\n  &quot;relation&quot;: &quot;ally | rival | sister | ...&quot;,\n  &quot;disposition&quot;: &quot;friendly | neutral | hostile | unknown&quot;,\n  &quot;location&quot;: &quot;scene name&quot;,\n  &quot;present&quot;: 1,\n  &quot;following&quot;: 0,\n  &quot;alive&quot;: 1,\n  &quot;life&quot;: 10,\n  &quot;max_life&quot;: 10,\n  &quot;inventory&quot;: [\n    {\n      &quot;id&quot;: &quot;item id&quot;,\n      &quot;name&quot;: &quot;item&quot;,\n      &quot;hidden&quot;: false\n    }\n  ],\n  &quot;traits&quot;: [\n    {\n      &quot;id&quot;: &quot;trait id&quot;,\n      &quot;text&quot;: &quot;trait&quot;,\n      &quot;minutes&quot;: 0\n    }\n  ],\n  &quot;moments&quot;: [\n    {\n      &quot;id&quot;: &quot;moment id&quot;,\n      &quot;text&quot;: &quot;pivotal event&quot;,\n      &quot;minutes&quot;: 0\n    }\n  ],\n  &quot;offers&quot;: [\n    {\n      &quot;id&quot;: &quot;offer id&quot;,\n      &quot;label&quot;: &quot;button&quot;\n    }\n  ],\n  &quot;memory_summary&quot;: &quot;private folded witnessed memory&quot;,\n  &quot;summarized_through&quot;: 0,\n  &quot;context_used&quot;: 0,\n  &quot;voice_id&quot;: &quot;provider voice id&quot;,\n  &quot;face_url&quot;: &quot;url | null&quot;,\n  &quot;body_front_url&quot;: &quot;url | null&quot;,\n  &quot;body_side_url&quot;: &quot;url | null&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>quests + objectives</h4><span class=\"kindtag\">persistent</span></div><p class=\"sum\">Active goals and objective checklists. The current goal also lives on games.current_goal.</p><div class=\"row\"><b>Lifecycle:</b> Seeded at creation; can grow during play.</div><div class=\"row\"><b>Populated with:</b> quest title/description/status; objective text/done/progress</div><div class=\"row\"><b>Modified by / where:</b> start_quest; update_objective; complete_quest; fail_quest; set_goal</div><div class=\"row\"><b>Read by:</b> narrator state block; state API; transition notices</div><div class=\"row\"><b>Key point:</b> Quest state is explicit; prose alone does not complete objectives.</div><div class=\"row\"><b>IN:</b> db (table)</div><div class=\"row\"><b>OUT:</b> nctx (progression)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;quest&quot;: {\n    &quot;id&quot;: &quot;quest id&quot;,\n    &quot;game_id&quot;: &quot;gid&quot;,\n    &quot;title&quot;: &quot;Quest&quot;,\n    &quot;description&quot;: &quot;string&quot;,\n    &quot;status&quot;: &quot;active | done | failed&quot;\n  },\n  &quot;objective&quot;: {\n    &quot;id&quot;: &quot;objective id&quot;,\n    &quot;quest_id&quot;: &quot;quest id&quot;,\n    &quot;text&quot;: &quot;objective text&quot;,\n    &quot;done&quot;: 0,\n    &quot;progress&quot;: &quot;string | null&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>lore</h4><span class=\"kindtag\">persistent</span></div><p class=\"sum\">World facts injected only when constant or keyword-matched against the current action/recent history.</p><div class=\"row\"><b>Lifecycle:</b> Mostly creation-time static.</div><div class=\"row\"><b>Populated with:</b> keys; content; constant; priority</div><div class=\"row\"><b>Modified by / where:</b> create_game; transfer import</div><div class=\"row\"><b>Read by:</b> match_lore -&gt; narrator context</div><div class=\"row\"><b>Key point:</b> Lore is context, not current world state. It informs the narrator but does not mutate by itself.</div><div class=\"row\"><b>IN:</b> db (table)</div><div class=\"row\"><b>OUT:</b> nctx (matched facts)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;id&quot;: &quot;lore id&quot;,\n  &quot;game_id&quot;: &quot;gid&quot;,\n  &quot;keys&quot;: [\n    &quot;keyword&quot;\n  ],\n  &quot;content&quot;: &quot;world fact&quot;,\n  &quot;constant&quot;: 0,\n  &quot;priority&quot;: 0,\n  &quot;discovered&quot;: 0\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>beats</h4><span class=\"kindtag\">persistent</span></div><p class=\"sum\">The story log. It is also the source of narrator history, character witnessed memory, folds, private threads, and late image beats.</p><div class=\"row\"><b>Lifecycle:</b> Append-only unless history is explicitly cleared.</div><div class=\"row\"><b>Populated with:</b> turn_index/seq; speaker/kind/text; location; private_with; witnesses; emotion; image_url/audio_url</div><div class=\"row\"><b>Modified by / where:</b> repo.add_beat from run_turn; creator opening beat; background image jobs</div><div class=\"row\"><b>Read by:</b> recent_beats; witnessed_beats_for_character; summary folds; frontend story stream</div><div class=\"row\"><b>Key point:</b> Privacy is stored here: private_with + witnesses decides who can remember what.</div><div class=\"row\"><b>IN:</b> db (table); tools (receipts); narrator (narration); cascade (dialogue/action); media (image beats)</div><div class=\"row\"><b>OUT:</b> nctx (recent + recap); charctx (witnessed window); folds (old history); ui (story stream)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;id&quot;: &quot;beat id&quot;,\n  &quot;game_id&quot;: &quot;gid&quot;,\n  &quot;turn_index&quot;: 1,\n  &quot;seq&quot;: 0,\n  &quot;speaker&quot;: &quot;narrator | player | character_id | system&quot;,\n  &quot;speaker_name&quot;: &quot;display name | null&quot;,\n  &quot;kind&quot;: &quot;narration | dialogue | action | system | image&quot;,\n  &quot;text&quot;: &quot;stored clean text or image caption&quot;,\n  &quot;location&quot;: &quot;scene name&quot;,\n  &quot;private_with&quot;: &quot;character id | null&quot;,\n  &quot;witnesses&quot;: [\n    &quot;character ids who perceived it&quot;\n  ],\n  &quot;emotion&quot;: &quot;angry | whisper | ... | &#x27;&#x27;&quot;,\n  &quot;image_url&quot;: &quot;url | null&quot;,\n  &quot;audio_url&quot;: &quot;url | null&quot;\n}</pre></details></div><h3 class=\"group\" id=\"grp-background\">history, folds, late media</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><h4>Memory folds</h4><span class=\"kindtag\">background</span></div><p class=\"sum\">Background summarizers compress older beats into games.story_summary and characters.memory_summary.</p><div class=\"row\"><b>Lifecycle:</b> Async after turns, cadence-gated.</div><div class=\"row\"><b>Populated with:</b> story_summary; character memory_summary; summarized_through cursors</div><div class=\"row\"><b>Modified by / where:</b> maybe_update_summary; maybe_update_character_summaries</div><div class=\"row\"><b>Read by:</b> beats; characters.alive</div><div class=\"row\"><b>Key point:</b> This is the long-context solution: recent beats stay verbatim; older material becomes factual recap.</div><div class=\"row\"><b>IN:</b> beats (old history)</div><div class=\"row\"><b>OUT:</b> games (story_summary); characters (memory_summary)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;game_fold&quot;: {\n    &quot;source&quot;: &quot;beats older than keep window&quot;,\n    &quot;writes&quot;: {\n      &quot;games&quot;: {\n        &quot;story_summary&quot;: &quot;text&quot;,\n        &quot;summarized_through&quot;: 0\n      }\n    }\n  },\n  &quot;character_fold&quot;: {\n    &quot;source&quot;: &quot;witnessed beats only&quot;,\n    &quot;writes&quot;: {\n      &quot;characters&quot;: {\n        &quot;memory_summary&quot;: &quot;text&quot;,\n        &quot;summarized_through&quot;: 0\n      }\n    }\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><h4>Media jobs</h4><span class=\"kindtag\">background</span></div><p class=\"sum\">Slow image/voice work runs after the turn and fills URLs or appends image beats when ready.</p><div class=\"row\"><b>Lifecycle:</b> Async and idempotent.</div><div class=\"row\"><b>Populated with:</b> scene.image_url; character face/body URLs; item image_url; image beats</div><div class=\"row\"><b>Modified by / where:</b> generate_scene_image; generate_view_snapshot; generate_directed_image; generate_item_image; assign_voices_for_game</div><div class=\"row\"><b>Read by:</b> game style; current scene; present characters; recent beats</div><div class=\"row\"><b>Key point:</b> Late results push SSE events; the frontend refetches state/beats.</div><div class=\"row\"><b>IN:</b> db (state-grounded prompts)</div><div class=\"row\"><b>OUT:</b> scenes (scene art); characters (portraits/voice); beats (image beats)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;event&quot;: {\n    &quot;kind&quot;: &quot;scene | portrait | item | beat&quot;,\n    &quot;game_id&quot;: &quot;gid&quot;\n  },\n  &quot;writes&quot;: {\n    &quot;scenes&quot;: {\n      &quot;image_url&quot;: &quot;/media/gid/images/scene.png&quot;\n    },\n    &quot;characters&quot;: {\n      &quot;face_url&quot;: &quot;/media/...&quot;,\n      &quot;body_front_url&quot;: &quot;/media/...&quot;\n    },\n    &quot;beats&quot;: {\n      &quot;kind&quot;: &quot;image&quot;,\n      &quot;image_url&quot;: &quot;/media/...&quot;,\n      &quot;text&quot;: &quot;caption&quot;\n    }\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-ui\">frontend mirror</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><h4>Frontend state</h4><span class=\"kindtag\">ui</span></div><p class=\"sum\">The browser keeps active game view state: mapped backend state, beats, profile tab, reveal queue, pending media, local settings.</p><div class=\"row\"><b>Lifecycle:</b> In-memory and reloadable from backend.</div><div class=\"row\"><b>Populated with:</b> active.state; active.beats; generating; revealQueue; pendingView; profile; composer</div><div class=\"row\"><b>Modified by / where:</b> frontend/src/app/turns.js: resolveTurn; mediastream.js; reveal.js</div><div class=\"row\"><b>Read by:</b> GameState API; beats endpoint; SSE events</div><div class=\"row\"><b>Key point:</b> It can animate and cache, but it does not decide game truth.</div><div class=\"row\"><b>IN:</b> api (full replacement); beats (story stream)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;active&quot;: {\n    &quot;id&quot;: &quot;gid&quot;,\n    &quot;state&quot;: &quot;mapped GameState&quot;,\n    &quot;beats&quot;: [\n      &quot;mapped Beat&quot;\n    ],\n    &quot;generating&quot;: false,\n    &quot;composer&quot;: {\n      &quot;mode&quot;: &quot;do&quot;,\n      &quot;stack&quot;: []\n    },\n    &quot;profile&quot;: {\n      &quot;charId&quot;: &quot;id&quot;,\n      &quot;tab&quot;: &quot;whisper&quot;,\n      &quot;data&quot;: &quot;profile | null&quot;\n    },\n    &quot;revealQueue&quot;: [\n      &quot;beat ids&quot;\n    ],\n    &quot;pendingView&quot;: false,\n    &quot;lastTurnIndex&quot;: 0\n  }\n}</pre></details></div>","chartHTML": "<p class=\"intro\">Player input flows along one line: input \u2192 interpreter \u2192 deterministic gates \u2192 narrator context \u2192 narrator LLM \u2192 tool dispatcher. Below it sits the persistent SQLite state; player_state.location selects the current scene and present cast is derived. The model never owns state.</p><h3 class=\"group\" id=\"grp-ingest\">linear ingestion</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"input\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Player input</b><span class=\"kindtag\">ingest</span></div><p class=\"sum\">The player sends free text or composer-built segments. This is not state yet.</p><div class=\"meta\">text or segments \u00b7 IN 0 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"interpret\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Interpreter</b><span class=\"kindtag\">ingest</span></div><p class=\"sum\">A small one-call agent normalizes typed input into the same segment contract as the UI composer.</p><div class=\"meta\">free text -&gt; segments \u00b7 IN 1 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"gates\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Deterministic gates</b><span class=\"kindtag\">ingest</span></div><p class=\"sum\">Plain code handles movement through known exits, impossible attempts, echo beats, and the automatic story-clock tick before narrator reasoning.</p><div class=\"meta\">route, reject, pend \u00b7 IN 2 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"tools\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>Tool dispatcher</b><span class=\"kindtag\">ingest</span></div><p class=\"sum\">Every model mutation goes through a registered tool handler. Unknown or bad calls return invalid, not a crash.</p><div class=\"meta\">validated writes \u00b7 IN 2 \u00b7 OUT 3</div></div></div><h3 class=\"group\" id=\"grp-boundary\">LLM boundary</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"narrator\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><b>Narrator LLM</b><span class=\"kindtag\">boundary</span></div><p class=\"sum\">The narrator reasons about next state, writes prose, and proposes tool calls. It does not directly own state.</p><div class=\"meta\">prose + tool calls \u00b7 IN 1 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"cascade\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><b>Character LLMs</b><span class=\"kindtag\">boundary</span></div><p class=\"sum\">Cued characters speak/act with their own context. They can call attack, give_item, share_past, mark_moment, admit_trait.</p><div class=\"meta\">bounded cascade \u00b7 IN 1 \u00b7 OUT 2</div></div></div><h3 class=\"group\" id=\"grp-derived\">derived context / projection</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"nctx\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><b>Narrator context</b><span class=\"kindtag\">derived</span></div><p class=\"sum\">The narrator prompt is rebuilt from current state, recent beats, folded recap, lore, and situational protocol blocks.</p><div class=\"meta\">state + history \u00b7 IN 7 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"charctx\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><b>Character context</b><span class=\"kindtag\">derived</span></div><p class=\"sum\">A character prompt is built from its persona, private knowledge, own memory summary, own moments/traits, and only beats it witnessed.</p><div class=\"meta\">witnessed POV \u00b7 IN 3 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"api\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><b>GameState API</b><span class=\"kindtag\">derived</span></div><p class=\"sum\">Every response contains a full view model assembled from SQLite. It is not stored separately.</p><div class=\"meta\">projection \u00b7 IN 1 \u00b7 OUT 1</div></div></div><h3 class=\"group\" id=\"grp-persistent\">persistent state (SQLite)</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"db\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>SQLite</b><span class=\"kindtag\">persistent</span></div><p class=\"sum\">The model never owns state. SQLite does. One turn holds one transaction, then returns a full state snapshot.</p><div class=\"meta\">source of truth \u00b7 IN 1 \u00b7 OUT 9</div></div><div class=\"gcard\" data-node=\"games\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>games</b><span class=\"kindtag\">persistent</span></div><p class=\"sum\">World identity, story FSM, clock, current goal, memory folds, settings, and context meter.</p><div class=\"meta\">1 row, always \u00b7 IN 2 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"player\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>player_state</b><span class=\"kindtag\">persistent</span></div><p class=\"sum\">The hero row. Its location is the pointer that selects the current scene and present cast.</p><div class=\"meta\">1 row, always \u00b7 IN 1 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"scenes\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>scenes</b><span class=\"kindtag\">persistent</span></div><p class=\"sum\">All places that exist. Start scene is seeded; other scenes are created when movement first points to them.</p><div class=\"meta\">0..N, lazy \u00b7 IN 3 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"characters\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>characters</b><span class=\"kindtag\">persistent</span></div><p class=\"sum\">Each row is both a stateful character and the seed for a separate character agent context.</p><div class=\"meta\">seed + spawn \u00b7 IN 4 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"quests\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>quests + objectives</b><span class=\"kindtag\">persistent</span></div><p class=\"sum\">Active goals and objective checklists. The current goal also lives on games.current_goal.</p><div class=\"meta\">progression \u00b7 IN 1 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"lore\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>lore</b><span class=\"kindtag\">persistent</span></div><p class=\"sum\">World facts injected only when constant or keyword-matched against the current action/recent history.</p><div class=\"meta\">matched facts \u00b7 IN 1 \u00b7 OUT 1</div></div><div class=\"gcard\" data-node=\"beats\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>beats</b><span class=\"kindtag\">persistent</span></div><p class=\"sum\">The story log. It is also the source of narrator history, character witnessed memory, folds, private threads, and late image beats.</p><div class=\"meta\">append-only log \u00b7 IN 5 \u00b7 OUT 4</div></div></div><h3 class=\"group\" id=\"grp-background\">history, folds, late media</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"folds\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><b>Memory folds</b><span class=\"kindtag\">background</span></div><p class=\"sum\">Background summarizers compress older beats into games.story_summary and characters.memory_summary.</p><div class=\"meta\">old beats -&gt; summaries \u00b7 IN 1 \u00b7 OUT 2</div></div><div class=\"gcard\" data-node=\"media\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><b>Media jobs</b><span class=\"kindtag\">background</span></div><p class=\"sum\">Slow image/voice work runs after the turn and fills URLs or appends image beats when ready.</p><div class=\"meta\">late image/voice \u00b7 IN 1 \u00b7 OUT 3</div></div></div><h3 class=\"group\" id=\"grp-ui\">frontend mirror</h3><div class=\"cardgrid\"><div class=\"gcard\" data-node=\"ui\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><b>Frontend state</b><span class=\"kindtag\">ui</span></div><p class=\"sum\">The browser keeps active game view state: mapped backend state, beats, profile tab, reveal queue, pending media, local settings.</p><div class=\"meta\">presentation only \u00b7 IN 2 \u00b7 OUT 0</div></div></div>"},"statejson": {"id": "statejson","title": "State JSON","dot": "var(--green)","view": "text","subtitle": "The full-state JSON reference: exact field shapes.","groups": [],"chartHTML": null,"textHTML": "<p class=\"intro\">The authoritative JSON shapes for the DB state, the API projection, the turn runtime and the frontend copy. Field names are grounded in <span class=\"code\">db.py</span>, <span class=\"code\">models.py</span>, <span class=\"code\">repo/state.py</span>, <span class=\"code\">repo/*</span>, <span class=\"code\">tools/*</span> and <span class=\"code\">adapters.js</span>; values are illustrative. For the lifecycle of each shape (who writes it, who reads it) open the <b>State</b> section.</p><div class=\"card\"><div class=\"ct\"><h4>SQLite</h4><span class=\"kindtag\">db \u00b7 source of truth</span></div><pre class=\"jsonbox\">{\n  &quot;games&quot;: &quot;global row&quot;,\n  &quot;player_state&quot;: &quot;hero row&quot;,\n  &quot;characters&quot;: &quot;cast rows&quot;,\n  &quot;scenes&quot;: &quot;place rows&quot;,\n  &quot;quests&quot;: &quot;quest rows + objective rows&quot;,\n  &quot;lore&quot;: &quot;fact rows&quot;,\n  &quot;beats&quot;: &quot;story log rows&quot;\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>games</h4><span class=\"kindtag\">games \u00b7 1 row, always</span></div><pre class=\"jsonbox\">{\n  &quot;id&quot;: &quot;gid&quot;,\n  &quot;title&quot;: &quot;string&quot;,\n  &quot;setting&quot;: &quot;string&quot;,\n  &quot;tone&quot;: &quot;string&quot;,\n  &quot;narrator_persona&quot;: &quot;string&quot;,\n  &quot;opening_scenario&quot;: &quot;string&quot;,\n  &quot;art_style&quot;: &quot;string&quot;,\n  &quot;status&quot;: &quot;active | won | lost&quot;,\n  &quot;current_goal&quot;: &quot;string&quot;,\n  &quot;time_minutes&quot;: 0,\n  &quot;arrival_note&quot;: &quot;transient return note&quot;,\n  &quot;difficulty&quot;: &quot;easy | normal | hard&quot;,\n  &quot;memory&quot;: &quot;- durable fact&quot;,\n  &quot;story_summary&quot;: &quot;folded older story&quot;,\n  &quot;summarized_through&quot;: 0,\n  &quot;context_used&quot;: 0,\n  &quot;last_tool_errors&quot;: [\n    &quot;fed back once&quot;\n  ],\n  &quot;history_beats&quot;: 0,\n  &quot;summary_every&quot;: 0,\n  &quot;context_tokens&quot;: 0,\n  &quot;turn_voices&quot;: 0,\n  &quot;turn_acts&quot;: 0\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>player_state</h4><span class=\"kindtag\">player \u00b7 1 row, always</span></div><pre class=\"jsonbox\">{\n  &quot;game_id&quot;: &quot;gid&quot;,\n  &quot;life&quot;: 20,\n  &quot;max_life&quot;: 20,\n  &quot;points&quot;: 0,\n  &quot;location&quot;: &quot;scene name key&quot;,\n  &quot;inventory&quot;: [\n    {\n      &quot;id&quot;: &quot;item id&quot;,\n      &quot;name&quot;: &quot;item&quot;,\n      &quot;description&quot;: &quot;string&quot;,\n      &quot;qty&quot;: 1,\n      &quot;image_url&quot;: &quot;url | null&quot;\n    }\n  ],\n  &quot;flags&quot;: {\n    &quot;flag_key&quot;: &quot;value&quot;\n  }\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>scenes</h4><span class=\"kindtag\">scenes \u00b7 0..N, lazy</span></div><pre class=\"jsonbox\">{\n  &quot;id&quot;: &quot;scene id&quot;,\n  &quot;game_id&quot;: &quot;gid&quot;,\n  &quot;name&quot;: &quot;location key&quot;,\n  &quot;description&quot;: &quot;card text; empty means new place&quot;,\n  &quot;background&quot;: &quot;deeper place context&quot;,\n  &quot;status&quot;: &quot;calm | tense | dangerous&quot;,\n  &quot;exits&quot;: [\n    {\n      &quot;id&quot;: &quot;exit id&quot;,\n      &quot;label&quot;: &quot;button label&quot;,\n      &quot;target&quot;: &quot;scene name&quot;\n    }\n  ],\n  &quot;items&quot;: [\n    {\n      &quot;id&quot;: &quot;item id&quot;,\n      &quot;name&quot;: &quot;item&quot;,\n      &quot;description&quot;: &quot;string&quot;,\n      &quot;hidden&quot;: false,\n      &quot;fixed&quot;: false,\n      &quot;image_url&quot;: &quot;url | null&quot;\n    }\n  ],\n  &quot;offers&quot;: [\n    {\n      &quot;id&quot;: &quot;offer id&quot;,\n      &quot;label&quot;: &quot;action label&quot;\n    }\n  ],\n  &quot;visited&quot;: 1,\n  &quot;left_at_minutes&quot;: &quot;number | null&quot;,\n  &quot;draft&quot;: &quot;open threads left here&quot;,\n  &quot;image_url&quot;: &quot;url | null&quot;\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>characters</h4><span class=\"kindtag\">characters \u00b7 seed + spawn</span></div><pre class=\"jsonbox\">{\n  &quot;id&quot;: &quot;character id&quot;,\n  &quot;game_id&quot;: &quot;gid&quot;,\n  &quot;name&quot;: &quot;Mara&quot;,\n  &quot;persona&quot;: &quot;agent system context&quot;,\n  &quot;knowledge&quot;: &quot;private knowledge&quot;,\n  &quot;origin&quot;: &quot;full private backstory&quot;,\n  &quot;origin_revealed&quot;: [\n    {\n      &quot;id&quot;: &quot;fact id&quot;,\n      &quot;text&quot;: &quot;learned fact&quot;,\n      &quot;minutes&quot;: 0\n    }\n  ],\n  &quot;gender&quot;: &quot;female | male | &#x27;&#x27;&quot;,\n  &quot;relation&quot;: &quot;ally | rival | sister | ...&quot;,\n  &quot;disposition&quot;: &quot;friendly | neutral | hostile | unknown&quot;,\n  &quot;location&quot;: &quot;scene name&quot;,\n  &quot;present&quot;: 1,\n  &quot;following&quot;: 0,\n  &quot;alive&quot;: 1,\n  &quot;life&quot;: 10,\n  &quot;max_life&quot;: 10,\n  &quot;inventory&quot;: [\n    {\n      &quot;id&quot;: &quot;item id&quot;,\n      &quot;name&quot;: &quot;item&quot;,\n      &quot;hidden&quot;: false\n    }\n  ],\n  &quot;traits&quot;: [\n    {\n      &quot;id&quot;: &quot;trait id&quot;,\n      &quot;text&quot;: &quot;trait&quot;,\n      &quot;minutes&quot;: 0\n    }\n  ],\n  &quot;moments&quot;: [\n    {\n      &quot;id&quot;: &quot;moment id&quot;,\n      &quot;text&quot;: &quot;pivotal event&quot;,\n      &quot;minutes&quot;: 0\n    }\n  ],\n  &quot;offers&quot;: [\n    {\n      &quot;id&quot;: &quot;offer id&quot;,\n      &quot;label&quot;: &quot;button&quot;\n    }\n  ],\n  &quot;memory_summary&quot;: &quot;private folded witnessed memory&quot;,\n  &quot;summarized_through&quot;: 0,\n  &quot;context_used&quot;: 0,\n  &quot;voice_id&quot;: &quot;provider voice id&quot;,\n  &quot;face_url&quot;: &quot;url | null&quot;,\n  &quot;body_front_url&quot;: &quot;url | null&quot;,\n  &quot;body_side_url&quot;: &quot;url | null&quot;\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>quests + objectives</h4><span class=\"kindtag\">quests \u00b7 progression</span></div><pre class=\"jsonbox\">{\n  &quot;quest&quot;: {\n    &quot;id&quot;: &quot;quest id&quot;,\n    &quot;game_id&quot;: &quot;gid&quot;,\n    &quot;title&quot;: &quot;Quest&quot;,\n    &quot;description&quot;: &quot;string&quot;,\n    &quot;status&quot;: &quot;active | done | failed&quot;\n  },\n  &quot;objective&quot;: {\n    &quot;id&quot;: &quot;objective id&quot;,\n    &quot;quest_id&quot;: &quot;quest id&quot;,\n    &quot;text&quot;: &quot;objective text&quot;,\n    &quot;done&quot;: 0,\n    &quot;progress&quot;: &quot;string | null&quot;\n  }\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>lore</h4><span class=\"kindtag\">lore \u00b7 matched facts</span></div><pre class=\"jsonbox\">{\n  &quot;id&quot;: &quot;lore id&quot;,\n  &quot;game_id&quot;: &quot;gid&quot;,\n  &quot;keys&quot;: [\n    &quot;keyword&quot;\n  ],\n  &quot;content&quot;: &quot;world fact&quot;,\n  &quot;constant&quot;: 0,\n  &quot;priority&quot;: 0,\n  &quot;discovered&quot;: 0\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>beats</h4><span class=\"kindtag\">beats \u00b7 append-only log</span></div><pre class=\"jsonbox\">{\n  &quot;id&quot;: &quot;beat id&quot;,\n  &quot;game_id&quot;: &quot;gid&quot;,\n  &quot;turn_index&quot;: 1,\n  &quot;seq&quot;: 0,\n  &quot;speaker&quot;: &quot;narrator | player | character_id | system&quot;,\n  &quot;speaker_name&quot;: &quot;display name | null&quot;,\n  &quot;kind&quot;: &quot;narration | dialogue | action | system | image&quot;,\n  &quot;text&quot;: &quot;stored clean text or image caption&quot;,\n  &quot;location&quot;: &quot;scene name&quot;,\n  &quot;private_with&quot;: &quot;character id | null&quot;,\n  &quot;witnesses&quot;: [\n    &quot;character ids who perceived it&quot;\n  ],\n  &quot;emotion&quot;: &quot;angry | whisper | ... | &#x27;&#x27;&quot;,\n  &quot;image_url&quot;: &quot;url | null&quot;,\n  &quot;audio_url&quot;: &quot;url | null&quot;\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>Character context</h4><span class=\"kindtag\">charctx \u00b7 witnessed POV</span></div><pre class=\"jsonbox\">{\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;character.system + persona + private knowledge + state&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;memory block + witnessed transcript + directed impulse&quot;\n    }\n  ],\n  &quot;tools&quot;: [\n    &quot;attack&quot;,\n    &quot;give_item&quot;,\n    &quot;share_past&quot;,\n    &quot;mark_moment&quot;,\n    &quot;admit_trait&quot;\n  ]\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>Character LLMs</h4><span class=\"kindtag\">cascade \u00b7 bounded cascade</span></div><pre class=\"jsonbox\">{\n  &quot;raw_reply&quot;: &quot;[say]...[/say][do]...[/do]&quot;,\n  &quot;parsed_segments&quot;: [\n    {\n      &quot;kind&quot;: &quot;say | do | whisper&quot;,\n      &quot;text&quot;: &quot;clean display text&quot;,\n      &quot;emotion&quot;: &quot;tone&quot;\n    }\n  ],\n  &quot;tool_calls&quot;: [\n    {\n      &quot;name&quot;: &quot;attack | give_item | share_past | mark_moment | admit_trait&quot;,\n      &quot;arguments&quot;: {}\n    }\n  ],\n  &quot;emitted_beats&quot;: [\n    &quot;dialogue/action beats&quot;\n  ]\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>Memory folds</h4><span class=\"kindtag\">folds \u00b7 old beats -&gt; summaries</span></div><pre class=\"jsonbox\">{\n  &quot;game_fold&quot;: {\n    &quot;source&quot;: &quot;beats older than keep window&quot;,\n    &quot;writes&quot;: {\n      &quot;games&quot;: {\n        &quot;story_summary&quot;: &quot;text&quot;,\n        &quot;summarized_through&quot;: 0\n      }\n    }\n  },\n  &quot;character_fold&quot;: {\n    &quot;source&quot;: &quot;witnessed beats only&quot;,\n    &quot;writes&quot;: {\n      &quot;characters&quot;: {\n        &quot;memory_summary&quot;: &quot;text&quot;,\n        &quot;summarized_through&quot;: 0\n      }\n    }\n  }\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>Media jobs</h4><span class=\"kindtag\">media \u00b7 late image/voice</span></div><pre class=\"jsonbox\">{\n  &quot;event&quot;: {\n    &quot;kind&quot;: &quot;scene | portrait | item | beat&quot;,\n    &quot;game_id&quot;: &quot;gid&quot;\n  },\n  &quot;writes&quot;: {\n    &quot;scenes&quot;: {\n      &quot;image_url&quot;: &quot;/media/gid/images/scene.png&quot;\n    },\n    &quot;characters&quot;: {\n      &quot;face_url&quot;: &quot;/media/...&quot;,\n      &quot;body_front_url&quot;: &quot;/media/...&quot;\n    },\n    &quot;beats&quot;: {\n      &quot;kind&quot;: &quot;image&quot;,\n      &quot;image_url&quot;: &quot;/media/...&quot;,\n      &quot;text&quot;: &quot;caption&quot;\n    }\n  }\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>GameState API</h4><span class=\"kindtag\">api \u00b7 projection</span></div><pre class=\"jsonbox\">{\n  &quot;turn_response&quot;: {\n    &quot;beats&quot;: [\n      &quot;Beat[] just created this turn&quot;\n    ],\n    &quot;state&quot;: &quot;GameState&quot;\n  },\n  &quot;GameState&quot;: {\n    &quot;game_id&quot;: &quot;gid&quot;,\n    &quot;title&quot;: &quot;string&quot;,\n    &quot;status&quot;: &quot;active | won | lost&quot;,\n    &quot;current_goal&quot;: &quot;string&quot;,\n    &quot;scene&quot;: &quot;SceneOut&quot;,\n    &quot;player&quot;: &quot;PlayerStateOut&quot;,\n    &quot;characters&quot;: [\n      &quot;CharacterOut&quot;\n    ],\n    &quot;quests&quot;: [\n      &quot;QuestOut&quot;\n    ],\n    &quot;context&quot;: {\n      &quot;used&quot;: 0,\n      &quot;max&quot;: 131072\n    },\n    &quot;settings&quot;: {\n      &quot;difficulty&quot;: &quot;normal&quot;,\n      &quot;history_beats&quot;: 80,\n      &quot;context_tokens&quot;: 0\n    },\n    &quot;time&quot;: {\n      &quot;minutes&quot;: 0,\n      &quot;day&quot;: 1,\n      &quot;hour&quot;: 8,\n      &quot;part&quot;: &quot;morning&quot;,\n      &quot;label&quot;: &quot;Day 1, morning&quot;\n    }\n  }\n}</pre></div><div class=\"card\"><div class=\"ct\"><h4>Frontend state</h4><span class=\"kindtag\">ui \u00b7 presentation only</span></div><pre class=\"jsonbox\">{\n  &quot;active&quot;: {\n    &quot;id&quot;: &quot;gid&quot;,\n    &quot;state&quot;: &quot;mapped GameState&
