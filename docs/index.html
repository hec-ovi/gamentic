fonts, chamfer factor, eases. A new theme = one file like hightech.css. styles.css carries STRUCTURE only (no color literals, lint-enforced).","how": "Writes: nothing"},"feTest": {"what": "Vitest + jsdom suite: component tests mount the real app.js via init(), drive it with @testing-library/user-event, intercept the orchestrator with MSW at the network layer; plus the theme/mobile lint contracts and the setup-page test.","how": "Writes: nothing"},"infra": {"what": "","how": "Writes: nothing directly (compose builds from here)"},"infraSetup": {"what": "The two setup faces over one schema: cli.py (terminal wizard, agent flags, host doctor) and setup.js/setup.css (the setup.html page), both rendering from schema.js so the faces can never drift; the schema also generates .env.example.","how": "Writes: .env at repo root"},"infraComfy": {"what": "The ComfyUI container: Dockerfile, entrypoint, the FLUX.2 Klein model fetch script, and its data dir; the GPU image backend on Strix Halo.","how": "Writes: model weights into data/"},"infraImageApi": {"what": "The image-api REST adapter in front of ComfyUI: app (main.py, comfy_client.py, workflow.py, config.py), the workflow JSONs, tests and Dockerfile.","how": "Writes: staging image copies (freed once the orchestrator persists)"},"voice": {"what": "The Maya1-3B TTS service on llama.cpp Vulkan: app.py (routes), synth.py, voices.py, characters.py (registry), emotion.py, manifest.py (per-game ownership), config.py, bench + samples + tests.","how": "Writes: per-game wav files (the ownership manifest; delete the game, its wavs die)"},"docs": {"what": "The documentation. The PUBLIC site is ONE page (index.html) whose section views (overview, agents, engine, state, state-json, context, infra, folders) render as a node graph, an indented tree or grouped cards, each paired with an agent-ready guide/ twin. Everything else under docs/ stays private/gitignored.","how": "Writes: nothing"},"fMain": {"what": "The REST surface: every route, request gating, background-task scheduling. Nothing else.","how": "Writes: schedules background art/folds; opens the per-turn connection"},"fPrompts": {"what": "Message assembly for every agent (narrator, characters, interpreter, explainer, image-prompt writer, creator). Computes the state block and decides WHICH protocol blocks inject this turn.","how": "Writes: nothing"},"fLlm": {"what": "The one llama.cpp client function, chat(): no framework, returns the assistant message with parsed tool calls; the same server + model backs every agent, only the messages differ.","how": "Writes: nothing"},"fDb": {"what": "Schema, migrations, WAL connection settings.","how": "Writes: gamentic.db structure (DDL, migrations, PRAGMAs)"},"fModels": {"what": "Pydantic request/response shapes (the wire contract).","how": "Writes: nothing"},"fMedia": {"what": "Thin HTTP clients for image-api and voice-api; keep historical signatures but dispatch to the ACTIVE provider from app/providers/, resolved at call time.","how": "Writes: nothing"},"fConfig": {"what": "Every knob, env-overridable, with defaults.","how": "Writes: nothing"},"fCreator": {"what": "The story-creator chat sessions (persisted in SQLite) and world finalization: interview the user, then emit a structured WorldSheet.","how": "Writes: creator sessions in SQLite"},"fTransfer": {"what": "Export/import: adventure templates and checkpoint saves, id remapping, media scrubbing (one versioned JSON format family).","how": "Writes: imported games (remapped ids, scrubbed media)"}},"groups": [{"id": "root","label": "repo root","nodeIds": ["root"]},{"id": "brain","label": "orchestrator (brain)","nodeIds": ["orchestrator","app","engine","tools","repo","integrate","providers","prompts"]},{"id": "file","label": "orchestrator files","nodeIds": ["fMain","fPrompts","fLlm","fDb","fModels","fMedia","fConfig","fCreator","fTransfer"]},{"id": "frontend","label": "frontend (UI)","nodeIds": ["frontend","src","srcApp","srcRender","themes","feTest"]},{"id": "infra","label": "infra (services)","nodeIds": ["infra","infraSetup","infraComfy","infraImageApi"]},{"id": "voice","label": "voice-api","nodeIds": ["voice"]},{"id": "docs","label": "docs","nodeIds": ["docs"]}],"C": {"root": "#e7b75f","brain": "#65d08b","frontend": "#7ba7ff","infra": "#a895f2","voice": "#e47ea5","docs": "#62c8d8","file": "#aab4a3"},"textHTML": "<p class=\"intro\">One monorepo. Each directory has one job; each file has one job. The INDEX.md resolver in every code dir is the authoritative map this tree is built from. Click any entry for its one job, key files and what it produces.</p><h3 class=\"group\" id=\"grp-root\">repo root</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>gamentic/</h4><span class=\"kindtag\">root</span></div><p class=\"sum\">Self-hosted AI dungeon RPG monorepo: the game brain (orchestrator), the no-build UI (frontend), the media services (infra, voice-api), the compose stack and the setup faces, all docs.</p><div class=\"row\"><b>One job:</b> One repo;./up.sh raises whichever world the boolean names.</div><div class=\"row\"><b>Key files / dirs:</b> docker-compose.yml; up.sh; gamentic-setup; setup.html; README.md; CHANGELOG.md; .env.example</div><div class=\"row\"><b>Entry / owner:</b> up.sh; gamentic-setup; setup.html; docker-compose.yml</div><div class=\"row\"><b>Produces:</b> the running stack (./up.sh raises whichever world names)</div><div class=\"row\"><b>Key point:</b> Writes: .env (via setup faces)</div><div class=\"row\"><b>IN:</b> <i>none</i></div><div class=\"row\"><b>OUT:</b> orchestrator (orchestrator/); frontend (frontend/); infra (infra/); voice (voice-api/); docs (docs/)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\"></pre></details></div><h3 class=\"group\" id=\"grp-brain\">orchestrator (brain)</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>orchestrator/</h4><span class=\"kindtag\">brain</span></div><p class=\"sum\">The game brain service: FastAPI orchestrator that resolves one turn per POST, plus its Dockerfile, prompts, tests and SQLite data.</p><div class=\"row\"><b>One job:</b> The REST surface plus the turn loop; one turn = one commit.</div><div class=\"row\"><b>Key files / dirs:</b> app/; prompts/; tests/; Dockerfile; INDEX.md; requirements.txt</div><div class=\"row\"><b>Entry / owner:</b> app/main.py</div><div class=\"row\"><b>Produces:</b> one fully-resolved turn per /games/{id}/action</div><div class=\"row\"><b>Key point:</b> Writes: gamentic.db (SQLite, WAL)</div><div class=\"row\"><b>IN:</b> root (orchestrator/)</div><div class=\"row\"><b>OUT:</b> app (app/); prompts (prompts/)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;entrypoint&quot;: &quot;app/main.py&quot;,\n  &quot;db&quot;: &quot;gamentic.db&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>orchestrator/app/</h4><span class=\"kindtag\">brain</span></div><p class=\"sum\">The Python package: every route, the turn engine, the tool registry, the SQL layer, media glue, prompts assembly and config; one file/subpackage per concern.</p><div class=\"row\"><b>One job:</b> Each file has one job; the INDEX is the resolver.</div><div class=\"row\"><b>Key files / dirs:</b> main.py; prompts.py; db.py; models.py; config.py; engine/; tools/; repo/; integrate/; providers/; constants.py; voice_design.py</div><div class=\"row\"><b>Entry / owner:</b> app/main.py; app/engine/turn.py</div><div class=\"row\"><b>Produces:</b> resolved GameState + beats</div><div class=\"row\"><b>Key point:</b> Writes: SQLite via repo/</div><div class=\"row\"><b>IN:</b> orchestrator (app/)</div><div class=\"row\"><b>OUT:</b> engine (engine/); tools (tools/); repo (repo/); integrate (integrate/); providers (providers/); fMain (main.py); fPrompts (prompts.py); fLlm (llm.py); fDb (db.py); fModels (models.py); fMedia (media.py); fConfig (config.py); fCreator (creator.py); fTransfer (transfer.py)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;facades&quot;: [\n    &quot;engine&quot;,\n    &quot;tools&quot;,\n    &quot;repo&quot;,\n    &quot;integrate&quot;,\n    &quot;providers&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>app/engine/</h4><span class=\"kindtag\">brain</span></div><p class=\"sum\">The turn loop, one module per concern: player beats, deterministic adjudication, the narrator call, the bounded character cascade, whispers, the context meter, prose scrubbing, the new-item diff, background memory folds.</p><div class=\"row\"><b>One job:</b> The turn loop: run_turn does everything; folds open their own conns.</div><div class=\"row\"><b>Key files / dirs:</b> turn.py; parsing.py; folds.py; __init__.py; INDEX.md</div><div class=\"row\"><b>Entry / owner:</b> app/engine/turn.py: run_turn; app/engine/parsing.py; app/engine/folds.py</div><div class=\"row\"><b>Produces:</b> adjudicated turn, scrubbed beats, memory folds</div><div class=\"row\"><b>Key point:</b> Writes: beats, character/game summaries (via repo)</div><div class=\"row\"><b>IN:</b> app (engine/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;modules&quot;: [\n    &quot;turn.py&quot;,\n    &quot;parsing.py&quot;,\n    &quot;folds.py&quot;\n  ],\n  &quot;key&quot;: &quot;run_turn, interpret_action&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>app/tools/</h4><span class=\"kindtag\">brain</span></div><p class=\"sum\">The model&#x27;s ONLY way to change state: one module per domain, each tool&#x27;s JSON schema beside its handler, composed by a registry. A tool the schema does not describe does not exist.</p><div class=\"row\"><b>One job:</b> The model&#x27;s ONLY way to change state.</div><div class=\"row\"><b>Key files / dirs:</b> combat.py; items.py; characters.py; progression.py; scene.py; world.py; narrative.py; base.py; __init__.py; INDEX.md</div><div class=\"row\"><b>Entry / owner:</b> app/tools/base.py: @tool registry; app/tools/__init__.py: apply_tool</div><div class=\"row\"><b>Produces:</b> state-change receipts {kind,text,cue,reactions}</div><div class=\"row\"><b>Key point:</b> Writes: game state via repo (the only writers)</div><div class=\"row\"><b>IN:</b> app (tools/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;handler&quot;: &quot;(conn,gid,args,actor) -&gt; {kind,text,cue,reactions}&quot;,\n  &quot;kind&quot;: &quot;state|cue|memory|invalid|spawn|kill|reject|image&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>app/repo/</h4><span class=\"kindtag\">brain</span></div><p class=\"sum\">All SQL, one module per domain (games, players, characters, items, scenes, quests, lore, beats, clock, state). Callers just use repo.&lt;fn&gt;; the engine owns the transaction.</p><div class=\"row\"><b>One job:</b> Data access; one turn = one commit; names normalized on every write.</div><div class=\"row\"><b>Key files / dirs:</b> games.py; players.py; characters.py; items.py; scenes.py; quests.py; lore.py; beats.py; clock.py; state.py; base.py; INDEX.md</div><div class=\"row\"><b>Entry / owner:</b> app/repo/state.py: game_state; app/repo/items.py (item-blob rules)</div><div class=\"row\"><b>Produces:</b> the assembled GameState the API serves (state.py: game_state)</div><div class=\"row\"><b>Key point:</b> Writes: every SQLite table</div><div class=\"row\"><b>IN:</b> app (repo/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;assembled_by&quot;: &quot;state.py: game_state&quot;,\n  &quot;items&quot;: &quot;JSON lists on owner rows&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>app/integrate/</h4><span class=\"kindtag\">brain</span></div><p class=\"sum\">Glue to the media services: image prompt composition (gender net, no-text guard, identity references), voice assignment, media persistence, all background generation jobs. Best-effort: media down never breaks the game.</p><div class=\"row\"><b>One job:</b> Never hold a DB conn across a render; re-check the game exists before writing.</div><div class=\"row\"><b>Key files / dirs:</b> voice.py; image_prompts.py; storage.py; jobs.py; events.py; __init__.py; INDEX.md</div><div class=\"row\"><b>Entry / owner:</b> app/integrate/jobs.py; app/integrate/storage.py: _persist; app/integrate/image_prompts.py</div><div class=\"row\"><b>Produces:</b> background art/voice jobs, persisted /media files</div><div class=\"row\"><b>Key point:</b> Writes: per-game /media folder, scene/item/character image urls</div><div class=\"row\"><b>IN:</b> app (integrate/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;modules&quot;: [\n    &quot;voice.py&quot;,\n    &quot;image_prompts.py&quot;,\n    &quot;storage.py&quot;,\n    &quot;jobs.py&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>app/providers/</h4><span class=\"kindtag\">brain</span></div><p class=\"sum\">The inference-providers layer: one interface per modality, dialect classes for pure JSON shaping (httpx only, no SDKs), and the config spine. Config resolves at call time (env -> default).</p><div class=\"row\"><b>One job:</b> .env is the single config layer; defaults reproduce the local stack byte-for-byte.</div><div class=\"row\"><b>Key files / dirs:</b> base.py; image.py; audio.py; __init__.py; INDEX.md</div><div class=\"row\"><b>Entry / owner:</b> app/providers/base.py: resolve, app/providers/image.py; app/providers/audio.py</div><div class=\"row\"><b>Produces:</b> resolved ProviderConfig per call (text/image/audio)</div><div class=\"row\"><b>Key point:</b> Writes: nothing (stateless dialects)</div><div class=\"row\"><b>IN:</b> app (providers/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\"></pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>orchestrator/prompts/</h4><span class=\"kindtag\">brain</span></div><p class=\"sum\">The actual prose of every prompt (narrator core + protocol blocks, character, interpreter, explainer, image-prompt writer, creator/finalize, summaries), editable without touching code, reloaded per call.</p><div class=\"row\"><b>One job:</b> Protocol blocks inject ONLY when state triggers them (the resolver).</div><div class=\"row\"><b>Key files / dirs:</b> narrator.system.md; narrator.easy.md/.hard.md/.newplace.md/.returning.md/.looking.md/.attempts.md/.resolve.md; character.system.md; interpret.system.md; imageprompt.system.md; explain.system.md; creator.system.md; finalize.system.md; summary/charsummary/origin/artdirector .md</div><div class=\"row\"><b>Entry / owner:</b> edit the .md prose directly</div><div class=\"row\"><b>Produces:</b> the system/user messages each agent receives</div><div class=\"row\"><b>Key point:</b> Writes: nothing (read at call time)</div><div class=\"row\"><b>IN:</b> orchestrator (prompts/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;always&quot;: &quot;narrator.system.md&quot;,\n  &quot;conditional&quot;: [\n    &quot;narrator.easy/hard/newplace/returning/looking/attempts/resolve&quot;\n  ]\n}</pre></details></div><h3 class=\"group\" id=\"grp-file\">orchestrator files</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>app/main.py</h4><span class=\"kindtag\">file</span></div><p class=\"sum\">The REST surface: every route, request gating, background-task scheduling. Nothing else.</p><div class=\"row\"><b>One job:</b> The REST surface. Every route, request gating, background-task scheduling. Nothing else.</div><div class=\"row\"><b>Key files / dirs:</b> models.py; engine/; integrate/; repo/</div><div class=\"row\"><b>Entry / owner:</b> app/main.py</div><div class=\"row\"><b>Produces:</b> one resolved turn per POST /games/{id}/action; SSE media events</div><div class=\"row\"><b>Key point:</b> Writes: schedules background art/folds; opens the per-turn connection</div><div class=\"row\"><b>IN:</b> app (main.py)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;flagship&quot;: &quot;POST /games/{id}/action&quot;,\n  &quot;events&quot;: &quot;GET /games/{gid}/events (SSE)&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>app/prompts.py</h4><span class=\"kindtag\">file</span></div><p class=\"sum\">Message assembly for every agent (narrator, characters, interpreter, explainer, image-prompt writer, creator). Computes the state block and decides WHICH protocol blocks inject this turn.</p><div class=\"row\"><b>One job:</b> Message assembly; computes the state block and which protocol blocks inject.</div><div class=\"row\"><b>Key files / dirs:</b> prompts/*.md; constants.py; repo state</div><div class=\"row\"><b>Entry / owner:</b> app/prompts.py</div><div class=\"row\"><b>Produces:</b> the assembled message arrays each agent receives</div><div class=\"row\"><b>Key point:</b> Writes: nothing</div><div class=\"row\"><b>IN:</b> app (prompts.py)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;output&quot;: &quot;messages[] per agent&quot;,\n  &quot;decides&quot;: &quot;which prompts/*.md blocks to inject&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>app/llm.py</h4><span class=\"kindtag\">file</span></div><p class=\"sum\">The one llama.cpp client function, chat(): no framework, returns the assistant message with parsed tool calls; the same server + model backs every agent, only the messages differ.</p><div class=\"row\"><b>One job:</b> The one llama.cpp client function, chat().</div><div class=\"row\"><b>Key files / dirs:</b> providers/base.py: resolve(&#x27;text&#x27;)</div><div class=\"row\"><b>Entry / owner:</b> app/llm.py: chat</div><div class=\"row\"><b>Produces:</b> assistant message + parsed tool calls</div><div class=\"row\"><b>Key point:</b> Writes: nothing</div><div class=\"row\"><b>IN:</b> app (llm.py)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;fn&quot;: &quot;chat()&quot;,\n  &quot;returns&quot;: &quot;{content, tool_calls}&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>app/db.py</h4><span class=\"kindtag\">file</span></div><p class=\"sum\">Schema, migrations, WAL connection settings.</p><div class=\"row\"><b>One job:</b> Schema, migrations, WAL connection settings.</div><div class=\"row\"><b>Key files / dirs:</b> nothing (owns the schema)</div><div class=\"row\"><b>Entry / owner:</b> app/db.py</div><div class=\"row\"><b>Produces:</b> the SQLite schema + connections</div><div class=\"row\"><b>Key point:</b> Writes: gamentic.db structure (DDL, migrations, PRAGMAs)</div><div class=\"row\"><b>IN:</b> app (db.py)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;db&quot;: &quot;gamentic.db&quot;,\n  &quot;mode&quot;: &quot;WAL&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>app/models.py</h4><span class=\"kindtag\">file</span></div><p class=\"sum\">Pydantic request/response shapes (the wire contract).</p><div class=\"row\"><b>One job:</b> Pydantic request/response shapes (the wire contract).</div><div class=\"row\"><b>Key files / dirs:</b> nothing</div><div class=\"row\"><b>Entry / owner:</b> app/models.py</div><div class=\"row\"><b>Produces:</b> validated request/response objects</div><div class=\"row\"><b>Key point:</b> Writes: nothing</div><div class=\"row\"><b>IN:</b> app (models.py)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;defines&quot;: &quot;the orchestrator wire contract&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>app/media.py</h4><span class=\"kindtag\">file</span></div><p class=\"sum\">Thin HTTP clients for image-api and voice-api; keep historical signatures but dispatch to the ACTIVE provider from app/providers/, resolved at call time.</p><div class=\"row\"><b>One job:</b> Thin HTTP clients for image-api and voice-api (provider-agnostic facade).</div><div class=\"row\"><b>Key files / dirs:</b> providers/image.py; providers/audio.py</div><div class=\"row\"><b>Entry / owner:</b> app/media.py</div><div class=\"row\"><b>Produces:</b> image/voice bytes or urls</div><div class=\"row\"><b>Key point:</b> Writes: nothing</div><div class=\"row\"><b>IN:</b> app (media.py)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;targets&quot;: [\n    &quot;image-api&quot;,\n    &quot;voice-api&quot;\n  ],\n  &quot;dispatch&quot;: &quot;active provider per call&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>app/config.py</h4><span class=\"kindtag\">file</span></div><p class=\"sum\">Every knob, env-overridable, with defaults.</p><div class=\"row\"><b>One job:</b> Every knob, env-overridable, with defaults.</div><div class=\"row\"><b>Key files / dirs:</b> .env / environment</div><div class=\"row\"><b>Entry / owner:</b> app/config.py</div><div class=\"row\"><b>Produces:</b> resolved config values</div><div class=\"row\"><b>Key point:</b> Writes: nothing</div><div class=\"row\"><b>IN:</b> app (config.py)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;source&quot;: &quot;env -&gt; default&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>app/creator.py</h4><span class=\"kindtag\">file</span></div><p class=\"sum\">The story-creator chat sessions (persisted in SQLite) and world finalization: interview the user, then emit a structured WorldSheet.</p><div class=\"row\"><b>One job:</b> Story-creator chat sessions (SQLite-persisted) and world finalization.</div><div class=\"row\"><b>Key files / dirs:</b> prompts/creator.system.md; prompts/finalize.system.md; db.py</div><div class=\"row\"><b>Entry / owner:</b> app/creator.py</div><div class=\"row\"><b>Produces:</b> a structured WorldSheet from the creation chat</div><div class=\"row\"><b>Key point:</b> Writes: creator sessions in SQLite</div><div class=\"row\"><b>IN:</b> app (creator.py)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;output&quot;: &quot;WorldSheet&quot;,\n  &quot;sessions&quot;: &quot;persisted in SQLite&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#aab4a3\"></span><h4>app/transfer.py</h4><span class=\"kindtag\">file</span></div><p class=\"sum\">Export/import: adventure templates and checkpoint saves, id remapping, media scrubbing (one versioned JSON format family).</p><div class=\"row\"><b>One job:</b> Export/import: adventure templates and checkpoint saves, id remapping, media scrubbing.</div><div class=\"row\"><b>Key files / dirs:</b> repo state, media folder</div><div class=\"row\"><b>Entry / owner:</b> app/transfer.py</div><div class=\"row\"><b>Produces:</b> template JSON (world as designed) or checkpoint save (with progress)</div><div class=\"row\"><b>Key point:</b> Writes: imported games (remapped ids, scrubbed media)</div><div class=\"row\"><b>IN:</b> app (transfer.py)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;kinds&quot;: [\n    &quot;adventure template&quot;,\n    &quot;checkpoint save&quot;\n  ],\n  &quot;format&quot;: &quot;versioned JSON&quot;\n}</pre></details></div><h3 class=\"group\" id=\"grp-frontend\">frontend (UI)</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><h4>frontend/</h4><span class=\"kindtag\">frontend</span></div><p class=\"sum\">The UI layer: vanilla ES modules, no build step; one in-memory state, one render() that MORPHS the DOM (vendored idiomorph), delegated handlers that mutate state and re-render. Served by nginx.</p><div class=\"row\"><b>One job:</b> No build step; one state, one morphing render().</div><div class=\"row\"><b>Key files / dirs:</b> index.html; styles.css; themes/; vendor/idiomorph.esm.js; src/; test/; nginx.conf; Dockerfile; INDEX.md</div><div class=\"row\"><b>Entry / owner:</b> src/app.js; src/app/ui.js: render</div><div class=\"row\"><b>Produces:</b> the played game screen</div><div class=\"row\"><b>Key point:</b> Writes: FE-local settings (localStorage), per-game PATCH</div><div class=\"row\"><b>IN:</b> root (frontend/)</div><div class=\"row\"><b>OUT:</b> src (src/); themes (themes/); feTest (test/)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;entry&quot;: &quot;src/app.js&quot;,\n  &quot;render&quot;: &quot;src/render.js + src/render/&quot;,\n  &quot;state&quot;: &quot;src/app/ctx.js&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><h4>frontend/src/</h4><span class=\"kindtag\">frontend</span></div><p class=\"sum\">The ES module source: the boot facade (app.js), the controller package (app/), the REST client (api.js), wire-&gt;view adapters, the tagged composer, the diff engine, the voice client, and the render facade + builders.</p><div class=\"row\"><b>One job:</b> Raw wire JSON -&gt; view model -&gt; morphed DOM.</div><div class=\"row\"><b>Key files / dirs:</b> app.js; api.js; adapters.js; composer.js; transitions.js; voice.js; icons.js; render.js; app/; render/</div><div class=\"row\"><b>Entry / owner:</b> src/app.js; src/adapters.js; src/api.js</div><div class=\"row\"><b>Produces:</b> view models, DOM, voice synth requests</div><div class=\"row\"><b>Key point:</b> Writes: in-memory state (ctx.js)</div><div class=\"row\"><b>IN:</b> frontend (src/)</div><div class=\"row\"><b>OUT:</b> srcApp (app/); srcRender (render/)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;client&quot;: &quot;api.js&quot;,\n  &quot;adapters&quot;: &quot;mapGameState/mapBeats/mapProfile&quot;,\n  &quot;diff&quot;: &quot;transitions.js: diffState&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><h4>frontend/src/app/</h4><span class=\"kindtag\">frontend</span></div><p class=\"sum\">The controller package: the one in-memory state + voice engine + api client (ctx.js), render/delegate/action-dispatch (ui.js), the turn loop, staged reveal, library, media SSE stream, play controls, profile, composer, creator, speech, settings, cues, lightbox.</p><div class=\"row\"><b>One job:</b> The controller; ctx.js holds the ONE state shared as live bindings.</div><div class=\"row\"><b>Key files / dirs:</b> ctx.js; ui.js; turns.js; reveal.js; game.js; mediastream.js; playctl.js; profilectl.js; composerctl.js; creatorctl.js; speech.js; settingsctl.js; cues.js; media.js</div><div class=\"row\"><b>Entry / owner:</b> src/app/turns.js; src/app/ui.js; src/app/mediastream.js</div><div class=\"row\"><b>Produces:</b> the action/continue loop, the staged reveal, SSE-driven media refresh</div><div class=\"row\"><b>Key point:</b> Writes: ctx state, localStorage, per-game settings PATCH</div><div class=\"row\"><b>IN:</b> src (app/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;state&quot;: &quot;ctx.js&quot;,\n  &quot;loop&quot;: &quot;turns.js&quot;,\n  &quot;reveal&quot;: &quot;reveal.js&quot;,\n  &quot;sse&quot;: &quot;mediastream.js&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><h4>frontend/src/render/</h4><span class=\"kindtag\">frontend</span></div><p class=\"sum\">The render builders, one module per concern: common helpers, widgets, screens (library/creator/settings), the play deck, the story stream, the character profile, the inspect modal.</p><div class=\"row\"><b>One job:</b> One module per screen concern, behind the render facade.</div><div class=\"row\"><b>Key files / dirs:</b> common.js; widgets.js; screens.js; play.js; story.js; profile.js; inspect.js</div><div class=\"row\"><b>Entry / owner:</b> src/render/play.js; src/render/story.js; src/render/profile.js</div><div class=\"row\"><b>Produces:</b> HTML strings the facade morphs in</div><div class=\"row\"><b>Key point:</b> Writes: nothing (pure builders)</div><div class=\"row\"><b>IN:</b> src (render/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;modules&quot;: [\n    &quot;common&quot;,\n    &quot;widgets&quot;,\n    &quot;screens&quot;,\n    &quot;play&quot;,\n    &quot;story&quot;,\n    &quot;profile&quot;,\n    &quot;inspect&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><h4>frontend/themes/</h4><span class=\"kindtag\">frontend</span></div><p class=\"sum\">The design tokens: colors, fonts, chamfer factor, eases. A new theme = one file like hightech.css. styles.css carries STRUCTURE only (no color literals, lint-enforced).</p><div class=\"row\"><b>One job:</b> A new theme = one file like this; no color literals outside tokens.</div><div class=\"row\"><b>Key files / dirs:</b> hightech.css</div><div class=\"row\"><b>Entry / owner:</b> themes/hightech.css</div><div class=\"row\"><b>Produces:</b> the resolved visual theme (CSS custom properties)</div><div class=\"row\"><b>Key point:</b> Writes: nothing</div><div class=\"row\"><b>IN:</b> frontend (themes/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;tokens&quot;: [\n    &quot;colors&quot;,\n    &quot;fonts&quot;,\n    &quot;chamfer&quot;,\n    &quot;eases&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><h4>frontend/test/</h4><span class=\"kindtag\">frontend</span></div><p class=\"sum\">Vitest + jsdom suite: component tests mount the real app.js via init(), drive it with @testing-library/user-event, intercept the orchestrator with MSW at the network layer; plus the theme/mobile lint contracts and the setup-page test.</p><div class=\"row\"><b>One job:</b> Mount real app.js, drive with user-event, mock HTTP at the network layer (MSW).</div><div class=\"row\"><b>Key files / dirs:</b> play.component.test.js; render.test.js; composer.test.js; interaction.test.js; creator.component.test.js; transitions.test.js; voice.test.js; api.test.js; adapters.test.js; theme.lint.test.js; mobile.lint.test.js; setuppage.test.js; setup.js; fixtures.js</div><div class=\"row\"><b>Entry / owner:</b> test/setup.js (MSW default handlers); test/fixtures.js (wire builders)</div><div class=\"row\"><b>Produces:</b> pass/fail signal</div><div class=\"row\"><b>Key point:</b> Writes: nothing</div><div class=\"row\"><b>IN:</b> frontend (test/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;runner&quot;: &quot;vitest (jsdom)&quot;,\n  &quot;mock&quot;: &quot;MSW&quot;,\n  &quot;setup&quot;: &quot;test/setup.js + test/fixtures.js&quot;\n}</pre></details></div><h3 class=\"group\" id=\"grp-infra\">infra (services)</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>infra/</h4><span class=\"kindtag\">infra</span></div><p class=\"sum\">The accessory build context: the setup faces over one schema, the ComfyUI image, and the image-api adapter.</p><div class=\"row\"><b>One job:</b> One build context per accessory service.</div><div class=\"row\"><b>Key files / dirs:</b> setup/; comfyui/; image-api/; README.md</div><div class=\"row\"><b>Entry / owner:</b> docker-compose.yml references these contexts</div><div class=\"row\"><b>Produces:</b></div><div class=\"row\"><b>Key point:</b> Writes: nothing directly (compose builds from here)</div><div class=\"row\"><b>IN:</b> root (infra/)</div><div class=\"row\"><b>OUT:</b> infraSetup (setup/); infraComfy (comfyui/); infraImageApi (image-api/).</div><details><summary>JSON shape</summary><pre class=\"jsonbox\"></pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>infra/setup/</h4><span class=\"kindtag\">infra</span></div><p class=\"sum\">The two setup faces over one schema: cli.py (terminal wizard, agent flags, host doctor) and setup.js/setup.css (the setup.html page), both rendering from schema.js so the faces can never drift; the schema also generates .env.example.</p><div class=\"row\"><b>One job:</b> Both faces render from schema.js so they can never drift apart.</div><div class=\"row\"><b>Key files / dirs:</b> schema.js; cli.py; setup.js; setup.css; tests/</div><div class=\"row\"><b>Entry / owner:</b> infra/setup/schema.js; infra/setup/cli.py</div><div class=\"row\"><b>Produces:</b> .env (saved/downloaded by either face); .env.example</div><div class=\"row\"><b>Key point:</b> Writes: .env at repo root</div><div class=\"row\"><b>IN:</b> infra (setup/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;schema&quot;: &quot;schema.js&quot;,\n  &quot;faces&quot;: [\n    &quot;cli.py&quot;,\n    &quot;setup.js/setup.html&quot;\n  ],\n  &quot;tests&quot;: [\n    &quot;test_cli.py&quot;,\n    &quot;test_doctor.py&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>infra/comfyui/</h4><span class=\"kindtag\">infra</span></div><p class=\"sum\">The ComfyUI container: Dockerfile, entrypoint, the FLUX.2 Klein model fetch script, and its data dir; the GPU image backend on Strix Halo.</p><div class=\"row\"><b>One job:</b> The local GPU image backend (FLUX.2 Klein on ComfyUI).</div><div class=\"row\"><b>Key files / dirs:</b> Dockerfile; entrypoint.sh; fetch-models.sh; data/</div><div class=\"row\"><b>Entry / owner:</b> infra/comfyui/Dockerfile; infra/comfyui/fetch-models.sh</div><div class=\"row\"><b>Produces:</b> the ComfyUI GPU service image</div><div class=\"row\"><b>Key point:</b> Writes: model weights into data/</div><div class=\"row\"><b>IN:</b> infra (comfyui/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;files&quot;: [\n    &quot;Dockerfile&quot;,\n    &quot;entrypoint.sh&quot;,\n    &quot;fetch-models.sh&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>infra/image-api/</h4><span class=\"kindtag\">infra</span></div><p class=\"sum\">The image-api REST adapter in front of ComfyUI: app (main.py, comfy_client.py, workflow.py, config.py), the workflow JSONs, tests and Dockerfile.</p><div class=\"row\"><b>One job:</b> REST face over ComfyUI; the orchestrator&#x27;s media.py talks to it.</div><div class=\"row\"><b>Key files / dirs:</b> app/main.py; app/comfy_client.py; app/workflow.py; app/config.py; workflows/; tests/; Dockerfile; README.md</div><div class=\"row\"><b>Entry / owner:</b> infra/image-api/app/main.py; infra/image-api/app/comfy_client.py</div><div class=\"row\"><b>Produces:</b> generated image bytes/urls (~4s/img)</div><div class=\"row\"><b>Key point:</b> Writes: staging image copies (freed once the orchestrator persists)</div><div class=\"row\"><b>IN:</b> infra (image-api/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;app&quot;: [\n    &quot;main.py&quot;,\n    &quot;comfy_client.py&quot;,\n    &quot;workflow.py&quot;,\n    &quot;config.py&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>voice-api/</h4><span class=\"kindtag\">voice</span></div><p class=\"sum\">The Maya1-3B TTS service on llama.cpp Vulkan: app.py (routes), synth.py, voices.py, characters.py (registry), emotion.py, manifest.py (per-game ownership), config.py, bench + samples + tests.</p><div class=\"row\"><b>One job:</b> Maya1 on llama.cpp Vulkan; speak-not-stream, per-game ownership manifest.</div><div class=\"row\"><b>Key files / dirs:</b> app.py; synth.py; voices.py; characters.py; emotion.py; manifest.py; config.py; bench.py; tests/; README.md; CHANGELOG.md</div><div class=\"row\"><b>Entry / owner:</b> voice-api/app.py; voice-api/synth.py; voice-api/manifest.py</div><div class=\"row\"><b>Produces:</b> character speech wavs (RTF ~1.1-1.2, first audio ~0.3s)</div><div class=\"row\"><b>Key point:</b> Writes: per-game wav files (the ownership manifest; delete the game, its wavs die)</div><div class=\"row\"><b>IN:</b> root (voice-api/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;route&quot;: &quot;POST /voice/speak&quot;,\n  &quot;manifest&quot;: &quot;per-game game_id ownership&quot;\n}</pre></details></div><h3 class=\"group\" id=\"grp-docs\">docs</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>docs/</h4><span class=\"kindtag\">docs</span></div><p class=\"sum\">The documentation. The PUBLIC site is ONE page (index.html) whose section views (overview, agents, engine, state, state-json, context, infra, folders) render as a node graph, an indented tree or grouped cards, each paired with an agent-ready guide/ twin. Everything else under docs/ stays private/gitignored.</p><div class=\"row\"><b>One job:</b> Where the docs live; read HANDOFF and the atlases first.</div><div class=\"row\"><b>Key files / dirs:</b> index.html (single-page docs site); guide/ (agent-ready markdown twins);.nojekyll; HANDOFF.md (private); README.md (private)</div><div class=\"row\"><b>Entry / owner:</b> docs/*.html; docs/shared/inference-providers.md</div><div class=\"row\"><b>Produces:</b> the read-first developer docs + interactive atlases</div><div class=\"row\"><b>Key point:</b> Writes: nothing</div><div class=\"row\"><b>IN:</b> root (docs/)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\"></pre></details></div>","chartHTML": "<p class=\"intro\">One monorepo. Each directory has one job; each file has one job. The INDEX.md resolver in every code dir is the authoritative map this tree is built from. Click any entry for its one job, key files and what it produces.</p><div class=\"tree\"><div class=\"trow\" data-node=\"root\" style=\"padding-left:8px\"><span class=\"dot\" style=\"background:#e7b75f\"></span><b>gamentic/</b> <span class=\"tsub\">repo</span><span class=\"tnote\"></span></div><div class=\"trow\" data-node=\"orchestrator\" style=\"padding-left:30px\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>orchestrator/</b> <span class=\"tsub\">brain</span><span class=\"tnote\">The REST surface plus the turn loop; one turn = one commit.</span></div><div class=\"trow\" data-node=\"app\" style=\"padding-left:52px\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>orchestrator/app/</b> <span class=\"tsub\">package</span><span class=\"tnote\">Each file has one job; the INDEX is the resolver.</span></div><div class=\"trow\" data-node=\"engine\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>app/engine/</b> <span class=\"tsub\">turn-loop</span><span class=\"tnote\">The turn loop: run_turn does everything; folds open their own conns.</span></div><div class=\"trow\" data-node=\"tools\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>app/tools/</b> <span class=\"tsub\">registry</span><span class=\"tnote\">The model&#x27;s ONLY way to change state.</span></div><div class=\"trow\" data-node=\"repo\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>app/repo/</b> <span class=\"tsub\">data</span><span class=\"tnote\">Data access; one turn = one commit; names normalized on every write.</span></div><div class=\"trow\" data-node=\"integrate\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>app/integrate/</b> <span class=\"tsub\">media-glue</span><span class=\"tnote\">Never hold a DB conn across a render; re-check the game exists before writing.</span></div><div class=\"trow\" data-node=\"providers\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>app/providers/</b> <span class=\"tsub\">providers</span><span class=\"tnote\">.env is the single config layer; defaults reproduce the local stack byte-for-byte.</span></div><div class=\"trow\" data-node=\"fMain\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>app/main.py</b> <span class=\"tsub\">routes</span><span class=\"tnote\">The REST surface. Every route, request gating, background-task scheduling. Nothing else.</span></div><div class=\"trow\" data-node=\"fPrompts\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>app/prompts.py</b> <span class=\"tsub\">assembly</span><span class=\"tnote\">Message assembly; computes the state block and which protocol blocks inject.</span></div><div class=\"trow\" data-node=\"fLlm\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>app/llm.py</b> <span class=\"tsub\">client</span><span class=\"tnote\">The one llama.cpp client function, chat().</span></div><div class=\"trow\" data-node=\"fDb\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>app/db.py</b> <span class=\"tsub\">schema</span><span class=\"tnote\">Schema, migrations, WAL connection settings.</span></div><div class=\"trow\" data-node=\"fModels\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>app/models.py</b> <span class=\"tsub\">contract</span><span class=\"tnote\">Pydantic request/response shapes (the wire contract).</span></div><div class=\"trow\" data-node=\"fMedia\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>app/media.py</b> <span class=\"tsub\">http-clients</span><span class=\"tnote\">Thin HTTP clients for image-api and voice-api (provider-agnostic facade).</span></div><div class=\"trow\" data-node=\"fConfig\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>app/config.py</b> <span class=\"tsub\">knobs</span><span class=\"tnote\">Every knob, env-overridable, with defaults.</span></div><div class=\"trow\" data-node=\"fCreator\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>app/creator.py</b> <span class=\"tsub\">creator</span><span class=\"tnote\">Story-creator chat sessions (SQLite-persisted) and world finalization.</span></div><div class=\"trow\" data-node=\"fTransfer\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#aab4a3\"></span><b>app/transfer.py</b> <span class=\"tsub\">transfer</span><span class=\"tnote\">Export/import: adventure templates and checkpoint saves, id remapping, media scrubbing.</span></div><div class=\"trow\" data-node=\"prompts\" style=\"padding-left:52px\"><span class=\"dot\" style=\"background:#65d08b\"></span><b>orchestrator/prompts/</b> <span class=\"tsub\">prose</span><span class=\"tnote\">Protocol blocks inject ONLY when state triggers them (the resolver).</span></div><div class=\"trow\" data-node=\"frontend\" style=\"padding-left:30px\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><b>frontend/</b> <span class=\"tsub\">ui</span><span class=\"tnote\">No build step; one state, one morphing render().</span></div><div class=\"trow\" data-node=\"src\" style=\"padding-left:52px\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><b>frontend/src/</b> <span class=\"tsub\">modules</span><span class=\"tnote\">Raw wire JSON -&gt; view model -&gt; morphed DOM.</span></div><div class=\"trow\" data-node=\"srcApp\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><b>frontend/src/app/</b> <span class=\"tsub\">controller</span><span class=\"tnote\">The controller; ctx.js holds the ONE state shared as live bindings.</span></div><div class=\"trow\" data-node=\"srcRender\" style=\"padding-left:74px\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><b>frontend/src/render/</b> <span class=\"tsub\">builders</span><span class=\"tnote\">One module per screen concern, behind the render facade.</span></div><div class=\"trow\" data-node=\"themes\" style=\"padding-left:52px\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><b>frontend/themes/</b> <span class=\"tsub\">tokens</span><span class=\"tnote\">A new theme = one file like this; no color literals outside tokens.</span></div><div class=\"trow\" data-node=\"feTest\" style=\"padding-left:52px\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><b>frontend/test/</b> <span class=\"tsub\">tests</span><span class=\"tnote\">Mount real app.js, drive with user-event, mock HTTP at the network layer (MSW).</span></div><div class=\"trow\" data-node=\"infra\" style=\"padding-left:30px\"><span class=\"dot\" style=\"background:#a895f2\"></span><b>infra/</b> <span class=\"tsub\">services</span><span class=\"tnote\">One build context per accessory service.</span></div><div class=\"trow\" data-node=\"infraSetup\" style=\"padding-left:52px\"><span class=\"dot\" style=\"background:#a895f2\"></span><b>infra/setup/</b> <span class=\"tsub\">setup</span><span class=\"tnote\">Both faces render from schema.js so they can never drift apart.</span></div><div class=\"trow\" data-node=\"infraComfy\" style=\"padding-left:52px\"><span class=\"dot\" style=\"background:#a895f2\"></span><b>infra/comfyui/</b> <span class=\"tsub\">comfyui</span><span class=\"tnote\">The local GPU image backend (FLUX.2 Klein on ComfyUI).</span></div><div class=\"trow\" data-node=\"infraImageApi\" style=\"padding-left:52px\"><span class=\"dot\" style=\"background:#a895f2\"></span><b>infra/image-api/</b> <span class=\"tsub\">image-api</span><span class=\"tnote\">REST face over ComfyUI; the orchestrator&#x27;s media.py talks to it.</span></div><div class=\"trow\" data-node=\"infraApi\" style=\"padding-left:52px\"><span class=\"dot\" style=\"background:#a895f2\"></span><b></b> <span class=\"tsub\"></span><span class=\"tnote\">Gives the vendor CLI an OpenAI face; no password ever touches .env.</span></div><div class=\"trow\" data-node=\"infraAgent\" style=\"padding-left:52px\"><span class=\"dot\" style=\"background:#a895f2\"></span><b></b> <span class=\"tsub\"></span><span class=\"tnote\">The vendor CLI runs in its own container.</span></div><div class=\"trow\" data-node=\"voice\" style=\"padding-left:30px\"><span class=\"dot\" style=\"background:#e47ea5\"></span><b>voice-api/</b> <span class=\"tsub\">voice</span><span class=\"tnote\">Maya1 on llama.cpp Vulkan; speak-not-stream, per-game ownership manifest.</span></div><div class=\"trow\" data-node=\"docs\" style=\"padding-left:30px\"><span class=\"dot\" style=\"background:#62c8d8\"></span><b>docs/</b> <span class=\"tsub\">docs</span><span class=\"tnote\">Where the docs live; read HANDOFF and the atlases first.</span></div></div>"}}};

/* ---------- small helpers ---------- */
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
function list(items){ return (!items||!items.length)?'<p>None.</p>':'<ul>'+items.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>'; }
function chips(items){ return (!items||!items.length)?'<p>None.</p>':'<div class="chips">'+items.map(x=>'<span class="chip">'+esc(x)+'</span>').join('')+'</div>'; }
function highlightJson(v){
  const j=JSON.stringify(v,null,2);
  return j.replace(/("(?:\\.|[^"\\])*")(\s*:)?|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?|\btrue\b|\bfalse\b|\bnull\b|[{}\[\]]/g,(m,str,colon)=>{
    if(str){const cls=colon?'jkey':'jstr';return '<span class="'+cls+'">'+esc(str)+'</span>'+esc(colon||'');}
    if(m==='{'||m==='}')return '<span class="jobj">'+m+'</span>';
    if(m==='['||m===']')return '<span class="jarr">'+m+'</span>';
    if(m==='true'||m==='false')return '<span class="jbool">'+m+'</span>';
    if(m==='null')return '<span class="jnull">null</span>';
    return '<span class="jnum">'+m+'</span>';
  });
}
function jsonBlock(v){ return '<pre class="jsonbox">'+highlightJson(v)+'</pre>'; }

/* ---------- DOM refs ---------- */
const svg=document.getElementById('chart'), viewport=document.getElementById('viewport'),
  edgeG=document.getElementById('edges'), labelG=document.getElementById('labels'),
  nodeG=document.getElementById('nodes'), laneG=document.getElementById('lanes'),
  defs=document.getElementById('defs'), tip=document.getElementById('tip'),
  panel=document.getElementById('panel'), stage=document.getElementById('stage'),
  textview=document.getElementById('textview');

let SEC=null;        // current section object
let g=null;          // current graph state (graph view only)
let curNodes=new Map(); // id -> node, for the current section (any view)
let mode='graphs';
function getNode(id){ return curNodes.get(id) || (g && g.byId.get(id)); }

/* ---------- graph engine (operates on g) ---------- */
function colorFor(k){ return (g.C&&g.C[k]) || Object.values(g.C)[0]; }
function edgeColor(k){ return (g.EDGE_KIND&&g.EDGE_KIND[k]) || (g.C&&g.C[k]) || 'var(--muted)'; }
function nodeFill(k){ return (g.NODE_FILL&&g.NODE_FILL[k]) || '#171410'; }

const _mid={};
function buildMarkers(){
  const colors=[...new Set(g.edges.map(e=>edgeColor(e.kind)))]; let html='';
  colors.forEach((c,i)=>{ const id='ar'+i; _mid[c]=id;
    html+='<marker id="'+id+'" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L13,6.5 L0,13 z" fill="'+c+'"></path></marker>'; });
  defs.innerHTML=html;
}
function markerFor(k){ return 'url(#'+(_mid[edgeColor(k)]||'ar0')+')'; }
function center(n){ return {x:n.x+n.w/2,y:n.y+n.h/2}; }
function boundaryPoint(a,b){
  const ac=center(a),bc=center(b),dx=bc.x-ac.x,dy=bc.y-ac.y;
  const s=Math.max(Math.abs(dx)/(a.w/2),Math.abs(dy)/(a.h/2))||1;
  return {x:ac.x+dx/s,y:ac.y+dy/s};
}
function edgeEndpoints(e){ const a=g.byId.get(e.from),b=g.byId.get(e.to); return {from:boundaryPoint(a,b),to:boundaryPoint(b,a)}; }
function edgeVector(e){ const {from,to}=edgeEndpoints(e); const dx=to.x-from.x,dy=to.y-from.y,len=Math.hypot(dx,dy)||1;
  return {from,to,ux:dx/len,uy:dy/len,nx:-dy/len,ny:dx/len,len}; }
function recipOffset(e){
  // separate reciprocal A->B / B->A arcs so they never overlap
  if(!g.recip.has(e.from+'|'+e.to)) return 0;
  return (e.from<e.to?1:-1)*22;
}
function pathFor(e){
  const {from:p1,to:p2}=edgeEndpoints(e);
  const dx=p2.x-p1.x, dy=p2.y-p1.y;
  const off=recipOffset(e);
  const v=edgeVector(e);
  const ox=v.nx*off, oy=v.ny*off; // perpendicular shove for reciprocals
  if(Math.abs(dx)>=Math.abs(dy)){ // horizontal-dominant: curve in x
    const bend=Math.max(28,Math.min(150,Math.abs(dx)*.38));
    const s=Math.sign(dx||1);
    return 'M '+p1.x+' '+p1.y+' C '+(p1.x+s*bend+ox)+' '+(p1.y+oy)+', '+(p2.x-s*bend+ox)+' '+(p2.y+oy)+', '+p2.x+' '+p2.y;
  } else { // vertical-dominant: curve in y (no sideways bulge)
    const bend=Math.max(28,Math.min(150,Math.abs(dy)*.38));
    const s=Math.sign(dy||1);
    return 'M '+p1.x+' '+p1.y+' C '+(p1.x+ox)+' '+(p1.y+s*bend+oy)+', '+(p2.x+ox)+' '+(p2.y-s*bend+oy)+', '+p2.x+' '+p2.y;
  }
}
function labelPos(e){ const a=center(g.byId.get(e.from)),b=center(g.byId.get(e.to)),v=edgeVector(e),o=42+recipOffset(e);
  return {x:(a.x+b.x)/2+v.nx*o,y:(a.y+b.y)/2+v.ny*o-7}; }
function relatedSet(){
  const set={nodes:new Set(),edges:new Set()};
  if(g.selected==null){ g.nodes.forEach(n=>set.nodes.add(n.id)); g.edges.forEach((_,i)=>set.edges.add(i)); return set; }
  set.nodes.add(g.selected);
  g.edges.forEach((e,i)=>{ if(e.from===g.selected||e.to===g.selected){set.edges.add(i);set.nodes.add(e.from);set.nodes.add(e.to);} });
  return set;
}
function render(){
  viewport.setAttribute('transform','translate('+g.t.x+' '+g.t.y+') scale('+g.t.k+')');
  laneG.innerHTML=''; edgeG.innerHTML=''; labelG.innerHTML=''; nodeG.innerHTML='';
  const maxX=Math.max(...g.nodes.map(n=>n.x+n.w))+120, minX=Math.min(-10,Math.min(...g.nodes.map(n=>n.x))-80);
  (g.lanes||[]).forEach(L=>{
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('class','laneLine'); ln.setAttribute('x1',minX); ln.setAttribute('x2',maxX); ln.setAttribute('y1',L.y); ln.setAttribute('y2',L.y);
    laneG.appendChild(ln);
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('class','laneLabel'); t.setAttribute('x',minX+14); t.setAttribute('y',L.y-10); t.textContent=L.label; laneG.appendChild(t);
  });
  const rel=relatedSet();
  g.edges.forEach((e,i)=>{
    const active=g.selectedEdge===i||g.selected==null||rel.edges.has(i);
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('class','edge'+(active?'':' dim')+(g.selectedEdge===i?' selected':''));
    p.setAttribute('d',pathFor(e)); p.setAttribute('stroke',edgeColor(e.kind)); p.setAttribute('marker-end',markerFor(e.kind));
    p.addEventListener('click',ev=>{ev.stopPropagation();selectEdge(i);});
    edgeG.appendChild(p);
    const v=edgeVector(e), off=recipOffset(e), ox=v.nx*off, oy=v.ny*off;
    const od=document.createElementNS('http://www.w3.org/2000/svg','circle');
    od.setAttribute('class','edgePort'+(active?'':' dim')); od.setAttribute('cx',v.from.x+ox); od.setAttribute('cy',v.from.y+oy);
    od.setAttribute('r',g.selectedEdge===i?5:3.8); od.setAttribute('stroke',edgeColor(e.kind)); edgeG.appendChild(od);
    const ir=document.createElementNS('http://www.w3.org/2000/svg','circle');
    ir.setAttribute('class','edgePort'+(active?'':' dim')); ir.setAttribute('cx',v.to.x+ox); ir.setAttribute('cy',v.to.y+oy);
    ir.setAttribute('r',g.selectedEdge===i?7:5.3); ir.setAttribute('fill','transparent'); ir.setAttribute('stroke',edgeColor(e.kind)); edgeG.appendChild(ir);
    const showL=g.selectedEdge===i||(g.selected!=null&&rel.edges.has(i))||e.kind===g.FLOW_KIND;
    const lp=labelPos(e);
    const lab=document.createElementNS('http://www.w3.org/2000/svg','text');
    lab.setAttribute('class','edgeLabel'+(showL?(active?'':' dim'):' hidden')); lab.setAttribute('x',lp.x); lab.setAttribute('y',lp.y);
    lab.setAttribute('text-anchor','middle'); lab.textContent=e.from+' -> '+e.to+': '+e.label; labelG.appendChild(lab);
    if(showL){
      const ot=document.createElementNS('http://www.w3.org/2000/svg','text');
      ot.setAttribute('class','edgePortText'+(active?'':' dim')); ot.setAttribute('x',v.from.x+ox+v.ux*26+v.nx*14); ot.setAttribute('y',v.from.y+oy+v.uy*26+v.ny*14);
      ot.setAttribute('text-anchor','middle'); ot.textContent='OUT'; labelG.appendChild(ot);
      const it=document.createElementNS('http://www.w3.org/2000/svg','text');
      it.setAttribute('class','edgePortText'+(active?'':' dim')); it.setAttribute('x',v.to.x+ox-v.ux*26+v.nx*14); it.setAttribute('y',v.to.y+oy-v.uy*26+v.ny*14);
      it.setAttribute('text-anchor','middle'); it.textContent='IN'; labelG.appendChild(it);
    }
  });
  g.nodes.forEach(n=>{
    const grp=document.createElementNS('http://www.w3.org/2000/svg','g');
    const seld=g.selected===n.id, conn=g.selected==null||rel.nodes.has(n.id);
    grp.setAttribute('class','node '+(seld?'selected':'')+' '+(conn?'connected':'dim')); grp.setAttribute('transform','translate('+n.x+' '+n.y+')');
    const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('class','main'); r.setAttribute('width',n.w); r.setAttribute('height',n.h);
    r.setAttribute('fill',nodeFill(n.kind)); r.setAttribute('stroke',colorFor(n.kind)); grp.appendChild(r);
    const kd=document.createElementNS('http://www.w3.org/2000/svg','text');
    kd.setAttribute('class','kind'); kd.setAttribute('x',14); kd.setAttribute('y',19); kd.setAttribute('fill',colorFor(n.kind)); kd.textContent=n.kind; grp.appendChild(kd);
    const lb=document.createElementNS('http://www.w3.org/2000/svg','text');
    lb.setAttribute('class','label'); lb.setAttribute('x',14); lb.setAttribute('y',42); lb.textContent=n.label; grp.appendChild(lb);
    const sb=document.createElementNS('http://www.w3.org/2000/svg','text');
    sb.setAttribute('class','sub'); sb.setAttribute('x',14); sb.setAttribute('y',62); sb.textContent=n.sub; grp.appendChild(sb);
    [{k:'what',l:'?',x:n.w-74,w:18},{k:'how',l:'H',x:n.w-51,w:18},{k:'io',l:'IO',x:n.w-28,w:22}].forEach(b=>{
      const bg=document.createElementNS('http://www.w3.org/2000/svg','g'); bg.setAttribute('class','helpBtn'); bg.setAttribute('transform','translate('+b.x+' 10)');
      const rr=document.createElementNS('http://www.w3.org/2000/svg','rect'); rr.setAttribute('width',b.w); rr.setAttribute('height',18); bg.appendChild(rr);
      const tt=document.createElementNS('http://www.w3.org/2000/svg','text'); tt.setAttribute('x',b.w/2); tt.setAttribute('y',12.5); tt.setAttribute('text-anchor','middle'); tt.setAttribute('fill',colorFor(n.kind)); tt.textContent=b.l; bg.appendChild(tt);
      bg.addEventListener('pointerdown',ev=>ev.stopPropagation());
      bg.addEventListener('click',ev=>{ev.stopPropagation();showHelp(ev,n,b.k);});
      grp.appendChild(bg);
    });
    grp.addEventListener('pointerdown',ev=>{ ev.stopPropagation(); g.drag={id:n.id,start:screenToWorld(ev),ox:n.x,oy:n.y,moved:false}; try{grp.setPointerCapture(ev.pointerId);}catch(_){}});
    grp.addEventListener('pointermove',ev=>{ if(!g.drag||g.drag.id!==n.id)return; const p=screenToWorld(ev),dx=p.x-g.drag.start.x,dy=p.y-g.drag.start.y;
      if(Math.abs(dx)+Math.abs(dy)>2)g.drag.moved=true; n.x=g.drag.ox+dx; n.y=g.drag.oy+dy; render(); });
    grp.addEventListener('pointerup',()=>{ if(!g.drag||g.drag.id!==n.id)return; const moved=g.drag.moved; g.drag=null; if(!moved)selectNode(n.id); });
    nodeG.appendChild(grp);
  });
}

/* ---------- selection -> panel ---------- */
function selectNode(id){ hideHelp(); g.selected=id; g.selectedEdge=null; openPanel(nodeDetail(g.byId.get(id))); centerInLeft(g.byId.get(id)); render(); }
function selectNodeById(id){ const n=getNode(id); if(n) openPanel(nodeDetail(n)); }   // tree/grouped views
function selectEdge(i){ hideHelp(); g.selectedEdge=i; g.selected=null; openPanel(edgeDetail(g.edges[i])); render(); }
function nodeJson(n){ return (SEC.NODE_JSON&&SEC.NODE_JSON[n.id]) || {[n.id]:n.summary}; }
function nodeDetail(n){
  let h='<div class="section"><h3>JSON shape</h3>'+jsonBlock(nodeJson(n))+'</div>';
  for(const s of (SEC.panelSections||[])){ const v=n[s.field]; h+='<div class="section"><h3>'+s.label+'</h3>'+(s.type==='text'?('<p>'+esc(v||'-')+'</p>'):list(v))+'</div>'; }
  h+='<div class="section"><h3>Key point</h3><p>'+esc(n.note||'-')+'</p></div>';
  h+='<div class="section"><h3>Connected edges</h3>'+chips((SEC.edges||[]).filter(e=>e.from===n.id||e.to===n.id).map(e=>e.from+' -> '+e.to+': '+e.label))+'</div>';
  return {kind:n.kind,title:n.label,summary:n.summary,html:h};
}
function edgeDetail(e){
  const a=g.byId.get(e.from),b=g.byId.get(e.to);
  const h='<div class="section"><h3>JSON edge</h3>'+jsonBlock({edge:{from:e.from,to:e.to,kind:e.kind,label:e.label,source_shape:nodeJson(a),target_shape:nodeJson(b)}})+'</div>'+
    '<div class="section"><h3>Direction</h3><p><span class="code">'+esc(e.from)+'</span> sends <span class="code">'+esc(e.label)+'</span> into <span class="code">'+esc(e.to)+'</span>. Dot = OUT, ring + arrowhead = IN.</p></div>'+
    '<div class="section"><h3>Meaning</h3><p>'+esc(e.detail)+'</p></div>'+
    '<div class="section"><h3>Source</h3><p><span class="code">'+esc(e.from)+'</span> - '+esc(a.summary)+'</p></div>'+
    '<div class="section"><h3>Target</h3><p><span class="code">'+esc(e.to)+'</span> - '+esc(b.summary)+'</p></div>';
  return {kind:e.kind+' edge',title:a.label+' -> '+b.label,summary:e.detail,html:h};
}
function openPanel(d){
  document.getElementById('pKind').textContent=d.kind;
  document.getElementById('pTitle').textContent=d.title;
  document.getElementById('pSummary').textContent=d.summary;
  document.getElementById('panelBody').innerHTML=d.html;
  panel.classList.add('open');
}
function closePanel(){ panel.classList.remove('open'); if(g){ g.selected=null; g.selectedEdge=null; render(); } }
document.getElementById('pClose').addEventListener('click',closePanel);

function centerInLeft(n){
  // keep the selected node in the visible left ~45% when the 50% panel opens
  const r=svg.getBoundingClientRect(); if(!r.width) return;
  g.t.x=r.width*0.24 - (n.x+n.w/2)*g.t.k;
  g.t.y=r.height*0.5 - (n.y+n.h/2)*g.t.k;
}

/* ---------- help tip ---------- */
function nodeFlow(id){
  const i=g.edges.filter(e=>e.to===id).map(e=>e.from+': '+e.label), o=g.edges.filter(e=>e.from===id).map(e=>e.to+': '+e.label);
  return {i:i.length?i:['none'],o:o.length?o:['none']};
}
function showHelp(ev,n,kind){
  const help=(g.NODE_HELP&&g.NODE_HELP[n.id])||{}; let title='What is?',body=help.what||n.summary;
  if(kind==='how'){title='How works?';body=help.how||n.note||n.summary;}
  else if(kind==='io'){title='Info in / out';const f=nodeFlow(n.id);body='IN: '+f.i.slice(0,3).join('; ')+'. OUT: '+f.o.slice(0,3).join('; ')+'.';}
  tip.innerHTML='<strong>'+esc(n.label)+' - '+esc(title)+'</strong><p>'+esc(body)+'</p>';
  const w=stage.getBoundingClientRect();
  tip.style.left=Math.max(10,Math.min(ev.clientX-w.left+12,w.width-332))+'px';
  tip.style.top=Math.max(10,Math.min(ev.clientY-w.top+12,w.height-120))+'px';
  tip.style.display='block';
}
function hideHelp(){ tip.style.display='none'; }

/* ---------- pan / zoom ---------- */
function screenToWorld(ev){ const r=svg.getBoundingClientRect(); return {x:(ev.clientX-r.left-g.t.x)/g.t.k,y:(ev.clientY-r.top-g.t.y)/g.t.k}; }
function isInteractive(t){ return t&&t.closest&&(t.closest('.node')||t.classList.contains('edge')); }
svg.addEventListener('pointerdown',ev=>{ if(isInteractive(ev.target))return; hideHelp(); g.pan={x:ev.clientX,y:ev.clientY,tx:g.t.x,ty:g.t.y}; svg.classList.add('dragging'); });
svg.addEventListener('pointermove',ev=>{ if(!g.pan)return; g.t.x=g.pan.tx+ev.clientX-g.pan.x; g.t.y=g.pan.ty+ev.clientY-g.pan.y; render(); });
svg.addEventListener('pointerup',()=>{ g&&(g.pan=null); svg.classList.remove('dragging'); });
svg.addEventListener('pointerleave',()=>{ g&&(g.pan=null); svg.classList.remove('dragging'); });
svg.addEventListener('click',ev=>{ if(isInteractive(ev.target))return; hideHelp(); closePanel(); });
svg.addEventListener('wheel',ev=>{ ev.preventDefault(); const r=svg.getBoundingClientRect(),mx=ev.clientX-r.left,my=ev.clientY-r.top;
  const bx=(mx-g.t.x)/g.t.k,by=(my-g.t.y)/g.t.k,sc=Math.exp(-ev.deltaY*.0012);
  g.t.k=Math.max(.16,Math.min(1.8,g.t.k*sc)); g.t.x=mx-bx*g.t.k; g.t.y=my-by*g.t.k; render(); },{passive:false});
document.addEventListener('keydown',ev=>{ if(ev.key==='Escape')closePanel(); });

function fit(){
  const pad=70,top=70; const minX=Math.min(...g.nodes.map(n=>n.x)),minY=Math.min(...g.nodes.map(n=>n.y));
  const maxX=Math.max(...g.nodes.map(n=>n.x+n.w)),maxY=Math.max(...g.nodes.map(n=>n.y+n.h));
  const r=svg.getBoundingClientRect(); const k=Math.min((r.width-pad*2)/(maxX-minX),(r.height-top-pad)/(maxY-minY));
  g.t.k=Math.max(.16,Math.min(1.2,k||.5)); g.t.x=pad-minX*g.t.k; g.t.y=top-minY*g.t.k; render();
}
function home(){ g.t={...(g.home||{x:60,y:80,k:.5})}; render(); }
document.getElementById('fit').onclick=fit;
document.getElementById('reset').onclick=()=>{ g.orig.forEach(p=>{const n=g.byId.get(p.id);n.x=p.x;n.y=p.y;}); closePanel(); home(); };

/* ---------- section + mode switching ---------- */
function initGraph(sec){
  g={ ...sec, byId:new Map(sec.nodes.map(n=>[n.id,n])), selected:null, selectedEdge:null, drag:null, pan:null,
      t:{...(sec.home||{x:60,y:80,k:.5})}, orig:sec.nodes.map(n=>({id:n.id,x:n.x,y:n.y})),
      recip:new Set() };
  const pairs=new Set(sec.edges.map(e=>e.from+'|'+e.to));
  sec.edges.forEach(e=>{ if(pairs.has(e.to+'|'+e.from)) g.recip.add(e.from+'|'+e.to); });
  buildMarkers();
  // legend
  document.getElementById('legend').innerHTML=(sec.legend||[]).map(l=>'<span class="pill"><i class="dot" style="background:'+l.color+'"></i>'+esc(l.label)+'</span>').join('');
  fit();
}
const VLABEL={graph:'Graph',tree:'Tree',grouped:'Chart',text:'Graphs'};
function applyMode(){
  const visual = SEC.view!=='text';                 // has a visual (chart/tree/graph) mode
  const mG=document.getElementById('mGraph');
  mG.disabled=!visual; mG.textContent=VLABEL[SEC.view]||'Graphs';
  const showVisual = visual && mode==='graphs';
  mG.classList.toggle('active',showVisual);
  document.getElementById('mText').classList.toggle('active',!showVisual);
  const isGraph = SEC.view==='graph' && showVisual;
  svg.classList.toggle('hide',!isGraph);
  document.getElementById('legend').classList.toggle('hide',!isGraph);
  document.getElementById('controls').classList.toggle('hide',!isGraph);
  textview.classList.toggle('show',!isGraph);
  if(isGraph){ initGraph(SEC); return; }
  closePanel();
  const html = showVisual ? SEC.chartHTML : SEC.textHTML;
  textview.innerHTML='<div class="tv">'+html+'</div>';
}
function selectSection(id,subId){
  closePanel();
  SEC=DATA.byId[id];
  curNodes=new Map((SEC.nodes||[]).map(n=>[n.id,n]));
  document.getElementById('crumbTitle').textContent=SEC.title;
  document.getElementById('crumbSub').textContent=SEC.subtitle||'';
  document.querySelectorAll('.navsec').forEach(el=>{ const on=el.dataset.id===id; el.classList.toggle('active',on); el.classList.toggle('open',on); });
  applyMode(); // mode persists; text-only sections just display text (see applyMode)
  if(subId){ focusGroup(subId); }
  document.querySelectorAll('.subs button').forEach(b=>b.classList.toggle('active',b.dataset.sub===subId&&b.dataset.id===id));
  if(history.replaceState) try{ history.replaceState(null,'','#'+id); }catch(_){}
}
function focusGroup(subId){
  if(!(SEC.view==='graph'&&mode==='graphs')) { // tree/grouped/text: scroll to the group heading or its first node
    let el=document.getElementById('grp-'+subId);
    const grp=(SEC.groups||[]).find(x=>x.id===subId);
    if(!el && grp && grp.nodeIds.length) el=textview.querySelector('[data-node="'+grp.nodeIds[0]+'"]');
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); return;
  }
  const grp=(SEC.groups||[]).find(x=>x.id===subId); if(!grp) return;
  const ns=grp.nodeIds.map(id=>g.byId.get(id)).filter(Boolean); if(!ns.length) return;
  const minX=Math.min(...ns.map(n=>n.x)),minY=Math.min(...ns.map(n=>n.y)),maxX=Math.max(...ns.map(n=>n.x+n.w)),maxY=Math.max(...ns.map(n=>n.y+n.h));
  const r=svg.getBoundingClientRect(),pad=90;
  g.t.k=Math.max(.18,Math.min(1.0,Math.min((r.width-pad*2)/(maxX-minX||1),(r.height-pad*2)/(maxY-minY||1))));
  g.t.x=r.width/2-((minX+maxX)/2)*g.t.k; g.t.y=r.height/2-((minY+maxY)/2)*g.t.k; render();
}
function setMode(m){ if(SEC.view==='text')m='text'; mode=m; applyMode(); }
document.getElementById('mGraph').addEventListener('click',()=>setMode('graphs'));
document.getElementById('mText').addEventListener('click',()=>setMode('text'));

/* ---------- build nav ---------- */
function buildNav(){
  const nl=document.getElementById('navlist');
  nl.innerHTML=DATA.order.map(id=>{
    const s=DATA.byId[id];
    const subs=(s.groups||[]).map(gp=>'<button data-id="'+id+'" data-sub="'+gp.id+'">'+esc(gp.label)+'</button>').join('');
    return '<div class="navsec" data-id="'+id+'"><button data-id="'+id+'"><span class="ndot" style="background:'+(s.dot||'var(--muted)')+'"></span>'+esc(s.title)+'</button>'+(subs?'<div class="subs">'+subs+'</div>':'')+'</div>';
  }).join('');
  nl.querySelectorAll('.navsec > button').forEach(b=>b.addEventListener('click',()=>selectSection(b.dataset.id)));
  nl.querySelectorAll('.subs button').forEach(b=>b.addEventListener('click',ev=>{ ev.stopPropagation(); selectSection(b.dataset.id,b.dataset.sub); }));
}

buildNav();
textview.addEventListener('click',ev=>{
  const node=ev.target.closest('[data-node]'); if(node){ ev.preventDefault(); selectNodeById(node.getAttribute('data-node')); return; }
  const a=ev.target.closest('[data-go]'); if(a){ ev.preventDefault(); selectSection(a.getAttribute('data-go')); }
});
const _h=(location.hash||'').slice(1);
selectSection(DATA.byId[_h]?_h:DATA.order[0]);
window.addEventListener('hashchange',()=>{ const h=location.hash.slice(1); if(DATA.byId[h]&&h!==(SEC&&SEC.id)) selectSection(h); });
window.addEventListener('resize',()=>{ if(SEC&&SEC.view==='graph'&&mode==='graphs') render(); });
</script>
</body>
