ew calls generate_view_snapshot SYNCHRONOUSLY."},{"from": "mediaJobs","to": "imageApi","kind": "call","label": "media.generate_scene_image / character_images","detail": "integrate/jobs.py calls media.generate_scene_image / generate_character_images which dispatch to the resolved ImageProvider (default ComfyProvider POST /image/generate, /image/character) under the _RENDER_GATE lock."},{"from": "mediaJobs","to": "repoDb","kind": "write","label": "persist image beats + url columns","detail": "after a render lands, jobs re-check the game exists then storage._persist + repo.add_beat(kind=image) / set_scene_image / set_character_images / set_item_image."},{"from": "mediaJobs","to": "sseStream","kind": "call","label": "events.publish(gid, scene|portrait|item|beat)","detail": "each persisted job calls integrate.events.publish; publish does loop.call_soon_threadsafe(q.put_nowait) into every subscriber queue, which the SSE generator drains."},{"from": "restApi","to": "voiceApi","kind": "call","label": "POST /audio/speak -> provider.speak","detail": "main.py audio_speak resolves audio provider server-side (providers.resolve('audio')); LocalProvider POSTs {base}/voice/speak then GETs the audio_url, returns bytes so keys never reach the browser. Gated by voice_enabled()."},{"from": "llmText","to": "providers","kind": "call","label": "providers.resolve('text')","detail": "llm.chat calls providers.base.resolve('text') at call time for base_url/model/key/caps; env -> default."},{"from": "imageApi","to": "providers","kind": "call","label": "providers.resolve('image') -> get_provider","detail": "media._provider = image_providers.get_provider(providers.resolve('image')); picks comfy|openai|gemini|fal per call."},{"from": "voiceApi","to": "providers","kind": "call","label": "providers.resolve('audio') -> get_provider","detail": "audio_speak uses audio_providers.get_provider(providers.resolve('audio')); picks local|openai|elevenlabs|fal; voice_enabled() gates it."}],"NODE_JSON": {"browser": {"backendUrl": "http://localhost:8000","READ_TIMEOUT_MS": 20000,"LLM_TIMEOUT_MS": 330000,"IMPORT_TIMEOUT_MS": 60000},"restApi": {"routes": ["GET /health","POST /games","GET /games","GET /games/{gid}/export?kind=template|checkpoint","POST /games/import","GET /games/{gid}/events (SSE)","GET /games/{gid}/state","GET /games/{gid}/beats?since=","DELETE /games/{gid}/beats","DELETE /games?confirm=wipe (wipe all memory)","DELETE /games/{gid}","POST /games/{gid}/action","POST /games/{gid}/continue","PATCH /games/{gid}/settings","GET /games/{gid}/characters/{cid}/profile","POST /games/{gid}/view","POST /games/{gid}/explain","POST /create/message","GET /create/{session_id}","POST /create/finalize","POST /audio/speak","GET /media/{gid}/{name}"]},"sseStream": {"kind": "scene","scene_id": "abc","_alt_kinds": ["portrait char_id=","item name=","beat (private_with optional)"]},"turnEngine": {"beats": [{"id": "b1","turn_index": 4,"seq": 0,"speaker": "narrator|player|<char_id>|system","speaker_name": "Narrator","kind": "narration|dialogue|action|system|image","text": "...","private_with": null,"emotion": ""}],"state": "<GameState>","spawned": [],"image_request": {"description": "...","caption": "..."}},"toolDispatcher": {"narrator_order": ["apply_damage","heal","add_item","move_location","cue_character","spawn_character","kill_character","describe_scene","show_image(conditional)","reject_attempt(conditional)"],"character_tools": ["attack","give_item","share_past","mark_moment","admit_trait"],"result": {"kind": "state|cue|spawn|reject|image|kill|invalid","text": "receipt","reactions": ["<char_id>"],"cue": {}}},"promptsAssembly": {"messages": [{"role": "system","content": "<world bible + scene + history + tools scaffold>"},{"role": "user","content": "<composed action / impulse>"}]},"mediaJobs": {"persisted_url": "/media/{gid}/scene-<id>.png","beat": {"kind": "image","image_url": "/media/...","text": "<caption/concept>","private_with": null},"sse_event": {"kind": "scene","scene_id": "<id>"}},"providers": {"ProviderConfig": {"modality": "text","provider": "local","base_url": "http://gamentic-llm-text:8080/v1","api_key": "","model": "gemma-4-12b-heretic","supports_seed": false,"supports_references": false,"emotion_mode": "none","max_stops": 8,"supports_thinking": true},"DIALECTS": {"text": ["local","openai"],"audio": ["local","openai","elevenlabs","fal"],"image": ["comfy","openai","gemini","fal"]}},"repoDb": {"GameState": {"game_id": "g1","title": "...","status": "active|won|lost","scene": {"id": "s1","name": "...","image_url": null,"exits": [],"items": []},"characters": [{"id": "c1","voice_id": "...","context": {"used": 0,"max": 131072}}],"player": {"life": 20,"location": "start","inventory": []},"time": {"label": "Day 1, morning"},"images_enabled": true,"narrator_voice_id": "..."}},"llmText": {"url": "{base_url}/chat/completions","local_base_url": "http://gamentic-llm-text:8080/v1","payload": {"model": "gemma-4-26b-a4b-heretic","messages": [],"temperature": 0.8,"tools": [],"tool_choice": "auto","stop": [],"chat_template_kwargs": {"enable_thinking": true}},"deployed_model": "gemma-4-26b-a4b-heretic (compose LLM_MODEL=${LLM_ALIAS})","config_default_model": "gemma-4-12b-heretic (bare fallback, overridden by compose)"},"imageApi": {"base_url": "http://gamentic-image-api:9001","generate_req": {"prompt": "...","width": 768,"height": 768,"references": [],"seed": null},"generate_resp": {"image_url": "/image/file?filename=...&subfolder=&type=output"}},"voiceApi": {"base_url": "http://gamentic-voice-api:8080","speak_req": {"text": "...","voice_id": "narrator","emotion": "whisper","game_id": "g1"},"speak_resp": {"audio_url": "/voice/file/xyz.wav"}}},"NODE_HELP": {"browser": {"what": "The static vanilla-JS app (served by nginx on :5173/:80) that calls the orchestrator REST API cross-origin and opens one EventSource per game for media-ready pushes.","how": "Media (image/voice/audio) is NOT in api.js: it is served same-origin via the nginx proxy with RELATIVE urls (/image, /voice, /audio). Only game JSON goes to backendUrl :8000."},"restApi": {"what": "FastAPI app (orchestrator, :8000) exposing the full game REST surface: games CRUD, state/beats reads, action/continue turns, settings, view/explain, creator, audio, import/export, media files.","how": "POST /games/{gid}/action is the one hot path: it calls engine.interpret_action (typed freeform) then engine.run_turn synchronously, returns the fully-resolved turn, and queues slow media as BackgroundTasks delivered later by SSE."},"sseStream": {"what": "Per-game server-sent-event endpoint: background media jobs publish to an in-process bus and this route streams 'media ready' hints so the browser re-fetches /state or /beats?since= instead of polling blind.","how": "In-process by design (one uvicorn worker owns the game). Jobs run in worker threads and hop to the event loop via loop.call_soon_threadsafe; event payload carries only a kind hint (scene|portrait|item|beat), never the media."},"turnEngine": {"what": "The bounded multi-actor event loop: records the player beat, runs the deterministic movement router + adjudication pre-checks, calls the narrator LLM with tools, processes the character reaction cascade, handles the private whisper channel, and returns new beats + state.","how": "Directed actions (attack/give) are NOT applied immediately: the narrator adjudicates (accept via matching tool / veto via reject_attempt), and anything left untouched is default-applied after the reply. Player death is engine-owned (life==0 -> status 'lost'), overriding the model."},"toolDispatcher": {"what": "The model's ONLY way to change state: a validated dispatcher over NARRATOR_TOOLS and CHARACTER_TOOLS that scrubs args, routes to per-domain handlers, and returns a typed result (state|cue|spawn|reject|image|kill|invalid).","how": "narrator_tools(adjudicating, images) conditionally adds reject_attempt (only when attempts pend) and show_image (only when IMAGE_ENABLED). Unknown names / bad arg types return kind='invalid' and get one deterministic intra-reply retry."},"promptsAssembly": {"what": "Builds the message arrays for every LLM call (narrator, character, resolve, interpret, explain, art-director) from DB state, history window, lore budget, and tool scaffolding.","how": "Each character agent has its OWN context (its prompt feeds only its per-character meter); the global context meter tracks the narrator's biggest prompt this turn only."},"mediaJobs": {"what": "The stateful generate_* background orchestrators: each opens its own DB conns around the slow render call, re-checks the game still exists before persisting, lands results as beats/row updates, and publishes an SSE event.","how": "All run as BackgroundTasks EXCEPT generate_view_snapshot (synchronous, POST /games/{gid}/view, the player watches a loader). Every persisted job calls events.publish so the SSE stream pushes the FE a refetch hint."},"providers": {"what": "","how": "Defaults reproduce the local stack byte-for-byte."},"repoDb": {"what": "The authoritative game state in SQLite (WAL, stdlib, no ORM). repo/state.py projects the GameState the UI renders; tool handlers and the engine are the only writers.","how": "The model never owns state; it only proposes changes through validated tools. WAL + 60s busy_timeout lets background media persists queue behind a multi-second turn transaction instead of raising 'database is locked'."},"llmText": {"what": "Thin httpx client for the llama.cpp OpenAI-compatible /chat/completions endpoint; the single text brain behind narrator, character, interpret, explain, art-director, summary calls.","how": "Local default base_url = http://gamentic-llm-text:8080/v1 (host :8080), deployed model gemma-4-26b-a4b-heretic (compose sets LLM_MODEL=${LLM_ALIAS}; gemma-4-12b-heretic is only the bare config.py fallback). stop list sliced to cfg.max_stops; thinking only when cfg.supports_thinking (local)."},"imageApi": {"what": "Best-effort HTTP client to the active image provider (default comfy = the image-api adapter in front of ComfyUI) for scene/view/item/character renders, guarded so a dead service never breaks the game.","how": "ComfyProvider hits {base}/image/generate and {base}/image/character; cloud dialects (openai /v1/images/*, gemini generateContent, fal queue) implement the same interface. Host port 9001; in-container the orchestrator uses http://gamentic-image-api:9001."},"voiceApi": {"what": "Best-effort HTTP client to the active audio provider (default local = the Maya1 voice-api): /audio/speak resolves the provider server-side and returns audio bytes so API keys never reach the browser.","how": "voice-api listens on :8080 IN-CONTAINER (host maps 9002->8080), so the orchestrator uses VOICE_API_URL=http://gamentic-voice-api:8080. Browser plays via same-origin /voice nginx proxy, not :9002 directly."}},"groups": [{"id": "frontend","label": "frontend","nodeIds": ["browser"]},{"id": "api","label": "REST + SSE","nodeIds": ["restApi","sseStream"]},{"id": "engine","label": "turn engine","nodeIds": ["turnEngine","toolDispatcher","promptsAssembly","mediaJobs"]},{"id": "providers","label": "providers","nodeIds": ["providers"]},{"id": "data","label": "data (SQLite)","nodeIds": ["repoDb"]},{"id": "service","label": "external services","nodeIds": ["llmText","imageApi","voiceApi"]}],"C": {"frontend": "#7ba7ff","api": "#62c8d8","engine": "#e7b75f","data": "#65d08b","service": "#a895f2","providers": "#e47ea5"},"textHTML": "<p class=\"intro\">Plain REST, sequential: one request returns one fully-resolved turn. The single push channel is the SSE stream that announces background media the moment it lands.</p><h3 class=\"group\" id=\"grp-frontend\">frontend</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span><h4>Browser frontend</h4><span class=\"kindtag\">frontend</span></div><p class=\"sum\">The static vanilla-JS app (served by nginx on :5173/:80) that calls the orchestrator REST API cross-origin and opens one EventSource per game for media-ready pushes.</p><div class=\"row\"><b>Reads / inputs:</b> createApi(backendUrl) in frontend/src/api.js (default http://localhost:8000); mapGameState/mapBeats/mapProfile in frontend/src/adapters.js (wire -&gt; view model); EventSource(`${api.base}/games/{id}/events`) in frontend/src/app/mediastream.js:watchMedia</div><div class=\"row\"><b>Generates / outputs:</b> turn requests (segments or freeform action + optional wish); view-model objects for the renderer; TTS playback via same-origin /voice proxy (voice.js, not in api.js)</div><div class=\"row\"><b>Writes / mutates:</b> localStorage pm-seen markers (adapters.js: savePmSeen); no server state directly; all mutation goes through REST</div><div class=\"row\"><b>Owned by (code):</b> frontend/src/api.js: createApi/request; frontend/src/adapters.js: mapGameState/mapBeat/mapProfile/voiceForBeat; frontend/src/app/mediastream.js: watchMedia/refreshArt/pullBeats</div><div class=\"row\"><b>Key point:</b> Media (image/voice/audio) is NOT in api.js: it is served same-origin via the nginx proxy with RELATIVE urls (/image, /voice, /audio). Only game JSON goes to backendUrl :8000.</div><div class=\"row\"><b>IN:</b> restApi (TurnOut / GameState JSON); sseStream (push {kind: scene|portrait|item|beat})</div><div class=\"row\"><b>OUT:</b> restApi (POST /games/{id}/action / FE refetch on SSE hint); sseStream (EventSource /games/{id}/events)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;backendUrl&quot;: &quot;http://localhost:8000&quot;,\n  &quot;READ_TIMEOUT_MS&quot;: 20000,\n  &quot;LLM_TIMEOUT_MS&quot;: 330000,\n  &quot;IMPORT_TIMEOUT_MS&quot;: 60000\n}</pre></details></div><h3 class=\"group\" id=\"grp-api\">REST + SSE</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>REST API surface</h4><span class=\"kindtag\">api</span></div><p class=\"sum\">FastAPI app (orchestrator, :8000) exposing the full game REST surface: games CRUD, state/beats reads, action/continue turns, settings, view/explain, creator, audio, import/export, media files.</p><div class=\"row\"><b>Reads / inputs:</b> db.get_conn / repo.* (every route opens a per-request SQLite conn); settings (config.py) for IMAGE_ENABLED, GAMES_DATA_DIR, EVENTS_KEEPALIVE_S; providers.resolve / voice_enabled for /audio/speak</div><div class=\"row\"><b>Generates / outputs:</b> TurnOut {beats, state, spawned} (action/continue); GameState (get_state); {beats:[...]} (get_beats); {game_id} (create/import/finalize); audio bytes (audio_speak); SSE stream (game_events_stream)</div><div class=\"row\"><b>Writes / mutates:</b> schedules BackgroundTasks (enrich_origins, generate_creation_art, generate_images_for_game, generate_scene_image, generate_directed_image, generate_view_snapshot, generate_item_image, maybe_update_summary, maybe_update_character_summaries); mutates DB via repo/engine inside route bodies</div><div class=\"row\"><b>Owned by (code):</b> main.py: create_game POST /games; main.py: get_state GET /games/{gid}/state; main.py: get_beats GET /games/{gid}/beats; main.py: action POST /games/{gid}/action; main.py: continue_story POST /games/{gid}/continue; main.py: _resolved_turn (shared turn runner + bg art scheduling); main.py: update_settings PATCH /games/{gid}/settings; main.py: view_scene POST /games/{gid}/view; main.py: explain POST /games/{gid}/explain; main.py: audio_speak POST /audio/speak; main.py: media_file GET /media/{gid}/{name}; main.py: import_game/export_game/delete_game/wipe_everything/clear_history; main.py: create_message/create_session/create_finalize</div><div class=\"row\"><b>Key point:</b> POST /games/{gid}/action is the one hot path: it calls engine.interpret_action (typed freeform) then engine.run_turn synchronously, returns the fully-resolved turn, and queues slow media as BackgroundTasks delivered later by SSE.</div><div class=\"row\"><b>IN:</b> browser (POST /games/{id}/action / FE refetch on SSE hint)</div><div class=\"row\"><b>OUT:</b> browser (TurnOut / GameState JSON); turnEngine (engine.run_turn / interpret_action); repoDb (repo.game_state / get_beats); mediaJobs (BackgroundTasks.add_task(generate_*)); voiceApi (POST /audio/speak -&gt; provider.speak)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;routes&quot;: [\n    &quot;GET /health&quot;,\n    &quot;POST /games&quot;,\n    &quot;GET /games&quot;,\n    &quot;GET /games/{gid}/export?kind=template|checkpoint&quot;,\n    &quot;POST /games/import&quot;,\n    &quot;GET /games/{gid}/events (SSE)&quot;,\n    &quot;GET /games/{gid}/state&quot;,\n    &quot;GET /games/{gid}/beats?since=&quot;,\n    &quot;DELETE /games/{gid}/beats&quot;,\n    &quot;DELETE /games?confirm=wipe (wipe all memory)&quot;,\n    &quot;DELETE /games/{gid}&quot;,\n    &quot;POST /games/{gid}/action&quot;,\n    &quot;POST /games/{gid}/continue&quot;,\n    &quot;PATCH /games/{gid}/settings&quot;,\n    &quot;GET /games/{gid}/characters/{cid}/profile&quot;,\n    &quot;POST /games/{gid}/view&quot;,\n    &quot;POST /games/{gid}/explain&quot;,\n    &quot;POST /create/message&quot;,\n    &quot;GET /create/{session_id}&quot;,\n    &quot;POST /create/finalize&quot;,\n    &quot;POST /audio/speak&quot;,\n    &quot;GET /media/{gid}/{name}&quot;\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>SSE events stream</h4><span class=\"kindtag\">api</span></div><p class=\"sum\">Per-game server-sent-event endpoint: background media jobs publish to an in-process bus and this route streams &#x27;media ready&#x27; hints so the browser re-fetches /state or /beats?since= instead of polling blind.</p><div class=\"row\"><b>Reads / inputs:</b> game_events.subscribe(gid) -&gt; asyncio.Queue (integrate/events.py); repo.get_game (404 if missing); settings.EVENTS_KEEPALIVE_S (ping cadence)</div><div class=\"row\"><b>Generates / outputs:</b> text/event-stream: &#x27;retry: 3000&#x27;, &#x27;data: {kind,...}&#x27;, &#x27;: ping&#x27; keepalive</div><div class=\"row\"><b>Writes / mutates:</b> registers/unregisters a subscriber queue in integrate/events._subscribers</div><div class=\"row\"><b>Owned by (code):</b> main.py: game_events_stream; integrate/events.py: subscribe/unsubscribe/publish</div><div class=\"row\"><b>Key point:</b> In-process by design (one uvicorn worker owns the game). Jobs run in worker threads and hop to the event loop via loop.call_soon_threadsafe; event payload carries only a kind hint (scene|portrait|item|beat), never the media.</div><div class=\"row\"><b>IN:</b> browser (EventSource /games/{id}/events); mediaJobs (events.publish(gid, scene|portrait|item|beat))</div><div class=\"row\"><b>OUT:</b> browser (push {kind: scene|portrait|item|beat})</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;kind&quot;: &quot;scene&quot;,\n  &quot;scene_id&quot;: &quot;abc&quot;,\n  &quot;_alt_kinds&quot;: [\n    &quot;portrait char_id=&quot;,\n    &quot;item name=&quot;,\n    &quot;beat (private_with optional)&quot;\n  ]\n}</pre></details></div><h3 class=\"group\" id=\"grp-engine\">turn engine</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Turn engine (run_turn)</h4><span class=\"kindtag\">engine</span></div><p class=\"sum\">The bounded multi-actor event loop: records the player beat, runs the deterministic movement router + adjudication pre-checks, calls the narrator LLM with tools, processes the character reaction cascade, handles the private whisper channel, and returns new beats + state.</p><div class=\"row\"><b>Reads / inputs:</b> repo.* (scenes, players, characters, beats, game row, item index); prompts.build_narrator_messages / build_character_messages / build_narrator_resolve_messages / build_interpret_messages; tools.narrator_tools / CHARACTER_TOOLS; settings (NARRATOR_TEMPERATURE, TURN_MAX_ACTOR_STEPS, DAMAGE_CAP, history/turn dials, NARRATOR_THINKING)</div><div class=\"row\"><b>Generates / outputs:</b> {beats, state, spawned} plus optional image_request / view_fallback / private_looks / new_items keys popped by main.py for bg scheduling</div><div class=\"row\"><b>Writes / mutates:</b> beats (emit -&gt; repo.add_beat); state via tools.apply_tool (damage, items, move, spawn/kill, quests, scene); game row: advance_time, set_context_used, set_last_tool_errors, set_game_status(&#x27;lost&#x27;), set_scene_description, clear_arrival_note</div><div class=\"row\"><b>Owned by (code):</b> engine/turn.py: run_turn; engine/turn.py: _compose (segments -&gt; action text + directed); engine/turn.py: _why_impossible / _match_exit (deterministic pre-checks/movement); engine/turn.py: _character_reply (one character POV+tools); engine/turn.py: interpret_action (freeform -&gt; segments via LLM); engine/__init__.py re-exports run_turn et al</div><div class=\"row\"><b>Key point:</b> Directed actions (attack/give) are NOT applied immediately: the narrator adjudicates (accept via matching tool / veto via reject_attempt), and anything left untouched is default-applied after the reply. Player death is engine-owned (life==0 -&gt; status &#x27;lost&#x27;), overriding the model.</div><div class=\"row\"><b>IN:</b> restApi (engine.run_turn / interpret_action)</div><div class=\"row\"><b>OUT:</b> promptsAssembly (build_narrator/character/resolve messages); llmText (llm.chat(messages, tools, stop, thinking)); toolDispatcher (tools.apply_tool(name, args, actor)); repoDb (emit beats + game-row dials)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;beats&quot;: [\n    {\n      &quot;id&quot;: &quot;b1&quot;,\n      &quot;turn_index&quot;: 4,\n      &quot;seq&quot;: 0,\n      &quot;speaker&quot;: &quot;narrator|player|&lt;char_id&gt;|system&quot;,\n      &quot;speaker_name&quot;: &quot;Narrator&quot;,\n      &quot;kind&quot;: &quot;narration|dialogue|action|system|image&quot;,\n      &quot;text&quot;: &quot;...&quot;,\n      &quot;private_with&quot;: null,\n      &quot;emotion&quot;: &quot;&quot;\n    }\n  ],\n  &quot;state&quot;: &quot;&lt;GameState&gt;&quot;,\n  &quot;spawned&quot;: [],\n  &quot;image_request&quot;: {\n    &quot;description&quot;: &quot;...&quot;,\n    &quot;caption&quot;: &quot;...&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Tool dispatcher</h4><span class=\"kindtag\">engine</span></div><p class=\"sum\">The model&#x27;s ONLY way to change state: a validated dispatcher over NARRATOR_TOOLS and CHARACTER_TOOLS that scrubs args, routes to per-domain handlers, and returns a typed result (state|cue|spawn|reject|image|kill|invalid).</p><div class=\"row\"><b>Reads / inputs:</b> tools.base.HANDLERS / SCHEMAS (registered by @tool decorator); LLMReply.tool_calls from llm.chat (narrator + character calls); repo.* inside each handler</div><div class=\"row\"><b>Generates / outputs:</b> {kind, text, reactions, cue} result dicts consumed by run_turn; system/state beats (receipts), cues that queue characters, spawn cast, image requests</div><div class=\"row\"><b>Writes / mutates:</b> all game-state mutation: repo writes for damage/heal/items/quests/move/scene/disposition/spawn/kill via the handler modules</div><div class=\"row\"><b>Owned by (code):</b> tools/__init__.py: apply_tool / narrator_tools / NARRATOR_TOOLS / CHARACTER_TOOLS; tools/base.py: HANDLERS/SCHEMAS/_invalid/clean_arg; tools/{combat,items,characters,scene,world,narrative,progression}.py: handlers</div><div class=\"row\"><b>Key point:</b> narrator_tools(adjudicating, images) conditionally adds reject_attempt (only when attempts pend) and show_image (only when IMAGE_ENABLED). Unknown names / bad arg types return kind=&#x27;invalid&#x27; and get one deterministic intra-reply retry.</div><div class=\"row\"><b>IN:</b> turnEngine (tools.apply_tool(name, args, actor))</div><div class=\"row\"><b>OUT:</b> repoDb (handler mutates state)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;narrator_order&quot;: [\n    &quot;apply_damage&quot;,\n    &quot;heal&quot;,\n    &quot;add_item&quot;,\n    &quot;move_location&quot;,\n    &quot;cue_character&quot;,\n    &quot;spawn_character&quot;,\n    &quot;kill_character&quot;,\n    &quot;describe_scene&quot;,\n    &quot;show_image(conditional)&quot;,\n    &quot;reject_attempt(conditional)&quot;\n  ],\n  &quot;character_tools&quot;: [\n    &quot;attack&quot;,\n    &quot;give_item&quot;,\n    &quot;share_past&quot;,\n    &quot;mark_moment&quot;,\n    &quot;admit_trait&quot;\n  ],\n  &quot;result&quot;: {\n    &quot;kind&quot;: &quot;state|cue|spawn|reject|image|kill|invalid&quot;,\n    &quot;text&quot;: &quot;receipt&quot;,\n    &quot;reactions&quot;: [\n      &quot;&lt;char_id&gt;&quot;\n    ],\n    &quot;cue&quot;: {}\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Prompts assembly</h4><span class=\"kindtag\">engine</span></div><p class=\"sum\">Builds the message arrays for every LLM call (narrator, character, resolve, interpret, explain, art-director) from DB state, history window, lore budget, and tool scaffolding.</p><div class=\"row\"><b>Reads / inputs:</b> repo.* (game row, beats history, characters, scenes, lore, summaries); settings (LORE_BUDGET, history/char-history windows); engine state (attempts, looking, wish) passed by run_turn</div><div class=\"row\"><b>Generates / outputs:</b> list[dict] OpenAI-style messages + INTERPRET_TOOL/INTERPRET_TOOL schemas</div><div class=\"row\"><b>Writes / mutates:</b> nothing (read-only assembly)</div><div class=\"row\"><b>Owned by (code):</b> prompts.build_narrator_messages; prompts.build_character_messages; prompts.build_narrator_resolve_messages; prompts.build_interpret_messages; prompts.build_explain_messages; prompts.build_artdirector_messages</div><div class=\"row\"><b>Key point:</b> Each character agent has its OWN context (its prompt feeds only its per-character meter); the global context meter tracks the narrator&#x27;s biggest prompt this turn only.</div><div class=\"row\"><b>IN:</b> turnEngine (build_narrator/character/resolve messages)</div><div class=\"row\"><b>OUT:</b> repoDb (read state for prompt)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;&lt;world bible + scene + history + tools scaffold&gt;&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;&lt;composed action / impulse&gt;&quot;\n    }\n  ]\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Integrate media jobs</h4><span class=\"kindtag\">engine</span></div><p class=\"sum\">The stateful generate_* background orchestrators: each opens its own DB conns around the slow render call, re-checks the game still exists before persisting, lands results as beats/row updates, and publishes an SSE event.</p><div class=\"row\"><b>Reads / inputs:</b> repo.* (game, scene, characters, item index, current scene); image_prompts.* (prompt building, hardening, context); media.generate_scene_image / generate_character_images; settings (IMAGE_* sizes, IMAGE_AGENTIC_PROMPTS, IMAGE_ART_DIRECTOR, IMAGE_ITEMS)</div><div class=\"row\"><b>Generates / outputs:</b> persisted image files under GAMES_DATA_DIR/{gid}/images; image beats (repo.add_beat kind=image); row updates: set_scene_image, set_character_images, set_item_image</div><div class=\"row\"><b>Writes / mutates:</b> beats + scene/character/item image_url columns; /media files on disk (storage._persist); events.publish(gid, scene|portrait|item|beat)</div><div class=\"row\"><b>Owned by (code):</b> integrate/jobs.py: generate_view_snapshot (SYNC, the See button); integrate/jobs.py: generate_directed_image (narrator show_image); integrate/jobs.py: generate_item_image; integrate/jobs.py: generate_scene_image / generate_images_for_game; integrate/jobs.py: art_direction / generate_creation_art; integrate/events.py: publish</div><div class=\"row\"><b>Key point:</b> All run as BackgroundTasks EXCEPT generate_view_snapshot (synchronous, POST /games/{gid}/view, the player watches a loader). Every persisted job calls events.publish so the SSE stream pushes the FE a refetch hint.</div><div class=\"row\"><b>IN:</b> restApi (BackgroundTasks.add_task(generate_*))</div><div class=\"row\"><b>OUT:</b> imageApi (media.generate_scene_image / character_images); repoDb (persist image beats + url columns); sseStream (events.publish(gid, scene|portrait|item|beat))</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;persisted_url&quot;: &quot;/media/{gid}/scene-&lt;id&gt;.png&quot;,\n  &quot;beat&quot;: {\n    &quot;kind&quot;: &quot;image&quot;,\n    &quot;image_url&quot;: &quot;/media/...&quot;,\n    &quot;text&quot;: &quot;&lt;caption/concept&gt;&quot;,\n    &quot;private_with&quot;: null\n  },\n  &quot;sse_event&quot;: {\n    &quot;kind&quot;: &quot;scene&quot;,\n    &quot;scene_id&quot;: &quot;&lt;id&gt;&quot;\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-providers\">providers</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><h4>Providers layer</h4><span class=\"kindtag\">providers</span></div><p class=\"sum\">Per-modality provider resolution at call time (env -> default): picks local vs cloud for text/image/audio and returns a ProviderConfig (base_url, key, model, capabilities) plus the concrete dialect client.</p><div class=\"row\"><b>Reads / inputs:</b> env vars TEXT_*/AUDIO_*/IMAGE_* and aliases LLM_BASE_URL/LLM_MODEL; / / / /; settings.LLM_BASE_URL / IMAGE_API_URL / VOICE_API_URL (local defaults)</div><div class=\"row\"><b>Generates / outputs:</b> ProviderConfig per modality; ImageProvider / AudioProvider instances (comfy|openai|gemini|fal ; local|openai|elevenlabs|fal)</div><div class=\"row\"><b>Writes / mutates:</b> nothing (pure resolution)</div><div class=\"row\"><b>Owned by (code):</b> providers/base. providers/image.py: get_provider + ComfyProvider/OpenAIProvider/GeminiProvider/FalProvider; providers/audio.py: get_provider + LocalProvider/OpenAIProvider/ElevenLabsProvider/FalProvider</div><div class=\"row\"><b>Key point:</b>Defaults reproduce the local stack byte-for-byte.</div><div class=\"row\"><b>IN:</b> llmText (providers.resolve(&#x27;text&#x27;)); imageApi (providers.resolve(&#x27;image&#x27;) -&gt; get_provider); voiceApi (providers.resolve(&#x27;audio&#x27;) -&gt; get_provider).</div><div class=\"row\"><b>OUT:</b> llmText ( on -&gt; text gateway)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;ProviderConfig&quot;: {\n    &quot;modality&quot;: &quot;text&quot;,\n    &quot;provider&quot;: &quot;local&quot;,\n    &quot;base_url&quot;: &quot;http://gamentic-llm-text:8080/v1&quot;,\n    &quot;api_key&quot;: &quot;&quot;,\n    &quot;model&quot;: &quot;gemma-4-12b-heretic&quot;,\n    &quot;supports_seed&quot;: false,\n    &quot;supports_references&quot;: false,\n    &quot;emotion_mode&quot;: &quot;none&quot;,\n    &quot;max_stops&quot;: 8,\n    &quot;supports_thinking&quot;: true\n  },\n  &quot;DIALECTS&quot;: {\n    &quot;text&quot;: [\n      &quot;local&quot;,\n      &quot;openai&quot;\n    ],\n    &quot;audio&quot;: [\n      &quot;local&quot;,\n      &quot;openai&quot;,\n      &quot;elevenlabs&quot;,\n      &quot;fal&quot;\n    ],\n    &quot;image&quot;: [\n      &quot;comfy&quot;,\n      &quot;openai&quot;,\n      &quot;gemini&quot;,\n      &quot;fal&quot;\n    ]\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-data\">data (SQLite)</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>Repo / SQLite</h4><span class=\"kindtag\">data</span></div><p class=\"sum\">The authoritative game state in SQLite (WAL, stdlib, no ORM). repo/state.py projects the GameState the UI renders; tool handlers and the engine are the only writers.</p><div class=\"row\"><b>Reads / inputs:</b> db.connect (settings.DB_PATH, WAL, busy_timeout 60s); tables: games, player_state, characters, quests, objectives, lore, beats, scenes, creator_sessions</div><div class=\"row\"><b>Generates / outputs:</b> GameState dict (repo/state.game_state); beat rows, scene/character/item updates, game-row dials</div><div class=\"row\"><b>Writes / mutates:</b> every game-state table; schema + _MIGRATIONS in db.py applied on init_db()</div><div class=\"row\"><b>Owned by (code):</b> db.py: init_db / connect / get_conn / _migrate / loads; repo/state.py: game_state; repo/* domain modules: add_beat, advance_time, set_*_image, set_context_used, set_game_status, etc.</div><div class=\"row\"><b>Key point:</b> The model never owns state; it only proposes changes through validated tools. WAL + 60s busy_timeout lets background media persists queue behind a multi-second turn transaction instead of raising &#x27;database is locked&#x27;.</div><div class=\"row\"><b>IN:</b> promptsAssembly (read state for prompt); toolDispatcher (handler mutates state); turnEngine (emit beats + game-row dials); restApi (repo.game_state / get_beats); mediaJobs (persist image beats + url columns)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;GameState&quot;: {\n    &quot;game_id&quot;: &quot;g1&quot;,\n    &quot;title&quot;: &quot;...&quot;,\n    &quot;status&quot;: &quot;active|won|lost&quot;,\n    &quot;scene&quot;: {\n      &quot;id&quot;: &quot;s1&quot;,\n      &quot;name&quot;: &quot;...&quot;,\n      &quot;image_url&quot;: null,\n      &quot;exits&quot;: [],\n      &quot;items&quot;: []\n    },\n    &quot;characters&quot;: [\n      {\n        &quot;id&quot;: &quot;c1&quot;,\n        &quot;voice_id&quot;: &quot;...&quot;,\n        &quot;context&quot;: {\n          &quot;used&quot;: 0,\n          &quot;max&quot;: 131072\n        }\n      }\n    ],\n    &quot;player&quot;: {\n      &quot;life&quot;: 20,\n      &quot;location&quot;: &quot;start&quot;,\n      &quot;inventory&quot;: []\n    },\n    &quot;time&quot;: {\n      &quot;label&quot;: &quot;Day 1, morning&quot;\n    },\n    &quot;images_enabled&quot;: true,\n    &quot;narrator_voice_id&quot;: &quot;...&quot;\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-service\">external services</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>llm.chat -&gt; llm-text</h4><span class=\"kindtag\">service</span></div><p class=\"sum\">Thin httpx client for the llama.cpp OpenAI-compatible /chat/completions endpoint; the single text brain behind narrator, character, interpret, explain, art-director, summary calls.</p><div class=\"row\"><b>Reads / inputs:</b> providers.resolve(&#x27;text&#x27;) -&gt; base_url/model/key/capabilities; settings.LLM_TIMEOUT (300s); messages + tools + stop + thinking from the engine/prompts</div><div class=\"row\"><b>Generates / outputs:</b> LLMReply {content, tool_calls[ToolCall], finish_reason, usage{prompt_tokens,...}}</div><div class=\"row\"><b>Writes / mutates:</b> nothing locally; POSTs to the text service</div><div class=\"row\"><b>Owned by (code):</b> llm.py: chat (builds payload, posts {base_url}/chat/completions, parses tool_calls, one connect-retry)</div><div class=\"row\"><b>Key point:</b> Local default base_url = http://gamentic-llm-text:8080/v1 (host :8080), deployed model gemma-4-26b-a4b-heretic (compose sets LLM_MODEL=${LLM_ALIAS}; gemma-4-12b-heretic is only the bare config.py fallback). stop list sliced to cfg.max_stops; thinking only when cfg.supports_thinking (local).</div><div class=\"row\"><b>IN:</b> turnEngine (llm.chat(messages, tools, stop, thinking)); providers ( on -&gt; text gateway)</div><div class=\"row\"><b>OUT:</b> providers (providers.resolve(&#x27;text&#x27;)).</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;url&quot;: &quot;{base_url}/chat/completions&quot;,\n  &quot;local_base_url&quot;: &quot;http://gamentic-llm-text:8080/v1&quot;,\n  &quot;payload&quot;: {\n    &quot;model&quot;: &quot;gemma-4-26b-a4b-heretic&quot;,\n    &quot;messages&quot;: [],\n    &quot;temperature&quot;: 0.8,\n    &quot;tools&quot;: [],\n    &quot;tool_choice&quot;: &quot;auto&quot;,\n    &quot;stop&quot;: [],\n    &quot;chat_template_kwargs&quot;: {\n      &quot;enable_thinking&quot;: true\n    }\n  },\n  &quot;deployed_model&quot;: &quot;gemma-4-26b-a4b-heretic (compose LLM_MODEL=${LLM_ALIAS})&quot;,\n  &quot;config_default_model&quot;: &quot;gemma-4-12b-heretic (bare fallback, overridden by compose)&quot;\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>media.py -&gt; image-api</h4><span class=\"kindtag\">service</span></div><p class=\"sum\">Best-effort HTTP client to the active image provider (default comfy = the image-api adapter in front of ComfyUI) for scene/view/item/character renders, guarded so a dead service never breaks the game.</p><div class=\"row\"><b>Reads / inputs:</b> providers.resolve(&#x27;image&#x27;) / image_providers.get_provider; settings.IMAGE_API_URL (http://gamentic-image-api:9001), IMAGE_ENABLED; _RENDER_GATE (one render at a time orchestrator-wide)</div><div class=\"row\"><b>Generates / outputs:</b> {image_url} (data: URL or path) and {face_url, body_front_url, body_side_url, seed}; fetched image bytes (fetch_image_bytes) for per-game persistence</div><div class=\"row\"><b>Writes / mutates:</b> nothing locally; persistence happens in integrate/jobs via storage._persist; deletes staging files on image-api (delete_staging_image / purge_all_staging_images)</div><div class=\"row\"><b>Owned by (code):</b> media.py: generate_scene_image / generate_character_images / fetch_image_bytes / _provider; media.py: delete_staging_image / purge_all_staging_images; providers/image.py: ComfyProvider.generate POST /image/generate, .character_set POST /image/character</div><div class=\"row\"><b>Key point:</b> ComfyProvider hits {base}/image/generate and {base}/image/character; cloud dialects (openai /v1/images/*, gemini generateContent, fal queue) implement the same interface. Host port 9001; in-container the orchestrator uses http://gamentic-image-api:9001.</div><div class=\"row\"><b>IN:</b> mediaJobs (media.generate_scene_image / character_images)</div><div class=\"row\"><b>OUT:</b> providers (providers.resolve(&#x27;image&#x27;) -&gt; get_provider)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;base_url&quot;: &quot;http://gamentic-image-api:9001&quot;,\n  &quot;generate_req&quot;: {\n    &quot;prompt&quot;: &quot;...&quot;,\n    &quot;width&quot;: 768,\n    &quot;height&quot;: 768,\n    &quot;references&quot;: [],\n    &quot;seed&quot;: null\n  },\n  &quot;generate_resp&quot;: {\n    &quot;image_url&quot;: &quot;/image/file?filename=...&amp;subfolder=&amp;type=output&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>media.py -&gt; voice-api</h4><span class=\"kindtag\">service</span></div><p class=\"sum\">Best-effort HTTP client to the active audio provider (default local = the Maya1 voice-api): /audio/speak resolves the provider server-side and returns audio bytes so API keys never reach the browser.</p><div class=\"row\"><b>Reads / inputs:</b> providers.resolve(&#x27;audio&#x27;) / audio_providers.get_provider / voice_enabled(); settings.VOICE_API_URL (http://gamentic-voice-api:8080), VOICE_ENABLED; SpeakIn {text, voice_id, emotion, game_id} from POST /audio/speak</div><div class=\"row\"><b>Generates / outputs:</b> (audio bytes, content_type) returned as a Response; wav-cache ownership tags (game_id -&gt; manifest) in local mode</div><div class=\"row\"><b>Writes / mutates:</b> nothing locally; purges/cleanup hit voice-api (purge_game_audio, purge_all_audio, delete/register character voice)</div><div class=\"row\"><b>Owned by (code):</b> main.py: audio_speak POST /audio/speak; media.py: list_voice_ids / register_character_voice / delete_character_voice / purge_game_audio / purge_all_audio; providers/audio.py: LocalProvider.speak POST /voice/speak then GET audio_url</div><div class=\"row\"><b>Key point:</b> voice-api listens on :8080 IN-CONTAINER (host maps 9002-&gt;8080), so the orchestrator uses VOICE_API_URL=http://gamentic-voice-api:8080. Browser plays via same-origin /voice nginx proxy, not :9002 directly.</div><div class=\"row\"><b>IN:</b> restApi (POST /audio/speak -&gt; provider.speak)</div><div class=\"row\"><b>OUT:</b> providers (providers.resolve(&#x27;audio&#x27;) -&gt; get_provider)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;base_url&quot;: &quot;http://gamentic-voice-api:8080&quot;,\n  &quot;speak_req&quot;: {\n    &quot;text&quot;: &quot;...&quot;,\n    &quot;voice_id&quot;: &quot;narrator&quot;,\n    &quot;emotion&quot;: &quot;whisper&quot;,\n    &quot;game_id&quot;: &quot;g1&quot;\n  },\n  &quot;speak_resp&quot;: {\n    &quot;audio_url&quot;: &quot;/voice/file/xyz.wav&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span>","legend": [{"color": "var(--blue)","label": "frontend"},{"color": "var(--cyan)","label": "api"},{"color": "var(--amber)","label": "engine"},{"color": "var(--green)","label": "data"},{"color": "var(--violet)","label": "service"},{"color": "var(--pink)","label": "providers"}],"NODE_FILL": {"frontend": "#111521","api": "#101718","engine": "#171410","data": "#121812","service": "#161322","providers": "#181117"},"EDGE_KIND": {"rest": "#7ba7ff","sse": "#62c8d8","call": "#e7b75f","write": "#65d08b","read": "#a895f2"},"FLOW_KIND": "rest","lanes": [],"home": {"x": 20,"y": 30,"k": 0.36},"chartHTML": null},"state": {"id": "state","title": "State","dot": "var(--green)","view": "grouped","subtitle": "The linear ingestion flow plus the persistent SQLite state it mutates. The model proposes; tools/engine write; the UI projects.","panelSections": [{"label": "Lifecycle","field": "lifecycle","type": "text"},{"label": "Populated with","field": "populated","type": "list"},{"label": "Modified by / where","field": "mutators","type": "list"},{"label": "Read by","field": "reads","type": "list"}],"nodes": [{"id": "input","kind": "ingest","label": "Player input","sub": "text or segments","summary": "The player sends free text or composer-built segments. This is not state yet.","lifecycle": "Ephemeral request payload.","populated": ["ActionIn.action: freeform text","ActionIn.segments: say/do/look/attack/give/whisper","wish: hope channel, not an action"],"mutators": ["frontend/src/composer.js: buildSegment","frontend/src/app/turns.js: takeTurn","orchestrator/app/models.py: ActionIn"],"reads": ["Current UI state for chips, target names, inventory ids."],"note": "Free text may be reinterpreted before the turn. Structured segments skip that LLM step."},{"id": "interpret","kind": "ingest","label": "Interpreter","sub": "free text -> segments","summary": "A small one-call agent normalizes typed input into the same segment contract as the UI composer.","lifecycle": "Optional and stateless.","populated": ["submit_segments tool result","max 6 interpreted segments accepted by engine"],"mutators": ["orchestrator/app/engine/turn.py: interpret_action","orchestrator/app/prompts.py: build_interpret_messages"],"reads": ["player_state.inventory","present characters at player_state.location"],"note": "Failure falls back to raw text, so this does not block a turn."},{"id": "gates","kind": "ingest","label": "Deterministic gates","sub": "route, reject, pend","summary": "Plain code handles movement through known exits, impossible attempts, echo beats, and the automatic story-clock tick before narrator reasoning.","lifecycle": "Runs every public turn.","populated": ["player beat","system rejection beats","pending attack/give attempts","arrival_note on return"],"mutators": ["run_turn","_compose","_match_exit","_why_impossible","repo.advance_time"],"reads": ["player_state.location","scenes.exits","characters location/present/alive","player inventory"],"note": "This is where the engine prevents the model from narrating impossible handovers or attacks as successful."},{"id": "nctx","kind": "derived","label": "Narrator context","sub": "state + history","summary": "The narrator prompt is rebuilt from current state, recent beats, folded recap, lore, and situational protocol blocks.","lifecycle": "Derived per narrator call; never stored.","populated": ["GAME STATE block","STORY SO FAR","EARLIER CHAPTERS","tool error feedback","look/new-place/returning/attempt blocks"],"mutators": ["orchestrator/app/prompts.py: build_narrator_messages","_state_block","_situation_blocks"],"reads": ["games","player_state","characters","scenes","quests","lore","beats"],"note": "This is the main context-engineering seam."},{"id": "narrator","kind": "boundary","label": "Narrator LLM","sub": "prose + tool calls","summary": "The narrator reasons about next state, writes prose, and proposes tool calls. It does not directly own state.","lifecycle": "One call per public turn, plus a short resolve pass only if needed.","populated": ["assistant content","OpenAI-style tool_calls","usage.prompt_tokens"],"mutators": ["orchestrator/app/llm.py: chat","orchestrator/prompts/narrator.system.md"],"reads": ["The prompt stack only."],"note": "Tool calls are proposals until the dispatcher validates them."},{"id": "tools","kind": "ingest","label": "Tool dispatcher","sub": "validated writes","summary": "Every model mutation goes through a registered tool handler. Unknown or bad calls return invalid, not a crash.","lifecycle": "Runs for narrator and character tool cal
