<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gamentic — Docs & Blueprints</title>
<meta name="description" content="Interactive blueprints + an agent-ready guide for Gamentic, a self-hosted AI dungeon RPG: agents, engine, state, infra, the repo tree.">
<style>
  :root {
    --bg:#070807; --surface:#101210; --surface-2:#151814; --surface-3:#1d211c;
    --line:#30362d; --line-soft:#222720; --text:#eef2e8; --muted:#aab4a3; --faint:#707b69;
    --green:#65d08b; --cyan:#62c8d8; --amber:#e7b75f; --pink:#e47ea5; --violet:#a895f2; --red:#ef756f; --blue:#7ba7ff;
    --shadow:rgba(0,0,0,.55);
  }
  * { box-sizing:border-box; }
  html, body { width:100%; height:100%; margin:0; overflow:hidden; }
  body {
    background:var(--bg); color:var(--text);
    font:13px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  a { color:var(--cyan); }

  #app { position:fixed; inset:0; display:grid; grid-template-columns:262px 1fr; }

  /* ---------- left nav ---------- */
  #nav {
    border-right:1px solid var(--line); background:rgba(11,13,10,.96);
    display:grid; grid-template-rows:auto 1fr auto; min-height:0;
  }
  .brand { padding:16px 16px 12px; border-bottom:1px solid var(--line); }
  .brand .eyebrow { color:var(--faint); text-transform:uppercase; letter-spacing:2px; font-size:10px; font-weight:800; }
  .brand h1 { margin:5px 0 0; font-size:16px; letter-spacing:.2px; }
  .brand p { margin:5px 0 0; color:var(--muted); font-size:11.5px; }
  #navlist { overflow:auto; padding:8px 8px 16px; min-height:0; }
  .navsec { margin:2px 0; }
  .navsec > button {
    width:100%; text-align:left; border:0; background:transparent; color:var(--text);
    padding:8px 10px; border-radius:8px; font:700 13px ui-sans-serif,system-ui,sans-serif; cursor:pointer;
    display:flex; align-items:center; gap:8px;
  }
  .navsec > button:hover { background:var(--surface-2); }
  .navsec.active > button { background:rgba(101,208,139,.10); color:var(--text); }
  .navsec .ndot { width:8px; height:8px; border-radius:99px; flex:0 0 auto; }
  .subs { margin:2px 0 6px 24px; display:none; }
  .navsec.open .subs { display:block; }
  .subs button {
    width:100%; text-align:left; border:0; background:transparent; color:var(--muted);
    padding:5px 9px; border-radius:7px; font:500 12px ui-sans-serif,system-ui,sans-serif; cursor:pointer;
  }
  .subs button:hover { background:var(--surface-2); color:var(--text); }
  .subs button.active { color:var(--text); background:rgba(123,167,255,.10); }
  #navfoot { padding:10px 14px; border-top:1px solid var(--line); color:var(--faint); font-size:11px; }

  /* ---------- main ---------- */
  #main { min-width:0; min-height:0; display:grid; grid-template-rows:auto 1fr; }
  .topbar {
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:11px 16px; border-bottom:1px solid var(--line); background:rgba(11,13,10,.9);
  }
  .crumb { min-width:0; }
  .crumb h2 { margin:0; font-size:15px; }
  .crumb p { margin:2px 0 0; color:var(--muted); font-size:12px; max-width:70ch; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .modes { flex:0 0 auto; display:flex; gap:0; border:1px solid var(--line); border-radius:9px; overflow:hidden; }
  .modes button {
    border:0; background:rgba(16,18,16,.9); color:var(--muted); padding:8px 14px;
    font:650 12px ui-sans-serif,system-ui,sans-serif; cursor:pointer;
  }
  .modes button.active { background:var(--surface-3); color:var(--text); }
  .modes button:disabled { opacity:.35; cursor:not-allowed; }

  #stage {
    position:relative; min-width:0; min-height:0; overflow:hidden;
    background:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px), var(--bg);
    background-size:36px 36px;
  }

  /* graph */
  #chart { width:100%; height:100%; display:block; touch-action:none; cursor:grab; }
  #chart.dragging { cursor:grabbing; }
  .legend { position:absolute; left:16px; top:14px; z-index:3; display:flex; flex-wrap:wrap; gap:7px; max-width:60%; pointer-events:none; }
  .pill { display:inline-flex; gap:6px; align-items:center; padding:5px 8px; border:1px solid var(--line); border-radius:999px;
          background:rgba(16,18,16,.82); color:var(--muted); font-size:11px; box-shadow:0 10px 28px var(--shadow); }
  .dot { width:8px; height:8px; border-radius:99px; display:inline-block; }
  .controls { position:absolute; left:16px; bottom:14px; display:flex; gap:8px; z-index:3; }
  button.ctl { border:1px solid var(--line); background:rgba(16,18,16,.9); color:var(--text); border-radius:8px;
               padding:8px 10px; font:650 11px ui-sans-serif,system-ui,sans-serif; cursor:pointer; }
  button.ctl:hover { background:var(--surface-2); border-color:#46513f; }

  #tip { position:absolute; z-index:6; width:min(320px,calc(100vw - 24px)); display:none; border:1px solid #3a4435;
         border-radius:9px; padding:9px 10px; background:rgba(9,11,9,.97); box-shadow:0 18px 42px var(--shadow); color:var(--muted); pointer-events:none; }
  #tip strong { display:block; margin-bottom:4px; color:var(--text); font-size:12px; }
  #tip p { margin:0; }

  .node rect.main { stroke-width:1.3; rx:12; filter:drop-shadow(0 10px 18px rgba(0,0,0,.42)); }
  .node text { user-select:none; pointer-events:none; }
  .node .label { font-weight:760; font-size:13px; fill:var(--text); }
  .node .sub { font-size:11px; fill:var(--muted); }
  .node .kind { font-size:9px; font-weight:850; letter-spacing:1.1px; text-transform:uppercase; }
  .node.selected rect.main { stroke-width:2.6; }
  .node.dim { opacity:.26; }
  .node.connected { opacity:1; }
  .node { cursor:pointer; }
  .edge { fill:none; stroke-width:2.1; stroke-linecap:round; opacity:.5; cursor:pointer; }
  .edge.dim { opacity:.12; }
  .edge.selected { opacity:1; stroke-width:3.4; }
  .edgePort { fill:rgba(7,8,7,.88); stroke-width:1.6; pointer-events:none; }
  .edgePort.dim { opacity:.12; }
  .edgePortText { fill:var(--faint); font:8px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; text-transform:uppercase;
                  letter-spacing:.4px; paint-order:stroke; stroke:rgba(7,8,7,.9); stroke-width:3px; pointer-events:none; user-select:none; }
  .edgePortText.dim { opacity:.12; }
  .edgeLabel { font-size:10px; fill:var(--muted); opacity:.66; paint-order:stroke; stroke:rgba(7,8,7,.82); stroke-width:4px;
               stroke-linejoin:round; pointer-events:none; user-select:none; }
  .edgeLabel.hidden { opacity:0; }
  .edgeLabel.dim { opacity:.16; }
  .laneLabel { font-size:11px; font-weight:850; letter-spacing:1.2px; text-transform:uppercase; fill:var(--faint); pointer-events:none; }
  .laneLine { stroke:rgba(170,180,163,.16); stroke-width:1; stroke-dasharray:5 8; pointer-events:none; }
  .helpBtn rect { fill:rgba(7,8,7,.72); stroke:var(--line); rx:6; }
  .helpBtn text { font:850 8px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; pointer-events:none; }
  .helpBtn:hover rect { stroke:#64715d; fill:rgba(24,28,22,.95); }

  /* click-to-open detail panel: hidden until a node/edge is clicked, then covers 50% */
  #panel {
    position:absolute; top:0; right:0; bottom:0; width:50%;
    background:rgba(11,13,10,.98); border-left:1px solid var(--line); box-shadow:-26px 0 60px var(--shadow);
    transform:translateX(101%); transition:transform .18s ease; z-index:7;
    display:grid; grid-template-rows:auto 1fr; min-height:0;
  }
  #panel.open { transform:translateX(0); }
  .panelHead { padding:15px 17px 13px; border-bottom:1px solid var(--line); }
  .panelTop { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
  .panelHead .eyebrow { color:var(--faint); text-transform:uppercase; letter-spacing:1px; font-size:10px; font-weight:800; }
  .panelHead h3 { margin:5px 0 0; font-size:16px; line-height:1.2; }
  .panelHead p { margin:7px 0 0; color:var(--muted); font-size:12px; }
  .closeX { flex:0 0 auto; border:1px solid var(--line); background:rgba(16,18,16,.9); color:var(--text);
            border-radius:7px; padding:5px 9px; font:700 12px ui-sans-serif,system-ui,sans-serif; cursor:pointer; }
  .closeX:hover { background:var(--surface-2); border-color:#46513f; }
  #panelBody { overflow:auto; min-height:0; padding:14px 17px 24px; }

  /* shared content blocks (panel + text view) */
  .section { margin:0 0 14px; padding:12px; border:1px solid var(--line-soft); background:rgba(21,24,20,.74); border-radius:10px; }
  .section h3 { margin:0 0 8px; color:var(--text); font-size:11px; text-transform:uppercase; letter-spacing:.9px; }
  .section p { margin:0; color:var(--muted); }
  ul { margin:0; padding-left:17px; color:var(--muted); } li { margin:3px 0; }
  .code { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:11px; color:#d9e5d1; }
  .jsonbox { margin:0; padding:10px; overflow:visible; border:1px solid #2b3329; border-radius:8px; background:#090b09;
             color:#d9e5d1; font:11px/1.48 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; tab-size:2; white-space:pre-wrap; word-break:break-word; }
  .jsonbox .jkey{color:var(--green)} .jsonbox .jstr{color:var(--amber)} .jsonbox .jnum{color:var(--cyan)}
  .jsonbox .jbool{color:var(--violet)} .jsonbox .jnull{color:var(--red)} .jsonbox .jobj{color:#8fdc89;font-weight:800} .jsonbox .jarr{color:#78d4e2;font-weight:800}
  .chips { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { display:inline-flex; border:1px solid var(--line); border-radius:7px; padding:3px 7px; color:var(--muted);
          background:rgba(0,0,0,.16); font:11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }

  /* text mode */
  #textview { position:absolute; inset:0; overflow:auto; display:none; padding:22px 26px 60px; }
  #textview.show { display:block; }
  #chart.hide { display:none; }
  .legend.hide, .controls.hide { display:none; }
  .tv { max-width:1100px; margin:0 auto; }
  .tv .intro { color:var(--muted); margin:0 0 18px; max-width:80ch; }
  .tv h3.group { margin:26px 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:1.2px; color:var(--faint); border-bottom:1px solid var(--line-soft); padding-bottom:6px; }
  .card { border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin:0 0 12px; background:rgba(16,18,16,.6); }
  .card .ct { display:flex; align-items:center; gap:9px; margin-bottom:4px; }
  .card .ct .dot { width:9px; height:9px; }
  .card h4 { margin:0; font-size:15px; }
  .card .kindtag { font:9px ui-monospace,monospace; text-transform:uppercase; letter-spacing:1px; color:var(--faint); }
  .card .sum { color:var(--muted); margin:0 0 8px; }
  .card .row { margin:4px 0; font-size:12.5px; }
  .card .row b { color:var(--text); }
  .card details { margin-top:8px; }
  .card summary { cursor:pointer; color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.8px; }
  .overviewGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:13px; margin-top:14px; }
  a.ocard { display:block; padding:14px 15px; border:1px solid var(--line); border-radius:12px; background:rgba(16,18,16,.65);
            text-decoration:none; color:var(--text); }
  a.ocard:hover { border-color:#54614c; background:var(--surface-2); }
  a.ocard h4 { margin:0 0 5px; font-size:15px; display:flex; align-items:center; gap:8px; }
  a.ocard p { margin:0; color:var(--muted); font-size:12.5px; }

  /* tree view (folders) */
  .tree { max-width:1040px; margin:0 auto; }
  .trow { display:flex; align-items:center; gap:8px; padding:6px 9px; border-radius:7px; cursor:pointer; border:1px solid transparent; }
  .trow:hover { background:var(--surface-2); border-color:var(--line); }
  .trow b { font-weight:680; }
  .trow .tsub { color:var(--faint); font-size:11px; }
  .trow .tnote { color:var(--muted); font-size:11.5px; margin-left:auto; max-width:48%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* grouped cards (state/context/infra) */
  .cardgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(264px,1fr)); gap:11px; margin:0 0 8px; }
  .gcard { border:1px solid var(--line); border-radius:11px; padding:12px 13px; background:rgba(16,18,16,.62); cursor:pointer; }
  .gcard:hover { border-color:#54614c; background:var(--surface-2); }
  .gcard .ct { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .gcard .ct b { font-size:14px; } .gcard .ct .dot { width:9px; height:9px; }
  .gcard .kindtag { margin-left:auto; font:9px ui-monospace,monospace; text-transform:uppercase; letter-spacing:.8px; color:var(--faint); }
  .gcard .sum { color:var(--muted); margin:0 0 7px; font-size:12.5px; }
  .gcard .meta { color:var(--faint); font:11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }

  @media (max-width:820px) {
    #app { grid-template-columns:1fr; grid-template-rows:auto 1fr; }
    #nav { grid-template-rows:auto auto; border-right:0; border-bottom:1px solid var(--line); max-height:42vh; }
    #panel { width:88%; }
    .legend { display:none; }
  }
</style>
</head>
<body>
<div id="app">
  <nav id="nav">
    <div class="brand">
      <div class="eyebrow">Gamentic</div>
      <h1>Docs &amp; Blueprints</h1>
      <p>One page. Pick a section; switch Graphs / Text.</p>
    </div>
    <div id="navlist"></div>
    <div id="navfoot">Built from the live codebase.</div>
  </nav>
  <main id="main">
    <div class="topbar">
      <div class="crumb"><h2 id="crumbTitle">Overview</h2><p id="crumbSub"></p></div>
      <div class="modes">
        <button id="mGraph" data-mode="graphs">Graphs</button>
        <button id="mText" data-mode="text">Text</button>
      </div>
    </div>
    <div id="stage">
      <div class="legend" id="legend"></div>
      <svg id="chart" role="img" aria-label="Gamentic atlas"><defs id="defs"></defs>
        <g id="viewport"><g id="lanes"></g><g id="edges"></g><g id="labels"></g><g id="nodes"></g></g>
      </svg>
      <div class="controls" id="controls"><button class="ctl" id="fit">Fit</button><button class="ctl" id="reset">Reset</button></div>
      <div id="tip"></div>
      <div id="textview"></div>
      <aside id="panel">
        <div class="panelHead">
          <div class="panelTop"><div class="eyebrow" id="pKind">node</div><button class="closeX" id="pClose">Close ✕</button></div>
          <h3 id="pTitle"></h3><p id="pSummary"></p>
        </div>
        <div id="panelBody"></div>
      </aside>
    </div>
  </main>
</div>

<script>
const DATA = {"order": ["overview","agents","engine","state","statejson","context","infra","folders"],"byId": {"overview": {"id": "overview","title": "Overview","dot": "var(--cyan)","view": "text","subtitle": "One page. Pick a section; switch Graphs / Text.","groups": [],"chartHTML": null,"textHTML": "<div class=\"section\"><h3>The whole project in one line</h3><p>A self-hosted AI dungeon RPG: one local LLM plays every role through purpose-built contexts (agents); whatever it wants to change the world must pass a validated tool into SQLite (the single source of truth); a FastAPI brain resolves one turn per request and pushes late media over SSE; the frontend is a no-build vanilla SPA; image and voice are optional local services.</p></div><h3 class=\"group\">Sections</h3><div class=\"overviewGrid\"><a class=\"ocard\" href=\"#agents\" data-go=\"agents\"><h4><span class=\"dot\" style=\"background:var(--amber)\"></span>Agents</h4><p>Every LLM agent + the agentic-tool bridges.</p></a><a class=\"ocard\" href=\"#engine\" data-go=\"engine\"><h4><span class=\"dot\" style=\"background:var(--cyan)\"></span>Engine</h4><p>The turn pipeline wiring the browser to the services.</p></a><a class=\"ocard\" href=\"#state\" data-go=\"state\"><h4><span class=\"dot\" style=\"background:var(--green)\"></span>State</h4><p>Ingestion flow + the persistent SQLite state.</p></a><a class=\"ocard\" href=\"#statejson\" data-go=\"statejson\"><h4><span class=\"dot\" style=\"background:var(--green)\"></span>State JSON</h4><p>The exact JSON field shapes.</p></a><a class=\"ocard\" href=\"#context\" data-go=\"context\"><h4><span class=\"dot\" style=\"background:var(--violet)\"></span>Context</h4><p>Every LLM context + enhancer path.</p></a><a class=\"ocard\" href=\"#infra\" data-go=\"infra\"><h4><span class=\"dot\" style=\"background:var(--pink)\"></span>Infra</h4></a><a class=\"ocard\" href=\"#folders\" data-go=\"folders\"><h4><span class=\"dot\" style=\"background:var(--blue)\"></span>Folders</h4><p>The repo tree, one job per file.</p></a></div><div class=\"section\" style=\"margin-top:18px\"><h3>How to read it</h3><p>Each view is one dataset, built from the live code. The left tree is always visible; a section's sub-items focus a cluster (graphs) or scroll to it (tree / chart / text). When code and a doc disagree, the code and the in-repo <span class=\"code\">INDEX.md</span> maps win.</p></div>"},"agents": {"id": "agents","title": "Agents","dot": "var(--amber)","view": "graph","subtitle": "cue_character is the bridge.","panelSections": [{"label": "Reads / inputs","field": "reads","type": "list"},{"label": "Generates / outputs","field": "generates","type": "list"},{"label": "Writes / mutates","field": "writes","type": "list"},{"label": "Owned by (code)","field": "mutators","type": "list"}],"nodes": [{"id": "narrator","kind": "turn","label": "Narrator","sub": "omniscient author's eye","summary": "The main per-turn agent: reads full world state + recap + lore + the player's composed action, writes second-person present-tense prose and drives all world-state change through the narrator toolset, cuing characters to speak rather than voicing them.","reads": ["prompts.build_narrator_messages (prompts.py:202): narrator.system.md + narrator.user.md","_state_block (prompts.py:59): scene, mood, present/elsewhere cast, inventory, exits, quests, goal, time, SECRETS (other chars' knowledge+origin), remembered facts","_situation_blocks (prompts.py:167): narrator.easy/hard/newplace/returning.md dispatched by state; narrator.looking.md when looking","_lore_block (prompts.py:157): repo.match_lore budgeted","_fit_token_budget (prompts.py:186): verbatim beat window trimmed to ~60% of effective_context_tokens","g['story_summary'] (EARLIER CHAPTERS recap), g['last_tool_errors'] (failed calls fed back once), narrator.attempts.md (numbered attack/give attempts), wish_block (fenced player wish)"],"generates": ["prose narration beat (emit narrator/Narrator/narration)","tool calls from t o sentences so no turn is dead air.","how": "Same voice and same stop sequences as the main pass; no tools list passed. Fires when (state_notes or not will_speak) and main prose was empty."},"characterPublic": {"what": "Each present character runs as its own agent with its own context: only its persona, private knowledge, past, traits, felt-HP and the beats IT witnessed; it replies in [say]/[do]/[whisper] tags and can act on others via its own tools.","how": "Voiced separately from the narrator; cued via cue_character. One retry if it returns nothing usable. CHARACTER_TEMPERATURE, CHAR_HISTORY_BEATS."},"characterPrivate": {"what": "The same character agent run with private_with set, so its ENTIRE reply lands in a 1:1 thread no one else witnesses: the whisper channel and the forced gift reply. Built by the same builder; lifecycle and routing differ.","how": "Same agent, different lifecycle: triggered by player whisper segments or a landed give. Consecutive whispers to the same char form ONE exchange, char replies once."},"interpreter": {"what": "One small tool-constrained call loaded only for this skill: parses a freeform typed action into ordered structured segments (say/do/attack/give/whisper/look) so typing freely gets the same directed routing and adjudication as the composer buttons.","how": "Gated by settings.INTERPRET_FREE_TEXT. temperature 0.2, bounded to 6 segments, single forced submit_segments tool."},"imagePromptWriter": {"what": "Optional agentic image-prompt writer: one LLM call that turns live scene context into a single FLUX.2-klein prompt (poses, the just-happened moment), then CODE hardens it (strips quoted lettering, clips length, appends no-text guard); any failure falls back to the deterministic template prompt.","how": "Gated by settings.IMAGE_AGENTIC_PROMPTS. Fires for look/show_image renders and current-scene art; temperature 0.4, max_tokens 140. Triggered downstream of the narrator's show_image tool or a player LOOK."},"creatorChat": {"what": "A warm story-architect agent that interviews the user across a persisted conversation to design the world, asking 1-2 questions per turn and emitting a [ready] marker (or prose equivalent) when the world is complete enough to forge.","how": "Free-form chat, no tools. temperature 0.8. Readiness parsed from RAW reply ([ready] mark or prose fallback) before clean_prose strips it."},"finalizeExtractor": {"what": "Converts the whole creator conversation into one structured WorldSheet via a single forced save_world tool call (title, setting, cast with sex/origin/appearance, quests, lore, opening fiction), which repo.create_game persists to start the game.","how": "tool_choice='auto', temperature 0.4, max_tokens 1200. No save_world call => ValueError, keep chatting."},"artDirector": {"what": "ONE creation-time call that reads the whole world bible and writes the first-sight image prompts: each character's reference descriptor plus the main opening image, emitted as strict JSON so portraits and the opening render never depend on a thin per-render template.","how": "Creation-only; temperature 0.4, max_tokens 700, no tools (parses fenced JSON). Any failure returns None and templates carry the renders."},"originEnrich": {"what": "Background per-character call (one LLM call each) that gives any character with a thin origin a real 5-8 sentence private biography; the finalize pass under-delivers on backstories, so a focused single-character pass is what the small model does well.","how": "Runs only for chars whose origin is under ORIGIN_MIN_CHARS (220). temperature 0.7, max_tokens 400. Never blocks/fails creation."},"gameSummaryFold": {"what": "Background fold: compresses story OLDER than the newest kept turns into a facts-only rolling recap (<400 words) so the narrator knows the whole story at bounded token cost; one LLM call per fold, stale-guarded.","how": "Gated by SUMMARY_ENABLED; cadence effective_summary_every; KEEP_TURNS never folded. temperature 0.3. Output is re-fed to the narrator every turn, so leaks compound (full scrub)."},"charSummaryFold": {"what": "Background fold (beside the game recap): folds what each ALIVE character WITNESSED into their private second-person recap (<150 words), built only from witnessed beats so another character's whispers can never enter; one LLM call per qualifying character.","how": "Gated by CHAR_SUMMARY_ENABLED; folds only when a character crossed CHAR_SUMMARY_EVERY witnessed beats (in practice story-central chars only). temperature 0.3."}},"groups": [{"id": "turn","label": "turn agents","nodeIds": ["narrator","narratorResolve"]},{"id": "character","label": "character agents","nodeIds": ["characterPublic","characterPrivate"]},{"id": "skill","label": "skill agents","nodeIds": ["interpreter","imagePromptWriter"]},{"id": "creation","label": "creation agents","nodeIds": ["creatorChat","finalizeExtractor","artDirector","originEnrich"]},{"id": "fold","label": "background folds","nodeIds": ["gameSummaryFold","charSummaryFold"]},{"id": "backend","label": "backend","nodeIds": []}],"C": {"turn": "#e7b75f","character": "#65d08b","skill": "#62c8d8","creation": "#a895f2","fold": "#e47ea5","backend": "#7ba7ff"},"textHTML": "<p class=\"intro\">One local model plays every role through separate, purpose-built contexts. An agent is any distinct LLM call; an agentic tool (cue_character / spawn_character) is the bridge that spawns another agent.</p><h3 class=\"group\" id=\"grp-turn\">turn agents</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Narrator</h4><span class=\"kindtag\">turn</span></div><p class=\"sum\">The main per-turn agent: reads full world state + recap + lore + the player&#x27;s composed action, writes second-person present-tense prose and drives all world-state change through the narrator toolset, cuing characters to speak rather than voicing them.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_narrator_messages (prompts.py:202): narrator.system.md + narrator.user.md; _state_block (prompts.py:59): scene, mood, present/elsewhere cast, inventory, exits, quests, goal, time, SECRETS (other chars&#x27; knowledge+origin), remembered facts; _situation_blocks (prompts.py:167): narrator.easy/hard/newplace/returning.md dispatched by state; narrator.looking.md when looking; _lore_block (prompts.py:157): repo.match_lore budgeted; _fit_token_budget (prompts.py:186): verbatim beat window trimmed to ~60% of effective_context_tokens; g[&#x27;story_summary&#x27;] (EARLIER CHAPTERS recap), g[&#x27;last_tool_errors&#x27;] (failed calls fed back once), narrator.attempts.md (numbered attack/give attempts), wish_block (fenced player wish)</div><div class=\"row\"><b>Generates / outputs:</b> prose narration beat (emit narrator/Narrator/narration); tool calls from tools.narrator_tools(adjudicating, images); cues (queued character reactions), spawns, image_request, reject_attempt vetoes</div><div class=\"row\"><b>Writes / mutates:</b> beats (narration); all game/scene/character/quest/item state via apply_tool; g.last_tool_errors (still-invalid calls), g.context_used (global meter), scene.description seed if unfurnished</div><div class=\"row\"><b>Owned by (code):</b> engine/turn.py: run_turn (llm.chat at turn.py:477); prompts.py: build_narrator_messages; tools/__init__.py: narrator_tools, apply_tool</div><div class=\"row\"><b>Key point:</b> Never voices a character: it must cue_character and stop. tool_choice=&#x27;auto&#x27;, NARRATOR_TEMPERATURE, scaffold + cast-name stop sequences, optional thinking.</div><div class=\"row\"><b>IN:</b> interpreter (segments -&gt; composed action).</div><div class=\"row\"><b>OUT:</b> characterPublic (cue_character (agentic tool bridge) / spawn_character -&gt; reaction enqueue); narratorResolve (dead-air -&gt; resolve pass); imagePromptWriter (show_image / LOOK -&gt; image prompt); characterPrivate (landed give -&gt; forced private reply / player whisper -&gt; private exchange); gameSummaryFold (after turn -&gt; fold old chapters)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_narrator_messages(conn, gid, action, history_limit, lore_budget, attempts, looking, wish)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;narrator.system.md rendered (persona, setting, tone, situation, world_rules, state, lore)&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;narrator.user.md (transcript, action, attempts_block, wish_block, summary_block, tool_errors_block)&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;NARRATOR_TOOLS [+reject_attempt if adjudicating] [+show_image if images]&quot;,\n  &quot;output&quot;: {\n    &quot;content&quot;: &quot;prose&quot;,\n    &quot;tool_calls&quot;: [\n      {\n        &quot;name&quot;: &quot;cue_character|apply_damage|move_location|...&quot;,\n        &quot;arguments&quot;: {}\n      }\n    ],\n    &quot;finish_reason&quot;: &quot;stop|length&quot;,\n    &quot;usage&quot;: {\n      &quot;prompt_tokens&quot;: 0\n    }\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e7b75f\"></span><h4>Narrator-Resolve (dead-air killer)</h4><span class=\"kindtag\">turn</span></div><p class=\"sum\">A short second narrator call fired ONLY when the first pass changed state via tools but wrote no prose (and nobody else will speak); it voices the mechanical outcome in one or two sentences so no turn is dead air.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_narrator_resolve_messages (prompts.py:276): narrator.resolve.md + narrator.resolve.user.md; _state_block (current state); narrator_action (the action) + state_notes list (&#x27;CHANGES&#x27;: move/furnish/pickup receipts)</div><div class=\"row\"><b>Generates / outputs:</b> one short narration beat only (no tools, no dialogue)</div><div class=\"row\"><b>Writes / mutates:</b> beats (narration); g.context_used (max with main pass)</div><div class=\"row\"><b>Owned by (code):</b> engine/turn.py: run_turn (llm.chat at turn.py:610, the else-branch when prose empty); prompts.py: build_narrator_resolve_messages</div><div class=\"row\"><b>Key point:</b> Same voice and same stop sequences as the main pass; no tools list passed. Fires when (state_notes or not will_speak) and main prose was empty.</div><div class=\"row\"><b>IN:</b> narrator (dead-air -&gt; resolve pass)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_narrator_resolve_messages(conn, gid, action, changes)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;narrator.resolve.md (persona, setting, tone, state)&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;narrator.resolve.user.md (action, changes)&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;none&quot;,\n  &quot;output&quot;: {\n    &quot;content&quot;: &quot;1-2 sentence prose&quot;,\n    &quot;finish_reason&quot;: &quot;stop|length&quot;\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-character\">character agents</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>Character Agent (public)</h4><span class=\"kindtag\">character</span></div><p class=\"sum\">Each present character runs as its own agent with its own context: only its persona, private knowledge, past, traits, felt-HP and the beats IT witnessed; it replies in [say]/[do]/[whisper] tags and can act on others via its own tools.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_character_messages (prompts.py:303): character.system.md + character.user.md; witnessed_beats_for_character (per-character verbatim window, not the room log); persona, knowledge_block, origin_block (its past), traits_block, felt_hp (words not numbers), present_block (who is here), memory_block (its own folded recap + pivotal moments); impulse line when directed (forced gift reply)</div><div class=\"row\"><b>Generates / outputs:</b> [say]-&gt;dialogue bubble, [do]-&gt;action, [whisper]-&gt;private-to-player dialogue (parsed by parsing.parse_character_output_with_marks); reaction targets to enqueue; tool calls / inline memory marks</div><div class=\"row\"><b>Writes / mutates:</b> beats (dialogue/action/system); character.context (per-character meter, set_character_context); own memory via share_past/mark_moment/admit_trait; attack/give_item on others</div><div class=\"row\"><b>Owned by (code):</b> engine/turn.py: _character_reply (llm.chat at turn.py:187); prompts.py: build_character_messages; tools/__init__.py: CHARACTER_TOOLS, apply_tool(actor=ch)</div><div class=\"row\"><b>Key point:</b> Voiced separately from the narrator; cued via cue_character. One retry if it returns nothing usable. CHARACTER_TEMPERATURE, CHAR_HISTORY_BEATS.</div><div class=\"row\"><b>IN:</b> narrator (cue_character (agentic tool bridge) / spawn_character -&gt; reaction enqueue)</div><div class=\"row\"><b>OUT:</b> charSummaryFold (after turn -&gt; fold witnessed beats)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_character_messages(conn, gid, character, history_limit, impulse)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;character.system.md (name, persona, gender_line, knowledge/origin/traits/state/present/example blocks)&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;character.user.md (location, scene transcript, memory_block, anchor, impulse_block)&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;CHARACTER_TOOLS [attack, give_item, share_past, mark_moment, admit_trait]&quot;,\n  &quot;output&quot;: {\n    &quot;content&quot;: &quot;[say][whisper]...[/say][do]...[/do]&quot;,\n    &quot;tool_calls&quot;: [\n      {\n        &quot;name&quot;: &quot;attack|give_item|share_past|...&quot;,\n        &quot;arguments&quot;: {}\n      }\n    ]\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#65d08b\"></span><h4>Character Agent (private / whisper)</h4><span class=\"kindtag\">character</span></div><p class=\"sum\">The same character agent run with private_with set, so its ENTIRE reply lands in a 1:1 thread no one else witnesses: the whisper channel and the forced gift reply. Built by the same builder; lifecycle and routing differ.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_character_messages (same builder) with private exchange beats marked (privately) in the witnessed window; impulse for the forced gift reply: &#x27;The player just gave you &lt;item&gt;. React to the gift, just to them.&#x27;</div><div class=\"row\"><b>Generates / outputs:</b> private dialogue/action beats bound to private_with (a stated-emotion-less private say is voiced as a whisper)</div><div class=\"row\"><b>Writes / mutates:</b> beats (private_with=character id); character.context; own memory via share_past/mark_moment/admit_trait (whispers run NO narrator, so these self-tools are the only way confessions get recorded)</div><div class=\"row\"><b>Owned by (code):</b> engine/turn.py: _character_reply(private_with=...) called at turn.py:657 (gift) and turn.py:717 (whisper exchange); engine/turn.py: run_turn private channel block (lines 661-717)</div><div class=\"row\"><b>Key point:</b> Same agent, different lifecycle: triggered by player whisper segments or a landed give. Consecutive whispers to the same char form ONE exchange, char replies once.</div><div class=\"row\"><b>IN:</b> narrator (landed give -&gt; forced private reply / player whisper -&gt; private exchange)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_character_messages(...) called with private_with at the engine, impulse for gifts&quot;,\n  &quot;messages&quot;: &quot;same shape as characterPublic; user transcript includes (privately)-marked beats&quot;,\n  &quot;tools&quot;: &quot;CHARACTER_TOOLS&quot;,\n  &quot;output&quot;: &quot;[say]/[do]/[whisper] all routed private_with=cid&quot;\n}</pre></details></div><h3 class=\"group\" id=\"grp-skill\">skill agents</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>Input Interpreter</h4><span class=\"kindtag\">skill</span></div><p class=\"sum\">One small tool-constrained call loaded only for this skill: parses a freeform typed action into ordered structured segments (say/do/attack/give/whisper/look) so typing freely gets the same directed routing and adjudication as the composer buttons.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_interpret_messages (prompts.py:579): interpret.system.md + interpret.user.md; present character names + player inventory (so names/items resolve)</div><div class=\"row\"><b>Generates / outputs:</b> a submit_segments tool call -&gt; validated list[dict] of segments (or None on any failure -&gt; caller falls back to raw text)</div><div class=\"row\"><b>Writes / mutates:</b> no DB state; its output drives _compose/run_turn</div><div class=\"row\"><b>Owned by (code):</b> engine/turn.py: interpret_action (llm.chat at turn.py:248); prompts.py: build_interpret_messages, INTERPRET_TOOL</div><div class=\"row\"><b>Key point:</b> Gated by settings.INTERPRET_FREE_TEXT. temperature 0.2, bounded to 6 segments, single forced submit_segments tool.</div><div class=\"row\"><b>IN:</b> <i>none</i></div><div class=\"row\"><b>OUT:</b> narrator (segments -&gt; composed action)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_interpret_messages(conn, gid, message)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;interpret.system.md&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;interpret.user.md (characters, inventory, message)&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;INTERPRET_TOOL [submit_segments]&quot;,\n  &quot;output&quot;: {\n    &quot;tool_calls&quot;: [\n      {\n        &quot;name&quot;: &quot;submit_segments&quot;,\n        &quot;arguments&quot;: {\n          &quot;segments&quot;: [\n            {\n              &quot;type&quot;: &quot;give&quot;,\n              &quot;item&quot;: &quot;brass key&quot;,\n              &quot;target&quot;: &quot;Mara&quot;\n            },\n            {\n              &quot;type&quot;: &quot;say&quot;,\n              &quot;text&quot;: &quot;...&quot;,\n              &quot;target&quot;: &quot;Mara&quot;\n            }\n          ]\n        }\n      }\n    ]\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#62c8d8\"></span><h4>Image-Prompt Writer</h4><span class=\"kindtag\">skill</span></div><p class=\"sum\">Optional agentic image-prompt writer: one LLM call that turns live scene context into a single FLUX.2-klein prompt (poses, the just-happened moment), then CODE hardens it (strips quoted lettering, clips length, appends no-text guard); any failure falls back to the deterministic template prompt.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_image_prompt_messages (prompts.py:595): imageprompt.system.md + imageprompt.user.md; _image_context (image_prompts.py:172): PLACE, time/mood, focus, present characters&#x27; gendered base, JUST HAPPENED recent public beats, STYLE</div><div class=\"row\"><b>Generates / outputs:</b> one prose FLUX prompt (&lt;80 words, subjects-first recipe), hardened by _harden_image_prompt</div><div class=\"row\"><b>Writes / mutates:</b> no DB; returns the prompt string consumed by the media render job</div><div class=\"row\"><b>Owned by (code):</b> integrate/image_prompts.py: _agentic_prompt (llm.chat at image_prompts.py:198); integrate/jobs.py: generate_view_snapshot (jobs.py:25; _agentic_prompt at jobs.py:56), generate_scene_image (jobs.py:255); prompts.py: build_image_prompt_messages</div><div class=\"row\"><b>Key point:</b> Gated by settings.IMAGE_AGENTIC_PROMPTS. Fires for look/show_image renders and current-scene art; temperature 0.4, max_tokens 140. Triggered downstream of the narrator&#x27;s show_image tool or a player LOOK.</div><div class=\"row\"><b>IN:</b> narrator (show_image / LOOK -&gt; image prompt); artDirector (direction overrides templates)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_image_prompt_messages(context)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;imageprompt.system.md (FLUX recipe + worked example)&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;imageprompt.user.md (context)&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;none&quot;,\n  &quot;output&quot;: {\n    &quot;content&quot;: &quot;Wide full-body shot of N people in ... plain unmarked surfaces, no signage.&quot;\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-creation\">creation agents</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>Creator Chat</h4><span class=\"kindtag\">creation</span></div><p class=\"sum\">A warm story-architect agent that interviews the user across a persisted conversation to design the world, asking 1-2 questions per turn and emitting a [ready] marker (or prose equivalent) when the world is complete enough to forge.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_creator_messages (prompts.py:606): creator.system.md + full persisted history + new user message</div><div class=\"row\"><b>Generates / outputs:</b> conversational reply (sanitized of think/tool debris), readiness signal; history is appended and persisted to creator_sessions</div><div class=\"row\"><b>Writes / mutates:</b> creator_sessions.history (SQLite), with [ready] marker re-appended to the stored copy</div><div class=\"row\"><b>Owned by (code):</b> creator.py: message (llm.chat at creator.py:77); prompts.py: build_creator_messages; creator.py: is_ready/strip_ready</div><div class=\"row\"><b>Key point:</b> Free-form chat, no tools. temperature 0.8. Readiness parsed from RAW reply ([ready] mark or prose fallback) before clean_prose strips it.</div><div class=\"row\"><b>IN:</b> <i>none</i></div><div class=\"row\"><b>OUT:</b> finalizeExtractor ([ready] -&gt; finalize)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_creator_messages(history, message)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;creator.system.md&quot;\n    },\n    &quot;...history...&quot;,\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;&lt;user message&gt;&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;none&quot;,\n  &quot;output&quot;: {\n    &quot;content&quot;: &quot;conversational reply (may end with [ready])&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>Finalize Extractor</h4><span class=\"kindtag\">creation</span></div><p class=\"sum\">Converts the whole creator conversation into one structured WorldSheet via a single forced save_world tool call (title, setting, cast with sex/origin/appearance, quests, lore, opening fiction), which repo.create_game persists to start the game.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_finalize_messages (prompts.py:613): finalize.system.md + finalize.user.md (full conversation flattened)</div><div class=\"row\"><b>Generates / outputs:</b> one save_world tool call -&gt; WorldSheet -&gt; a new game id</div><div class=\"row\"><b>Writes / mutates:</b> games + player_state + characters + scenes + quests + objectives + lore via repo.create_game; seeds player_items and start time via _seed_sheet_extras; deletes the creator session</div><div class=\"row\"><b>Owned by (code):</b> creator.py: finalize (llm.chat at creator.py:122); prompts.py: build_finalize_messages, FINALIZE_TOOL; creator.py: _seed_sheet_extras</div><div class=\"row\"><b>Key point:</b> tool_choice=&#x27;auto&#x27;, temperature 0.4, max_tokens 1200. No save_world call =&gt; ValueError, keep chatting.</div><div class=\"row\"><b>IN:</b> creatorChat ([ready] -&gt; finalize)</div><div class=\"row\"><b>OUT:</b> originEnrich (creation -&gt; enrich thin origins); artDirector (creation -&gt; art direction)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_finalize_messages(history)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;finalize.system.md&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;finalize.user.md (convo flattened)&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;FINALIZE_TOOL [save_world]&quot;,\n  &quot;output&quot;: {\n    &quot;tool_calls&quot;: [\n      {\n        &quot;name&quot;: &quot;save_world&quot;,\n        &quot;arguments&quot;: {\n          &quot;title&quot;: &quot;&quot;,\n          &quot;opening_scenario&quot;: &quot;&quot;,\n          &quot;characters&quot;: [\n            {\n              &quot;name&quot;: &quot;&quot;,\n              &quot;persona&quot;: &quot;&quot;,\n              &quot;sex&quot;: &quot;female&quot;,\n              &quot;origin&quot;: &quot;&quot;,\n              &quot;appearance&quot;: &quot;&quot;,\n              &quot;disposition&quot;: &quot;neutral&quot;\n            }\n          ],\n          &quot;quests&quot;: [],\n          &quot;lore&quot;: []\n        }\n      }\n    ]\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>Art Director</h4><span class=\"kindtag\">creation</span></div><p class=\"sum\">ONE creation-time call that reads the whole world bible and writes the first-sight image prompts: each character&#x27;s reference descriptor plus the main opening image, emitted as strict JSON so portraits and the opening render never depend on a thin per-render template.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_artdirector_messages (prompts.py:443): artdirector.system.md + artdirector.user.md; title, setting, tone, art_style, opening_scenario, start_location, time_of_day, full cast (name/gender/description/appearance)</div><div class=\"row\"><b>Generates / outputs:</b> strict JSON {characters:[{name, descriptor}], main_image} -&gt; hardened/clipped into a direction dict</div><div class=\"row\"><b>Writes / mutates:</b> no DB directly; the returned direction feeds generate_images_for_game (character descriptors) and generate_scene_image (main-image override)</div><div class=\"row\"><b>Owned by (code):</b> integrate/jobs.py: art_direction (llm.chat at jobs.py:169); prompts.py: build_artdirector_messages; integrate/jobs.py: generate_creation_art orchestrates the order</div><div class=\"row\"><b>Key point:</b> Creation-only; temperature 0.4, max_tokens 700, no tools (parses fenced JSON). Any failure returns None and templates carry the renders.</div><div class=\"row\"><b>IN:</b> finalizeExtractor (creation -&gt; art direction)</div><div class=\"row\"><b>OUT:</b> imagePromptWriter (direction overrides templates)</div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_artdirector_messages(g, chars, time_of_day, start_location)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;artdirector.system.md&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;artdirector.user.md (title, setting, tone, art_style, opening_scenario, start_location, time_of_day, cast)&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;none&quot;,\n  &quot;output&quot;: {\n    &quot;content&quot;: &quot;{\\&quot;characters\\&quot;: [{\\&quot;name\\&quot;: \\&quot;...\\&quot;, \\&quot;descriptor\\&quot;: \\&quot;...\\&quot;}], \\&quot;main_image\\&quot;: \\&quot;...\\&quot;}&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#a895f2\"></span><h4>Origin Enrichment</h4><span class=\"kindtag\">creation</span></div><p class=\"sum\">Background per-character call (one LLM call each) that gives any character with a thin origin a real 5-8 sentence private biography; the finalize pass under-delivers on backstories, so a focused single-character pass is what the small model does well.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_origin_messages (prompts.py:420): origin.system.md + origin.user.md; setting, tone, character name/gender/persona/description/relation/knowledge/existing origin</div><div class=\"row\"><b>Generates / outputs:</b> a 5-8 sentence third-person past-tense biography (cleaned, trimmed to a sentence on length cut)</div><div class=\"row\"><b>Writes / mutates:</b> characters.origin via repo.set_character_origin (only ever upgrades, never downgrades)</div><div class=\"row\"><b>Owned by (code):</b> creator.py: enrich_origins (llm.chat at creator.py:49); prompts.py: build_origin_messages; main.py: scheduled at every creation path (main.py:55, :115, :477)</div><div class=\"row\"><b>Key point:</b> Runs only for chars whose origin is under ORIGIN_MIN_CHARS (220). temperature 0.7, max_tokens 400. Never blocks/fails creation.</div><div class=\"row\"><b>IN:</b> finalizeExtractor (creation -&gt; enrich thin origins)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_origin_messages(g, c)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;origin.system.md&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;origin.user.md (setting, tone, name, gender, persona, description, relation, knowledge, origin)&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;none&quot;,\n  &quot;output&quot;: {\n    &quot;content&quot;: &quot;5-8 sentence biography prose&quot;\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-fold\">background folds</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><h4>Game-Summary Fold</h4><span class=\"kindtag\">fold</span></div><p class=\"sum\">Background fold: compresses story OLDER than the newest kept turns into a facts-only rolling recap (&lt;400 words) so the narrator knows the whole story at bounded token cost; one LLM call per fold, stale-guarded.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_summary_messages (prompts.py:265): summary.system.md + summary.user.md; previous recap + the transcript of beats between summarized_through and target turn</div><div class=\"row\"><b>Generates / outputs:</b> one updated facts-only recap (scrubbed of think/scaffold by scrub_model_text)</div><div class=\"row\"><b>Writes / mutates:</b> games.story_summary + games.summarized_through via repo.set_story_summary (only if cursor hasn&#x27;t moved)</div><div class=\"row\"><b>Owned by (code):</b> engine/folds.py: maybe_update_summary (llm.chat at folds.py:31); prompts.py: build_summary_messages; main.py: scheduled after turns (main.py:293)</div><div class=\"row\"><b>Key point:</b> Gated by SUMMARY_ENABLED; cadence effective_summary_every; KEEP_TURNS never folded. temperature 0.3. Output is re-fed to the narrator every turn, so leaks compound (full scrub).</div><div class=\"row\"><b>IN:</b> narrator (after turn -&gt; fold old chapters)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_summary_messages(prev_summary, transcript)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;summary.system.md&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;summary.user.md (summary, transcript)&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;none&quot;,\n  &quot;output&quot;: {\n    &quot;content&quot;: &quot;- fact\\\\n- fact (&lt;400 words)&quot;\n  }\n}</pre></details></div><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#e47ea5\"></span><h4>Character-Summary Fold</h4><span class=\"kindtag\">fold</span></div><p class=\"sum\">Background fold (beside the game recap): folds what each ALIVE character WITNESSED into their private second-person recap (&lt;150 words), built only from witnessed beats so another character&#x27;s whispers can never enter; one LLM call per qualifying character.</p><div class=\"row\"><b>Reads / inputs:</b> prompts.build_character_summary_messages (prompts.py:409): charsummary.system.md + charsummary.user.md; character name + prev memory_summary + witnessed_beats_between (their POV only)</div><div class=\"row\"><b>Generates / outputs:</b> one updated second-person facts-only memory per folded character (scrubbed)</div><div class=\"row\"><b>Writes / mutates:</b> characters.memory_summary + characters.summarized_through via repo.set_character_summary (stale-guarded)</div><div class=\"row\"><b>Owned by (code):</b> engine/folds.py: maybe_update_character_summaries (llm.chat at folds.py:80); prompts.py: build_character_summary_messages; main.py: scheduled after turns (main.py:295)</div><div class=\"row\"><b>Key point:</b> Gated by CHAR_SUMMARY_ENABLED; folds only when a character crossed CHAR_SUMMARY_EVERY witnessed beats (in practice story-central chars only). temperature 0.3.</div><div class=\"row\"><b>IN:</b> characterPublic (after turn -&gt; fold witnessed beats)</div><div class=\"row\"><b>OUT:</b> <i>none</i></div><details><summary>JSON shape</summary><pre class=\"jsonbox\">{\n  &quot;builder&quot;: &quot;build_character_summary_messages(name, prev_summary, transcript)&quot;,\n  &quot;messages&quot;: [\n    {\n      &quot;role&quot;: &quot;system&quot;,\n      &quot;content&quot;: &quot;charsummary.system.md (name)&quot;\n    },\n    {\n      &quot;role&quot;: &quot;user&quot;,\n      &quot;content&quot;: &quot;charsummary.user.md (name, summary, transcript)&quot;\n    }\n  ],\n  &quot;tools&quot;: &quot;none&quot;,\n  &quot;output&quot;: {\n    &quot;content&quot;: &quot;- You remember ... (&lt;150 words, second person to the character)&quot;\n  }\n}</pre></details></div><h3 class=\"group\" id=\"grp-backend\">backend</h3><div class=\"card\"><div class=\"ct\"><span class=\"dot\" style=\"background:#7ba7ff\"></span>","legend": [{"color": "var(--amber)","label": "turn"},{"color": "var(--green)","label": "character"},{"color": "var(--cyan)","label": "skill"},{"color": "var(--violet)","label": "creation"},{"color": "var(--pink)","label": "fold"},{"color": "var(--blue)","label": "backend"}],"NODE_FILL": {"turn": "#171410","character": "#121812","skill": "#101718","creation": "#161322","fold": "#181117","backend": "#111521"},"EDGE_KIND": {"cue": "#e7b75f","trigger": "#62c8d8","feed": "#65d08b","fold": "#e47ea5"},"FLOW_KIND": "feed","lanes": [],"home": {"x": 30,"y": 40,"k": 0.42},"chartHTML": null},"engine": {"id": "engine","title": "Engine","dot": "var(--cyan)","view": "graph","subtitle": "How the turn engine wires the browser to the backend: REST + SSE, run_turn, provider resolution, the inference services.","panelSections": [{"label": "Re
