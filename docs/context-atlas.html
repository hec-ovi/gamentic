<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gamentic Atlas</title>
<style>
  :root {
    --bg: #070807;
    --surface: #101210;
    --surface-2: #151814;
    --surface-3: #1d211c;
    --line: #30362d;
    --line-soft: #222720;
    --text: #eef2e8;
    --muted: #aab4a3;
    --faint: #707b69;
    --green: #65d08b;
    --cyan: #62c8d8;
    --amber: #e7b75f;
    --pink: #e47ea5;
    --violet: #a895f2;
    --red: #ef756f;
    --blue: #7ba7ff;
    --shadow: rgba(0, 0, 0, .55);
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 13px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #app {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr minmax(330px, 390px);
    background:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
      var(--bg);
    background-size: 36px 36px;
  }
  #app.side-wide {
    grid-template-columns: 1fr 50vw;
  }

  #stageWrap {
    position: relative;
    min-width: 0;
    overflow: hidden;
  }

  #chart {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
    cursor: grab;
  }
  #chart.dragging { cursor: grabbing; }

  .topbar {
    position: absolute;
    left: 18px;
    top: 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    z-index: 4;
    pointer-events: none;
  }
  .title {
    background: rgba(16,18,16,.88);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 13px 10px;
    box-shadow: 0 12px 34px var(--shadow);
    max-width: 520px;
    pointer-events: auto;
  }
  .title h1 {
    margin: 0;
    font-size: 14px;
    font-weight: 760;
    letter-spacing: .2px;
  }
  .title p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 12px;
  }
  .title a { color: var(--cyan); text-decoration: none; }
  .title a:hover { text-decoration: underline; }
  .legend {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    max-width: 420px;
    padding-top: 2px;
  }
  .pill {
    display: inline-flex;
    gap: 6px;
    align-items: center;
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(16,18,16,.8);
    color: var(--muted);
    font-size: 11px;
    box-shadow: 0 10px 28px var(--shadow);
  }
  .dot { width: 8px; height: 8px; border-radius: 99px; display: inline-block; }

  .controls {
    position: absolute;
    left: 18px;
    bottom: 16px;
    display: flex;
    gap: 8px;
    z-index: 4;
  }
  button {
    border: 1px solid var(--line);
    background: rgba(16,18,16,.9);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font: 650 11px ui-sans-serif, system-ui, sans-serif;
    cursor: pointer;
  }
  button:hover { background: var(--surface-2); border-color: #46513f; }

  #tip {
    position: absolute;
    z-index: 6;
    width: min(320px, calc(100vw - 24px));
    display: none;
    border: 1px solid #3a4435;
    border-radius: 9px;
    padding: 9px 10px;
    background: rgba(9, 11, 9, .97);
    box-shadow: 0 18px 42px var(--shadow);
    color: var(--muted);
    pointer-events: none;
  }
  #tip strong {
    display: block;
    margin-bottom: 4px;
    color: var(--text);
    font-size: 12px;
  }
  #tip p { margin: 0; }

  #side {
    border-left: 1px solid var(--line);
    background: rgba(11, 13, 10, .96);
    box-shadow: -22px 0 50px var(--shadow);
    display: grid;
    grid-template-rows: auto 1fr;
    min-width: 0;
    min-height: 0;
    z-index: 5;
  }
  .sideHead {
    padding: 16px 17px 13px;
    border-bottom: 1px solid var(--line);
  }
  .sideTop {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
  }
  .sideToggle {
    flex: 0 0 auto;
    padding: 6px 8px;
    border-radius: 7px;
  }
  .sideHead .eyebrow {
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 10px;
    font-weight: 800;
  }
  .sideHead h2 {
    margin: 5px 0 0;
    font-size: 16px;
    line-height: 1.2;
  }
  .sideHead p {
    margin: 7px 0 0;
    color: var(--muted);
    font-size: 12px;
  }
  #detail {
    overflow: auto;
    min-height: 0;
    padding: 14px 17px 22px;
  }
  .section {
    margin: 0 0 14px;
    padding: 12px;
    border: 1px solid var(--line-soft);
    background: rgba(21, 24, 20, .74);
    border-radius: 10px;
  }
  .section h3 {
    margin: 0 0 8px;
    color: var(--text);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .9px;
  }
  .section p {
    margin: 0;
    color: var(--muted);
  }
  .kv {
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 7px 10px;
    font-size: 12px;
  }
  .k { color: var(--faint); }
  .v { color: var(--text); }
  ul {
    margin: 0;
    padding-left: 17px;
    color: var(--muted);
  }
  li { margin: 3px 0; }
  .code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    color: #d9e5d1;
  }
  .jsonbox {
    margin: 0;
    padding: 10px;
    overflow: visible;
    border: 1px solid #2b3329;
    border-radius: 8px;
    background: #090b09;
    color: #d9e5d1;
    font: 11px/1.48 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    tab-size: 2;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .jsonbox .jkey { color: var(--green); }
  .jsonbox .jstr { color: var(--amber); }
  .jsonbox .jnum { color: var(--cyan); }
  .jsonbox .jbool { color: var(--violet); }
  .jsonbox .jnull { color: var(--red); }
  .jsonbox .jobj { color: #8fdc89; font-weight: 800; }
  .jsonbox .jarr { color: #78d4e2; font-weight: 800; }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 3px 7px;
    color: var(--muted);
    background: rgba(0,0,0,.16);
    font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  .node rect.main {
    stroke-width: 1.3;
    rx: 12;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,.42));
  }
  .node text { user-select: none; pointer-events: none; }
  .node .label { font-weight: 760; font-size: 13px; fill: var(--text); }
  .node .sub { font-size: 11px; fill: var(--muted); }
  .node .kind { font-size: 9px; font-weight: 850; letter-spacing: 1.1px; text-transform: uppercase; }
  .node.selected rect.main { stroke-width: 2.4; }
  .node.dim { opacity: .28; }
  .node.connected { opacity: 1; }
  .node { cursor: pointer; }

  .edge {
    fill: none;
    stroke-width: 2.1;
    stroke-linecap: round;
    opacity: .46;
    cursor: pointer;
  }
  .edge.dim { opacity: .13; }
  .edge.selected { opacity: 1; stroke-width: 3.4; }
  .edgePort {
    fill: rgba(7,8,7,.88);
    stroke-width: 1.6;
    pointer-events: none;
  }
  .edgePort.dim { opacity: .13; }
  .edgePortText {
    fill: var(--faint);
    font: 8px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    text-transform: uppercase;
    letter-spacing: .4px;
    paint-order: stroke;
    stroke: rgba(7,8,7,.9);
    stroke-width: 3px;
    pointer-events: none;
    user-select: none;
  }
  .edgePortText.dim { opacity: .13; }
  .edgeLabel {
    font-size: 10px;
    fill: var(--muted);
    opacity: .62;
    paint-order: stroke;
    stroke: rgba(7,8,7,.82);
    stroke-width: 4px;
    stroke-linejoin: round;
    pointer-events: none;
    user-select: none;
  }
  .edgeLabel.hidden { opacity: 0; }
  .edgeLabel.dim { opacity: .18; }

  .laneLabel {
    font-size: 11px;
    font-weight: 850;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    fill: var(--faint);
    pointer-events: none;
  }
  .laneLine {
    stroke: rgba(170,180,163,.16);
    stroke-width: 1;
    stroke-dasharray: 5 8;
    pointer-events: none;
  }

  .helpBtn rect {
    fill: rgba(7,8,7,.72);
    stroke: var(--line);
    rx: 6;
  }
  .helpBtn text {
    font: 850 8px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    pointer-events: none;
  }
  .helpBtn:hover rect { stroke: #64715d; fill: rgba(24,28,22,.95); }

  @media (max-width: 960px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 1fr 42vh; }
    #app.side-wide { grid-template-columns: 1fr; grid-template-rows: 1fr 50vh; }
    #side { border-left: 0; border-top: 1px solid var(--line); }
    .topbar { right: 12px; }
    .legend { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <main id="stageWrap">
    <div class="topbar">
      <div class="title">
        <h1 id="metaTitle">Atlas</h1>
        <p id="metaSub"></p>
      </div>
      <div class="legend" id="legend" aria-hidden="true"></div>
    </div>
    <svg id="chart" role="img" aria-label="Gamentic atlas">
      <defs id="defs"></defs>
      <g id="viewport">
        <g id="lanes"></g>
        <g id="edges"></g>
        <g id="labels"></g>
        <g id="nodes"></g>
      </g>
    </svg>
    <div id="tip"></div>
    <div class="controls">
      <button id="fit">Fit</button>
      <button id="reset">Reset layout</button>
    </div>
  </main>
  <aside id="side">
    <div class="sideHead">
      <div class="sideTop">
        <div class="eyebrow" id="detailKind">Selected</div>
        <button class="sideToggle" id="sideToggle">Expand</button>
      </div>
      <h2 id="detailTitle">Click a node</h2>
      <p id="detailSummary">The right panel explains lifecycle, population, mutation points, and IN/OUT usage.</p>
    </div>
    <div id="detail"></div>
  </aside>
</div>

function boundaryPoint(a, b) {

      inText.setAttribute('y', v.to.y - v.uy * 26 + v.ny * 15);
      inText.setAttribute('text-anchor', 'middle');
      inText.textContent = 'IN';
      labelG.appendChild(inText);
    }
  });

  nodes.forEach(n => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const isSelected = selected === n.id;
    const isConnected = !selected || related.nodes.has(n.id);
    g.setAttribute('class', 'node ' + (isSelected ? 'selected' : '') + ' ' + (isConnected ? 'connected' : 'dim'));
    g.setAttribute('transform', 'translate(' + n.x + ' ' + n.y + ')');
    g.dataset.id = n.id;

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('class', 'main');
    rect.setAttribute('width', n.w);
    rect.setAttribute('height', n.h);
    rect.setAttribute('fill', nodeFill(n.kind));
    rect.setAttribute('stroke', colorFor(n.kind));
    g.appendChild(rect);

    const kind = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    kind.setAttribute('class', 'kind');
    kind.setAttribute('x', 14);
    kind.setAttribute('y', 19);
    kind.setAttribute('fill', colorFor(n.kind));
    kind.textContent = n.kind;
    g.appendChild(kind);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('class', 'label');
    label.setAttribute('x', 14);
    label.setAttribute('y', 42);
    label.textContent = n.label;
    g.appendChild(label);

    const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    sub.setAttribute('class', 'sub');
    sub.setAttribute('x', 14);
    sub.setAttribute('y', 62);
    sub.textContent = n.sub;
    g.appendChild(sub);

    [
      {kind: 'what', label: '?', x: n.w - 74, w: 18},
      {kind: 'how', label: 'H', x: n.w - 51, w: 18},
      {kind: 'io', label: 'IO', x: n.w - 28, w: 22},
    ].forEach(btn => {
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      bg.setAttribute('class', 'helpBtn');
      bg.setAttribute('transform', 'translate(' + btn.x + ' 10)');
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('width', btn.w);
      r.setAttribute('height', 18);
      bg.appendChild(r);
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', btn.w / 2);
      t.setAttribute('y', 12.5);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('fill', colorFor(n.kind));
      t.textContent = btn.label;
      bg.appendChild(t);
      bg.addEventListener('pointerdown', ev => ev.stopPropagation());
      bg.addEventListener('click', ev => { ev.stopPropagation(); showHelp(ev, n, btn.kind); });
      g.appendChild(bg);
    });

    g.addEventListener('pointerdown', ev => {
      ev.stopPropagation();
      draggingNode = {id: n.id, start: screenToWorld(ev), ox: n.x, oy: n.y, moved: false};
      g.setPointerCapture(ev.pointerId);
    });
    g.addEventListener('pointermove', ev => {
      if (!draggingNode || draggingNode.id !== n.id) return;
      const p = screenToWorld(ev);
      const dx = p.x - draggingNode.start.x;
      const dy = p.y - draggingNode.start.y;
      if (Math.abs(dx) + Math.abs(dy) > 2) draggingNode.moved = true;
      n.x = draggingNode.ox + dx;
      n.y = draggingNode.oy + dy;
      render();
    });
    g.addEventListener('pointerup', ev => {
      if (!draggingNode || draggingNode.id !== n.id) return;
      const moved = draggingNode.moved;
      draggingNode = null;
      if (!moved) selectNode(n.id);
    });
    g.addEventListener('dblclick', ev => { ev.stopPropagation(); selectNode(n.id); focusNode(n); });
    nodeG.appendChild(g);
  });
}

function relatedSet() {
  const set = {nodes: new Set(), edges: new Set()};
  if (!selected) {
    nodes.forEach(n => set.nodes.add(n.id));
    edges.forEach((_, i) => set.edges.add(i));
    return set;
  }
  set.nodes.add(selected);
  edges.forEach((e, i) => {
    if (e.from === selected || e.to === selected) {
      set.edges.add(i);
      set.nodes.add(e.from);
      set.nodes.add(e.to);
    }
  });
  return set;
}

function selectNode(id) { hideHelp(); selected = id; selectedEdge = null; detailNode(nodeById.get(id)); render(); }
function selectEdge(i) { hideHelp(); selectedEdge = i; selected = null; detailEdge(edges[i]); render(); }

function list(items) {
  if (!items || !items.length) return '<p>None.</p>';
  return '<ul>' + items.map(x => '<li>' + escapeHtml(x) + '</li>').join('') + '</ul>';
}
function chips(items) {
  if (!items || !items.length) return '<p>None.</p>';
  return '<div class="chips">' + items.map(x => '<span class="chip">' + escapeHtml(x) + '</span>').join('') + '</div>';
}
function nodeFlowSummary(id) {
  const incoming = edges.filter(e => e.to === id).map(e => e.from + ': ' + e.label);
  const outgoing = edges.filter(e => e.from === id).map(e => e.to + ': ' + e.label);
  return {incoming: incoming.length ? incoming : ['none'], outgoing: outgoing.length ? outgoing : ['none']};
}

function showHelp(ev, n, kind) {
  const h = (typeof NODE_HELP !== 'undefined' && NODE_HELP[n.id]) || {};
  let title = 'What is?';
  let body = h.what || n.summary;
  if (kind === 'how') { title = 'How works?'; body = h.how || n.lifecycle || n.summary; }
  else if (kind === 'io') {
    title = 'Info in / out';
    const flow = nodeFlowSummary(n.id);
    body = 'IN: ' + flow.incoming.slice(0, 3).join('; ') + '. OUT: ' + flow.outgoing.slice(0, 3).join('; ') + '.';
  }
  tip.innerHTML = '<strong>' + escapeHtml(n.label) + ' - ' + escapeHtml(title) + '</strong><p>' + escapeHtml(body) + '</p>';
  const wrap = document.getElementById('stageWrap').getBoundingClientRect();
  const x = Math.min(ev.clientX - wrap.left + 12, wrap.width - 332);
  const y = Math.min(ev.clientY - wrap.top + 12, wrap.height - 120);
  tip.style.left = Math.max(10, x) + 'px';
  tip.style.top = Math.max(10, y) + 'px';
  tip.style.display = 'block';
}
function hideHelp() { tip.style.display = 'none'; }

function highlightJson(value) {
  const json = JSON.stringify(value, null, 2);
  return json.replace(/("(?:\\.|[^"\\])*")(\s*:)?|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?|\btrue\b|\bfalse\b|\bnull\b|[{}\[\]]/g, (match, str, colon) => {
    if (str) {
      const cls = colon ? 'jkey' : 'jstr';
      return '<span class="' + cls + '">' + escapeHtml(str) + '</span>' + escapeHtml(colon || '');
    }
    if (match === '{' || match === '}') return '<span class="jobj">' + match + '</span>';
    if (match === '[' || match === ']') return '<span class="jarr">' + match + '</span>';
    if (match === 'true' || match === 'false') return '<span class="jbool">' + match + '</span>';
    if (match === 'null') return '<span class="jnull">null</span>';
    return '<span class="jnum">' + match + '</span>';
  });
}
function jsonBlock(value) { return '<pre class="jsonbox">' + highlightJson(value) + '</pre>'; }

function nodeJson(n) {
  if (typeof NODE_JSON !== 'undefined' && NODE_JSON[n.id]) return NODE_JSON[n.id];
  return n.json || {[n.id]: n.summary};
}
function payloadForEdge(e) { return {flow: 'object passed ' + e.from + ' -> ' + e.to, contract: e.label, kind: e.kind}; }
function edgeJson(e) {
  return {edge: {from: e.from, to: e.to, kind: e.kind, label: e.label, payload: payloadForEdge(e), source_shape: nodeJson(nodeById.get(e.from)), target_shape: nodeJson(nodeById.get(e.to))}};
}

function detailNode(n) {
  document.getElementById('detailKind').textContent = n.kind;
  document.getElementById('detailTitle').textContent = n.label;
  document.getElementById('detailSummary').textContent = n.summary;
  let html = '<div class="section"><h3>JSON shape</h3>' + jsonBlock(nodeJson(n)) + '</div>';
  for (const s of SECTIONS) {
    const v = n[s.field];
    const body = s.type === 'text' ? ('<p>' + escapeHtml(v || '-') + '</p>') : list(v);
    html += '<div class="section"><h3>' + s.label + '</h3>' + body + '</div>';
  }
  html += '<div class="section"><h3>Key point</h3><p>' + escapeHtml(n.note || '-') + '</p></div>';
  html += '<div class="section"><h3>Connected edges</h3>' + chips(edges.filter(e => e.from === n.id || e.to === n.id).map(e => e.from + ' -> ' + e.to + ': ' + e.label)) + '</div>';
  document.getElementById('detail').innerHTML = html;
}
function detailEdge(e) {
  document.getElementById('detailKind').textContent = e.kind + ' edge';
  document.getElementById('detailTitle').textContent = nodeById.get(e.from).label + ' -> ' + nodeById.get(e.to).label;
  document.getElementById('detailSummary').textContent = e.detail;
  document.getElementById('detail').innerHTML =
    '<div class="section"><h3>JSON edge</h3>' + jsonBlock(edgeJson(e)) + '</div>' +
    '<div class="section"><h3>Direction</h3><p><span class="code">' + escapeHtml(e.from) + '</span> sends <span class="code">' + escapeHtml(e.label) + '</span> into <span class="code">' + escapeHtml(e.to) + '</span>. Dot = OUT. Ring + arrowhead = IN.</p></div>' +
    '<div class="section"><h3>Meaning</h3><p>' + escapeHtml(e.detail) + '</p></div>' +
    '<div class="section"><h3>Source</h3><p><span class="code">' + escapeHtml(e.from) + '</span> - ' + escapeHtml(nodeById.get(e.from).summary) + '</p></div>' +
    '<div class="section"><h3>Target</h3><p><span class="code">' + escapeHtml(e.to) + '</span> - ' + escapeHtml(nodeById.get(e.to).summary) + '</p></div>';
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }
function screenToWorld(ev) {
  const r = svg.getBoundingClientRect();
  return {x: (ev.clientX - r.left - transform.x) / transform.k, y: (ev.clientY - r.top - transform.y) / transform.k};
}
function isInteractiveTarget(target) { return target && target.closest && (target.closest('.node') || target.classList.contains('edge')); }

svg.addEventListener('pointerdown', ev => {
  if (isInteractiveTarget(ev.target)) return;
  hideHelp();
  panning = true;
  panStart = {x: ev.clientX, y: ev.clientY, tx: transform.x, ty: transform.y};
  svg.classList.add('dragging');
});
svg.addEventListener('pointermove', ev => {
  if (!panning) return;
  transform.x = panStart.tx + ev.clientX - panStart.x;
  transform.y = panStart.ty + ev.clientY - panStart.y;
  render();
});
svg.addEventListener('pointerup', () => { panning = false; svg.classList.remove('dragging'); });
svg.addEventListener('pointerleave', () => { panning = false; svg.classList.remove('dragging'); });
svg.addEventListener('click', ev => {
  if (isInteractiveTarget(ev.target)) return;
  selected = null; selectedEdge = null; hideHelp(); detailIntro(); render();
});
svg.addEventListener('wheel', ev => {
  ev.preventDefault();
  const r = svg.getBoundingClientRect();
  const mx = ev.clientX - r.left;
  const my = ev.clientY - r.top;
  const before = {x: (mx - transform.x) / transform.k, y: (my - transform.y) / transform.k};
  const scale = Math.exp(-ev.deltaY * 0.0012);
  transform.k = Math.max(.22, Math.min(1.8, transform.k * scale));
  transform.x = mx - before.x * transform.k;
  transform.y = my - before.y * transform.k;
  render();
}, {passive: false});

function fit() {
  const pad = 70;
  const topPad = 125;
  const minX = Math.min(...nodes.map(n => n.x));
  const minY = Math.min(...nodes.map(n => n.y));
  const maxX = Math.max(...nodes.map(n => n.x + n.w));
  const maxY = Math.max(...nodes.map(n => n.y + n.h));
  const r = svg.getBoundingClientRect();
  const k = Math.min((r.width - pad * 2) / (maxX - minX), (r.height - topPad - pad) / (maxY - minY));
  transform.k = Math.max(.18, Math.min(1.25, k));
  transform.x = pad - minX * transform.k;
  transform.y = topPad - minY * transform.k;
  render();
}
function homeView() { transform = (typeof HOME !== 'undefined') ? {...HOME} : {x: 45, y: 100, k: .6}; render(); }
function focusNode(n) {
  const r = svg.getBoundingClientRect();
  transform.k = Math.max(.62, Math.min(1.15, transform.k));
  transform.x = r.width / 2 - (n.x + n.w / 2) * transform.k;
  transform.y = r.height / 2 - (n.y + n.h / 2) * transform.k;
  render();
}

const originalLayout = nodes.map(n => ({id: n.id, x: n.x, y: n.y}));
document.getElementById('fit').onclick = fit;
document.getElementById('sideToggle').onclick = () => {
  const app = document.getElementById('app');
  const wide = app.classList.toggle('side-wide');
  document.getElementById('sideToggle').textContent = wide ? 'Collapse' : 'Expand';
  requestAnimationFrame(render);
};
document.getElementById('reset').onclick = () => {
  for (const p of originalLayout) { const n = nodeById.get(p.id); n.x = p.x; n.y = p.y; }
  selected = null; selectedEdge = null; hideHelp(); detailIntro(); homeView();
};

function applyMeta() {
  document.title = META.title + ' - Gamentic';
  document.getElementById('metaTitle').textContent = META.title;
  document.getElementById('metaSub').innerHTML = META.subtitle + ' <a href="index.html">all docs</a>';
  document.getElementById('legend').innerHTML = (META.legend || []).map(l =>
    '<span class="pill"><i class="dot" style="background:' + l.color + '"></i>' + escapeHtml(l.label) + '</span>').join('');
}
function detailIntro() {
  document.getElementById('detailKind').textContent = INTRO.kind;
  document.getElementById('detailTitle').textContent = INTRO.title;
  document.getElementById('detailSummary').textContent = INTRO.summary;
  document.getElementById('detail').innerHTML = (INTRO.sections || []).map(s =>
    '<div class="section"><h3>' + s.h3 + '</h3>' + s.html + '</div>').join('');
}

applyMeta();
buildMarkers();
detailIntro();
homeView();
window.addEventListener('resize', render);
</script>
</body>
</html>
