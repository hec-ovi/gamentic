<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gamentic Atlas</title>
<style>
  :root {
    --bg: #070807;
    --surface: #101210;
    --surface-2: #151814;
    --surface-3: #1d211c;
    --line: #30362d;
    --line-soft: #222720;
    --text: #eef2e8;
    --muted: #aab4a3;
    --faint: #707b69;
    --green: #65d08b;
    --cyan: #62c8d8;
    --amber: #e7b75f;
    --pink: #e47ea5;
    --violet: #a895f2;
    --red: #ef756f;
    --blue: #7ba7ff;
    --shadow: rgba(0, 0, 0, .55);
  }

  * { box-sizing: border-box; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 13px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #app {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr minmax(330px, 390px);
    background:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
      var(--bg);
    background-size: 36px 36px;
  }
  #app.side-wide {
    grid-template-columns: 1fr 50vw;
  }

  #stageWrap {
    position: relative;
    min-width: 0;
    overflow: hidden;
  }

  #chart {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
    cursor: grab;
  }
  #chart.dragging { cursor: grabbing; }

  .topbar {
    position: absolute;
    left: 18px;
    top: 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    z-index: 4;
    pointer-events: none;
  }
  .title {
    background: rgba(16,18,16,.88);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 13px 10px;
    box-shadow: 0 12px 34px var(--shadow);
    max-width: 520px;
    pointer-events: auto;
  }
  .title h1 {
    margin: 0;
    font-size: 14px;
    font-weight: 760;
    letter-spacing: .2px;
  }
  .title p {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 12px;
  }
  .title a { color: var(--cyan); text-decoration: none; }
  .title a:hover { text-decoration: underline; }
  .legend {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    max-width: 420px;
    padding-top: 2px;
  }
  .pill {
    display: inline-flex;
    gap: 6px;
    align-items: center;
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(16,18,16,.8);
    color: var(--muted);
    font-size: 11px;
    box-shadow: 0 10px 28px var(--shadow);
  }
  .dot { width: 8px; height: 8px; border-radius: 99px; display: inline-block; }

  .controls {
    position: absolute;
    left: 18px;
    bottom: 16px;
    display: flex;
    gap: 8px;
    z-index: 4;
  }
  button {
    border: 1px solid var(--line);
    background: rgba(16,18,16,.9);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font: 650 11px ui-sans-serif, system-ui, sans-serif;
    cursor: pointer;
  }
  button:hover { background: var(--surface-2); border-color: #46513f; }

  #tip {
    position: absolute;
    z-index: 6;
    width: min(320px, calc(100vw - 24px));
    display: none;
    border: 1px solid #3a4435;
    border-radius: 9px;
    padding: 9px 10px;
    background: rgba(9, 11, 9, .97);
    box-shadow: 0 18px 42px var(--shadow);
    color: var(--muted);
    pointer-events: none;
  }
  #tip strong {
    display: block;
    margin-bottom: 4px;
    color: var(--text);
    font-size: 12px;
  }
  #tip p { margin: 0; }

  #side {
    border-left: 1px solid var(--line);
    background: rgba(11, 13, 10, .96);
    box-shadow: -22px 0 50px var(--shadow);
    display: grid;
    grid-template-rows: auto 1fr;
    min-width: 0;
    min-height: 0;
    z-index: 5;
  }
  .sideHead {
    padding: 16px 17px 13px;
    border-bottom: 1px solid var(--line);
  }
  .sideTop {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
  }
  .sideToggle {
    flex: 0 0 auto;
    padding: 6px 8px;
    border-radius: 7px;
  }
  .sideHead .eyebrow {
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 10px;
    font-weight: 800;
  }
  .sideHead h2 {
    margin: 5px 0 0;
    font-size: 16px;
    line-height: 1.2;
  }
  .sideHead p {
    margin: 7px 0 0;
    color: var(--muted);
    font-size: 12px;
  }
  #detail {
    overflow: auto;
    min-height: 0;
    padding: 14px 17px 22px;
  }
  .section {
    margin: 0 0 14px;
    padding: 12px;
    border: 1px solid var(--line-soft);
    background: rgba(21, 24, 20, .74);
    border-radius: 10px;
  }
  .section h3 {
    margin: 0 0 8px;
    color: var(--text);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .9px;
  }
  .section p {
    margin: 0;
    color: var(--muted);
  }
  .kv {
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 7px 10px;
    font-size: 12px;
  }
  .k { color: var(--faint); }
  .v { color: var(--text); }
  ul {
    margin: 0;
    padding-left: 17px;
    color: var(--muted);
  }
  li { margin: 3px 0; }
  .code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    color: #d9e5d1;
  }
  .jsonbox {
    margin: 0;
    padding: 10px;
    overflow: visible;
    border: 1px solid #2b3329;
    border-radius: 8px;
    background: #090b09;
    color: #d9e5d1;
    font: 11px/1.48 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    tab-size: 2;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .jsonbox .jkey { color: var(--green); }
  .jsonbox .jstr { color: var(--amber); }
  .jsonbox .jnum { color: var(--cyan); }
  .jsonbox .jbool { color: var(--violet); }
  .jsonbox .jnull { color: var(--red); }
  .jsonbox .jobj { color: #8fdc89; font-weight: 800; }
  .jsonbox .jarr { color: #78d4e2; font-weight: 800; }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .chip {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 3px 7px;
    color: var(--muted);
    background: rgba(0,0,0,.16);
    font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  .node rect.main {
    stroke-width: 1.3;
    rx: 12;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,.42));
  }
  .node text { user-select: none; pointer-events: none; }
  .node .label { font-weight: 760; font-size: 13px; fill: var(--text); }
  .node .sub { font-size: 11px; fill: var(--muted); }
  .node .kind { font-size: 9px; font-weight: 850; letter-spacing: 1.1px; text-transform: uppercase; }
  .node.selected rect.main { stroke-width: 2.4; }
  .node.dim { opacity: .28; }
  .node.connected { opacity: 1; }
  .node { cursor: pointer; }

  .edge {
    fill: none;
    stroke-width: 2.1;
    stroke-linecap: round;
    opacity: .46;
    cursor: pointer;
  }
  .edge.dim { opacity: .13; }
  .edge.selected { opacity: 1; stroke-width: 3.4; }
  .edgePort {
    fill: rgba(7,8,7,.88);
    stroke-width: 1.6;
    pointer-events: none;
  }
  .edgePort.dim { opacity: .13; }
  .edgePortText {
    fill: var(--faint);
    font: 8px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    text-transform: uppercase;
    letter-spacing: .4px;
    paint-order: stroke;
    stroke: rgba(7,8,7,.9);
    stroke-width: 3px;
    pointer-events: none;
    user-select: none;
  }
  .edgePortText.dim { opacity: .13; }
  .edgeLabel {
    font-size: 10px;
    fill: var(--muted);
    opacity: .62;
    paint-order: stroke;
    stroke: rgba(7,8,7,.82);
    stroke-width: 4px;
    stroke-linejoin: round;
    pointer-events: none;
    user-select: none;
  }
  .edgeLabel.hidden { opacity: 0; }
  .edgeLabel.dim { opacity: .18; }

  .laneLabel {
    font-size: 11px;
    font-weight: 850;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    fill: var(--faint);
    pointer-events: none;
  }
  .laneLine {
    stroke: rgba(170,180,163,.16);
    stroke-width: 1;
    stroke-dasharray: 5 8;
    pointer-events: none;
  }

  .helpBtn rect {
    fill: rgba(7,8,7,.72);
    stroke: var(--line);
    rx: 6;
  }
  .helpBtn text {
    font: 850 8px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    pointer-events: none;
  }
  .helpBtn:hover rect { stroke: #64715d; fill: rgba(24,28,22,.95); }

  @media (max-width: 960px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 1fr 42vh; }
    #app.side-wide { grid-template-columns: 1fr; grid-template-rows: 1fr 50vh; }
    #side { border-left: 0; border-top: 1px solid var(--line); }
    .topbar { right: 12px; }
    .legend { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <main id="stageWrap">
    <div class="topbar">
      <div class="title">
        <h1 id="metaTitle">Atlas</h1>
        <p id="metaSub"></p>
      </div>
      <div class="legend" id="legend" aria-hidden="true"></div>
    </div>
    <svg id="chart" role="img" aria-label="Gamentic atlas">
      <defs id="defs"></defs>
      <g id="viewport">
        <g id="lanes"></g>
        <g id="edges"></g>
        <g id="labels"></g>
        <g id="nodes"></g>
      </g>
    </svg>
    <div id="tip"></div>
    <div class="controls">
      <button id="fit">Fit</button>
      <button id="reset">Reset layout</button>
    </div>
  </main>
  <aside id="side">
    <div class="sideHead">
      <div class="sideTop">
        <div class="eyebrow" id="detailKind">Selected</div>
        <button class="sideToggle" id="sideToggle">Expand</button>
      </div>
      <h2 id="detailTitle">Click a node</h2>
      <p id="detailSummary">The right panel explains lifecycle, population, mutation points, and IN/OUT usage.</p>
    </div>
    <div id="detail"></div>
  </aside>
</div>

<script>
// ===== Gamentic INFRA atlas — docker topology (docker-compose.yml + up.sh) =====
const META = {
  title: 'Infra Atlas',
  subtitle: 'The Docker stack: 9 services, one bridge network, the ANNA boolean that picks the world.',
  legend: [
    {color: 'var(--green)', label: 'brain'},
    {color: 'var(--blue)', label: 'edge'},
    {color: 'var(--amber)', label: 'local inference'},
    {color: 'var(--violet)', label: 'anna'},
    {color: 'var(--cyan)', label: 'host / config'},
  ],
};
const SECTIONS = [
  {label: 'Lifecycle / profile', field: 'lifecycle', type: 'text'},
  {label: 'Config / env / ports', field: 'populated', type: 'list'},
  {label: 'Defined in', field: 'mutators', type: 'list'},
  {label: 'Talks to / mounts', field: 'reads', type: 'list'},
];
const C = {brain: '#65d08b', edge: '#7ba7ff', inference: '#e7b75f', anna: '#a895f2', host: '#62c8d8', infra: '#aab4a3'};
const NODE_FILL = {brain: '#121812', edge: '#111521', inference: '#171410', anna: '#161322', host: '#101718', infra: '#14160f'};
const EDGE_KIND = {talks: '#62c8d8', depends: '#e7b75f', mount: '#65d08b', profile: '#a895f2', config: '#e47ea5', net: '#707b69'};
const FLOW_KIND = 'talks';
const HOME = {x: 60, y: 90, k: .4};

const nodes = [
  // --- host & config ---
  {id: 'env', kind: 'host', x: 80, y: 90, w: 230, h: 96, label: '.env', sub: 'single config layer',
    summary: 'The only config layer. The setup faces (gamentic-setup / setup.html) write it; compose reads it on the next up.',
    lifecycle: 'Read at every compose up; never baked into an image.',
    populated: ['ANNA=true|false (literal only)', 'COMPOSE_PROFILES pin', 'MODELS_DIR, *_PORT, *_GID', 'LLM_TEXT_MODEL / LLM_VOICE_MODEL', 'TEXT_/IMAGE_/AUDIO_ provider knobs', 'ANNA_BASE_URL / ANNA_API_KEY'],
    mutators: ['infra/setup/schema.js -> cli.py + setup.html', '.env.example is generated from the schema'],
    reads: ['docker-compose.yml interpolation', 'up.sh (reads ANNA)', 'orchestrator env'],
    note: 'ANNA must be the literal true or false: any other value starts NO inference services (compose matches no profile).',
    json: {ANNA: 'true | false', COMPOSE_PROFILES: 'local-inference-anna-false,anna-agent-anna-true', MODELS_DIR: '/home/.../gguf', ORCHESTRATOR_PORT: 8000, FRONTEND_PORT: 5173},
    help: {what: 'The single source of configuration.', how: 'Schema-generated; literal-true/false ANNA; survives unknown keys verbatim.'}},
  {id: 'upsh', kind: 'host', x: 400, y: 90, w: 230, h: 96, label: 'up.sh', sub: 'mode-aware launcher',
    summary: 'Wraps docker compose: reads ANNA, retires the other mode\'s leftovers, then up -d --build.',
    lifecycle: 'Run by the operator: ./up.sh  (./up.sh down to stop).',
    populated: ['mode = anna if ANNA=true else local', 'refuses non-literal ANNA loudly', 'ALL_PROFILES for cross-mode cleanup'],
    mutators: ['up.sh'],
    reads: ['.env (ANNA)', 'docker compose'],
    note: 'Compose alone cannot clean up the OTHER mode\'s containers on a flip; up.sh does that one extra thing.',
    json: {run: './up.sh', down: './up.sh down', refuses: 'ANNA not in {true,false}'},
    help: {what: 'The launcher.', how: 'docker compose up -d --build, plus cross-mode container cleanup.'}},
  {id: 'profiles', kind: 'host', x: 720, y: 90, w: 250, h: 96, label: 'COMPOSE_PROFILES', sub: 'the inverted-profile trick',
    summary: 'Service selection by profile: local services carry local-inference-anna-<ANNA>; anna services carry anna-agent-anna-<ANNA>.',
    lifecycle: 'Evaluated by compose at up using .env.',
    populated: ['.env pins: local-inference-anna-false , anna-agent-anna-true', 'ANNA=false -> local names match -> full local stack', 'ANNA=true -> anna names match -> orchestrator+frontend+anna-agent+anna-api'],
    mutators: ['docker-compose.yml profiles: on each service', '.env COMPOSE_PROFILES'],
    reads: ['ANNA boolean'],
    note: 'Expansion not restriction: flip ANNA and the same up command restores the other world.',
    json: {local_services: 'profiles: ["local-inference-anna-${ANNA}"]', anna_services: 'profiles: ["anna-agent-anna-${ANNA}"]', pin: 'local-inference-anna-false,anna-agent-anna-true'},
    help: {what: 'How one boolean swaps the whole backend.', how: 'Profile names interpolate ANNA; only the matching set starts.'}},
  {id: 'net', kind: 'infra', x: 1030, y: 90, w: 210, h: 96, label: 'gamentic network', sub: 'bridge',
    summary: 'The single user-defined bridge network. Every service joins it and resolves peers by container name.',
    lifecycle: 'Created with the project.',
    populated: ['driver: bridge', 'DNS by container_name (gamentic-llm-text, gamentic-image-api, ...)'],
    mutators: ['docker-compose.yml networks: gamentic'],
    reads: ['all 9 services'],
    note: 'Internal URLs use container names + INTERNAL ports (e.g. voice-api is :8080 inside, :9002 on the host).',
    json: {networks: {gamentic: {driver: 'bridge'}}},
    help: {what: 'The container network.', how: 'Bridge; name-based service discovery.'}},
  {id: 'vols', kind: 'infra', x: 1300, y: 90, w: 230, h: 96, label: 'volumes & mounts', sub: 'persistent state',
    summary: 'Host-mounted state so nothing important lives inside a container. Mostly bind mounts; only anna-data is a named volume.',
    lifecycle: 'Persist across rebuilds; data dirs gitignored.',
    populated: ['MODELS_DIR -> /models :ro (bind, gguf)', 'COMFY_MODELS_DIR + infra/comfyui/data (bind)', 'voice-api/data (bind)', 'orchestrator/data: db + /media (bind)', 'anna-data (NAMED: anna-agent_anna-data)'],
    mutators: ['docker-compose.yml volumes: + per-service mounts'],
    reads: ['the services that mount them'],
    note: 'The single host dir infra/comfyui/data/output is mounted into BOTH image (writes) and image-api (serves+reclaims). Only anna-data is a named volume, aliased to the standalone agent project so a sign-in carries over.',
    json: {anna_data: {name: 'anna-agent_anna-data'}, models: '${MODELS_DIR}:/models:ro (bind)', orch: './orchestrator/data:/data (bind)'},
    help: {what: 'Where state lives.', how: 'Bind mounts + one named volume; models read-only.'}},

  // --- app tier (always up) ---
  {id: 'frontend', kind: 'edge', x: 340, y: 330, w: 240, h: 96, label: 'frontend', sub: 'nginx + vanilla SPA',
    summary: 'nginx serving the no-build SPA; reverse-proxies /image /voice /audio same-origin so relative media URLs resolve.',
    lifecycle: 'Always up (no profile). depends_on orchestrator.',
    populated: ['port ${FRONTEND_PORT:-5173}:80', 'build ./frontend', 'image gamentic-frontend'],
    mutators: ['docker-compose.yml service frontend', './frontend/Dockerfile'],
    reads: ['orchestrator (REST+SSE, CORS)', 'nginx /image -> image-api, /voice + /audio -> voice-api, /media -> orchestrator'],
    note: 'Talks to the orchestrator cross-origin; media is reached through the same-origin nginx proxy (resolver 127.0.0.11, lazy upstreams, so nginx starts even if a media service is down).',
    json: {container: 'gamentic-frontend', ports: ['5173:80'], depends_on: ['orchestrator']},
    help: {what: 'The browser app server.', how: 'Static SPA + media reverse-proxy.'}},
  {id: 'orchestrator', kind: 'brain', x: 700, y: 330, w: 250, h: 110, label: 'orchestrator', sub: 'the game brain',
    summary: 'FastAPI brain: the REST+SSE API and the turn engine. Talks to inference services by container name.',
    lifecycle: 'Always up (no profile). Holds state in ./orchestrator/data.',
    populated: ['port ${ORCHESTRATOR_PORT:-8000}:8000', 'LLM_BASE_URL=http://gamentic-llm-text:8080/v1', 'IMAGE_API_URL=http://gamentic-image-api:9001', 'VOICE_API_URL=http://gamentic-voice-api:8080', 'ANNA_BASE_URL=http://gamentic-anna-api:9100', 'DB_PATH=/data/gamentic.db', 'ANNA + TEXT_/IMAGE_/AUDIO_ provider knobs'],
    mutators: ['docker-compose.yml service orchestrator', './orchestrator (build)', 'app/config.py defaults'],
    reads: ['llm-text (required:false)', 'anna-api (required:false)', 'image-api + voice-api best-effort'],
    note: 'depends_on uses required:false so each mode only waits for the backend it actually uses.',
    json: {container: 'gamentic-orchestrator', ports: ['8000:8000'], volumes: ['./orchestrator/data:/data'], depends_on: {'llm-text': 'required:false', 'anna-api': 'required:false'}},
    help: {what: 'The brain container.', how: 'FastAPI; talks to peers by name; one DB on a host mount.'}},

  // --- local inference (ANNA=false) ---
  {id: 'llmtext', kind: 'inference', x: 120, y: 620, w: 240, h: 110, label: 'llm-text', sub: 'Gemma 4 26B-A4B MoE',
    summary: 'The text model: Gemma 4 26B-A4B Heretic (Q4) on llama.cpp server, Vulkan backend (AMD Strix Halo).',
    lifecycle: 'Profile local-inference-anna-<ANNA>. Up only when ANNA=false.',
    populated: ['image ghcr.io/ggml-org/llama.cpp:server-vulkan', 'port ${LLM_TEXT_PORT:-8080}:8080', 'devices /dev/dri ; group_add RENDER/VIDEO gid', '--ctx-size 131072 (128K native) --parallel 1 --jinja  (.env; compose fallback 32768/4)', 'enable_thinking:false (Gemma hybrid)'],
    mutators: ['docker-compose.yml service llm-text'],
    reads: ['MODELS_DIR /models:ro'],
    note: 'A hybrid thinking model: thinking is disabled globally for roleplay output speed.',
    json: {container: 'gamentic-llm-text', ports: ['8080:8080'], model: '/models/${LLM_TEXT_MODEL}', alias: 'gemma-4-26b-a4b-heretic'},
    help: {what: 'The local LLM server.', how: 'llama.cpp Vulkan, GPU layers 99, ctx 128k.'}},
  {id: 'image', kind: 'inference', x: 440, y: 560, w: 240, h: 100, label: 'image (ComfyUI)', sub: 'FLUX.2 klein on ROCm',
    summary: 'ComfyUI (ROCm / TheRock) running FLUX.2 [klein] 4B distilled. Full GPU access on Strix Halo.',
    lifecycle: 'Profile local-inference-anna-<ANNA>. Up only when ANNA=false.',
    populated: ['build ./infra/comfyui', 'privileged ; /dev/kfd + /dev/dri', 'port ${COMFY_PORT:-8188}:8188', 'HSA_OVERRIDE_GFX_VERSION=11.5.1, SDMA=0, SVM=0'],
    mutators: ['docker-compose.yml service image', 'infra/comfyui/Dockerfile + entrypoint.sh'],
    reads: ['COMFY_MODELS_DIR + infra/comfyui/data/*'],
    note: 'Stability env on unified memory avoids VAE-decode checkerboard / ring timeouts.',
    json: {container: 'gamentic-image', ports: ['8188:8188'], image: 'gamentic-comfyui-strix:latest'},
    help: {what: 'The diffusion engine.', how: 'ComfyUI on ROCm; privileged GPU.'}},
  {id: 'imageapi', kind: 'inference', x: 440, y: 740, w: 240, h: 100, label: 'image-api', sub: 'REST adapter (no GPU)',
    summary: 'Thin REST adapter: turns POST /image/generate -> {image_url} into a ComfyUI prompt graph.',
    lifecycle: 'Profile local-inference-anna-<ANNA>. depends_on image (healthy).',
    populated: ['build ./infra/image-api', 'port ${IMAGE_API_PORT:-9001}:9001', 'COMFY_URL=http://gamentic-image:8188', 'IMAGE_DEFAULT_* + per-view char sizes'],
    mutators: ['docker-compose.yml service image-api', 'infra/image-api/app/*'],
    reads: ['image (ComfyUI) :8188', 'infra/comfyui/data/output (reclaim copies)'],
    note: 'Mounts the Comfy output dir so DELETE endpoints reclaim files the instant the orchestrator owns its copy.',
    json: {container: 'gamentic-image-api', ports: ['9001:9001'], depends_on: {image: 'service_healthy'}},

  {id: 'llmvoice', kind: 'inference', x: 880, y: 560, w: 240, h: 100, label: 'llm-voice', sub: 'Maya1-3B (SNAC tokens)',

const FALLBACK_COLORS = Object.values(C);

function colorFor(kind) { return C[kind] || FALLBACK_COLORS[0]; }
function edgeColor(kind) { return (typeof EDGE_KIND !== 'undefined' && EDGE_KIND[kind]) || C[kind] || 'var(--muted)'; }
function nodeFill(kind) { return (typeof NODE_FILL !== 'undefined' && NODE_FILL[kind]) || '#171410'; }

const _markerId = {};
function buildMarkers() {
  const colors = [...new Set(edges.map(e => edgeColor(e.kind)))];
  let html = '';
  colors.forEach((c, i) => {
    const id = 'arrow' + i;
    _markerId[c] = id;
    html += '<marker id="' + id + '" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L13,6.5 L0,13 z" fill="' + c + '"></path></marker>';
  });
  defs.innerHTML = html;
}
function markerFor(kind) { return 'url(#' + (_markerId[edgeColor(kind)] || 'arrow0') + ')'; }

function center(n) { return {x: n.x + n.w / 2, y: n.y + n.h / 2}; }
function boundaryPoint(a, b) {
  const ac = center(a), bc = center(b);
  const dx = bc.x - ac.x, dy = bc.y - ac.y;
  const sx = Math.abs(dx) / (a.w / 2);
  const sy = Math.abs(dy) / (a.h / 2);
  const s = Math.max(sx, sy) || 1;
  return {x: ac.x + dx / s, y: ac.y + dy / s};
}
function edgeEndpoints(e) {
  const a = nodeById.get(e.from), b = nodeById.get(e.to);
  return {from: boundaryPoint(a, b), to: boundaryPoint(b, a)};
}
function pathFor(e) {
  const {from: p1, to: p2} = edgeEndpoints(e);
  const dx = Math.abs(p2.x - p1.x);
  const bend = Math.max(40, Math.min(170, dx * .42));
  const c1 = {x: p1.x + Math.sign(p2.x - p1.x || 1) * bend, y: p1.y};
  const c2 = {x: p2.x - Math.sign(p2.x - p1.x || 1) * bend, y: p2.y};
  return 'M ' + p1.x + ' ' + p1.y + ' C ' + c1.x + ' ' + c1.y + ', ' + c2.x + ' ' + c2.y + ', ' + p2.x + ' ' + p2.y;
}
function edgeVector(e) {
  const {from, to} = edgeEndpoints(e);
  const dx = to.x - from.x;
  const dy = to.y - from.y;
  const len = Math.hypot(dx, dy) || 1;
  return {from, to, ux: dx / len, uy: dy / len, nx: -dy / len, ny: dx / len};
}
function labelPos(e) {
  const a = center(nodeById.get(e.from));
  const b = center(nodeById.get(e.to));
  const ep = edgeVector(e);
  const offset = 42;
  return {x: (a.x + b.x) / 2 + ep.nx * offset, y: (a.y + b.y) / 2 + ep.ny * offset - 7};
}

    inRing.setAttribute('class', 'edgePort' + (active ? '' : ' dim'));

    label.setAttribute('y', lp.y);
    label.setAttribute('text-anchor', 'middle');

    labelG.appendChild(label);

    if (showLabel) {
      const outText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      outText.setAttribute('class', 'edgePortText' + (active ? '' : ' dim'));
      outText.setAttribute('x', v.from.x + v.ux * 26 + v.nx * 15);
      outText.setAttribute('y', v.from.y + v.uy * 26 + v.ny * 15);
      outText.setAttribute('text-anchor', 'middle');

      labelG.appendChild(outText);

    g.addEventListener('pointermove', ev => {
      if (!draggingNode || draggingNode.id !== n.id) return;
      const p = screenToWorld(ev);
      const dx = p.x - draggingNode.start.x;

      n.x = draggingNode.ox + dx;
      n.y = draggingNode.oy + dy;
      render();
    });
    g.addEventListener('pointerup', ev => {
      if (!draggingNode || draggingNode.id !== n.id) return;
      const moved = draggingNode.moved;
      draggingNode = null;
      if (!moved) selectNode(n.id);
    });
    g.addEventListener('dblclick', ev => { ev.stopPropagation(); selectNode(n.id); focusNode(n); });
    nodeG.appendChild(g);

function relatedSet() {
  const set = {nodes: new Set(), edges: new Set()};
  if (!selected) {
    nodes.forEach(n => set.nodes.add(n.id));
    edges.forEach((_, i) => set.edges.add(i));
    return set;
  }
  set.nodes.add(selected);
  edges.forEach((e, i) => {
    if (e.from === selected || e.to === selected) {
      set.edges.add(i);
      set.nodes.add(e.from);
      set.nodes.add(e.to);
    }
  });
  return set;
}

function selectNode(id) { hideHelp(); selected = id; selectedEdge = null; detailNode(nodeById.get(id)); render(); }
function selectEdge(i) { hideHelp(); selectedEdge = i; selected = null; detailEdge(edges[i]); render(); }

function list(items) {
  if (!items || !items.length) return '<p>None.</p>';
  return '<ul>' + items.map(x => '<li>' + escapeHtml(x) + '</li>').join('') + '</ul>';
}
function chips(items) {
  if (!items || !items.length) return '<p>None.</p>';
  return '<div class="chips">' + items.map(x => '<span class="chip">' + escapeHtml(x) + '</span>').join('') + '</div>';
}
function nodeFlowSummary(id) {
  const incoming = edges.filter(e => e.to === id).map(e => e.from + ': ' + e.label);
  const outgoing = edges.filter(e => e.from === id).map(e => e.to + ': ' + e.label);
  return {incoming: incoming.length ? incoming : ['none'], outgoing: outgoing.length ? outgoing : ['none']};
}

function showHelp(ev, n, kind) {
  const h = (typeof NODE_HELP !== 'undefined' && NODE_HELP[n.id]) || {};
  let title = 'What is?';
  let body = h.what || n.summary;
  if (kind === 'how') { title = 'How works?'; body = h.how || n.lifecycle || n.summary; }
  else if (kind === 'io') {
    title = 'Info in / out';
    const flow = nodeFlowSummary(n.id);
    body = 'IN: ' + flow.incoming.slice(0, 3).join('; ') + '. OUT: ' + flow.outgoing.slice(0, 3).join('; ') + '.';
  }
  tip.innerHTML = '<strong>' + escapeHtml(n.label) + ' - ' + escapeHtml(title) + '</strong><p>' + escapeHtml(body) + '</p>';
  const wrap = document.getElementById('stageWrap').getBoundingClientRect();
  const x = Math.min(ev.clientX - wrap.left + 12, wrap.width - 332);
  const y = Math.min(ev.clientY - wrap.top + 12, wrap.height - 120);
  tip.style.left = Math.max(10, x) + 'px';
  tip.style.top = Math.max(10, y) + 'px';
  tip.style.display = 'block';
}
function hideHelp() { tip.style.display = 'none'; }

function highlightJson(value) {
  const json = JSON.stringify(value, null, 2);
  return json.replace(/("(?:\\.|[^"\\])*")(\s*:)?|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?|\btrue\b|\bfalse\b|\bnull\b|[{}\[\]]/g, (match, str, colon) => {
    if (str) {
      const cls = colon ? 'jkey' : 'jstr';
      return '<span class="' + cls + '">' + escapeHtml(str) + '</span>' + escapeHtml(colon || '');
    }
    if (match === '{' || match === '}') return '<span class="jobj">' + match + '</span>';
    if (match === '[' || match === ']') return '<span class="jarr">' + match + '</span>';
    if (match === 'true' || match === 'false') return '<span class="jbool">' + match + '</span>';
    if (match === 'null') return '<span class="jnull">null</span>';
    return '<span class="jnum">' + match + '</span>';
  });
}
function jsonBlock(value) { return '<pre class="jsonbox">' + highlightJson(value) + '</pre>'; }

function nodeJson(n) {
  if (typeof NODE_JSON !== 'undefined' && NODE_JSON[n.id]) return NODE_JSON[n.id];
  return n.json || {[n.id]: n.summary};
}
function payloadForEdge(e) { return {flow: 'object passed ' + e.from + ' -> ' + e.to, contract: e.label, kind: e.kind}; }
function edgeJson(e) {
  return {edge: {from: e.from, to: e.to, kind: e.kind, label: e.label, payload: payloadForEdge(e), source_shape: nodeJson(nodeById.get(e.from)), target_shape: nodeJson(nodeById.get(e.to))}};
}

function detailNode(n) {
  document.getElementById('detailKind').textContent = n.kind;
  document.getElementById('detailTitle').textContent = n.label;
  document.getElementById('detailSummary').textContent = n.summary;
  let html = '<div class="section"><h3>JSON shape</h3>' + jsonBlock(nodeJson(n)) + '</div>';
  for (const s of SECTIONS) {
    const v = n[s.field];
    const body = s.type === 'text' ? ('<p>' + escapeHtml(v || '-') + '</p>') : list(v);
    html += '<div class="section"><h3>' + s.label + '</h3>' + body + '</div>';
  }
  html += '<div class="section"><h3>Key point</h3><p>' + escapeHtml(n.note || '-') + '</p></div>';
  html += '<div class="section"><h3>Connected edges</h3>' + chips(edges.filter(e => e.from === n.id || e.to === n.id).map(e => e.from + ' -> ' + e.to + ': ' + e.label)) + '</div>';
  document.getElementById('detail').innerHTML = html;
}
function detailEdge(e) {
  document.getElementById('detailKind').textContent = e.kind + ' edge';
  document.getElementById('detailTitle').textContent = nodeById.get(e.from).label + ' -> ' + nodeById.get(e.to).label;
  document.getElementById('detailSummary').textContent = e.detail;
  document.getElementById('detail').innerHTML =
    '<div class="section"><h3>JSON edge</h3>' + jsonBlock(edgeJson(e)) + '</div>' +
    '<div class="section"><h3>Direction</h3><p><span class="code">' + escapeHtml(e.from) + '</span> sends <span class="code">' + escapeHtml(e.label) + '</span> into <span class="code">' + escapeHtml(e.to) + '</span>. Dot = OUT. Ring + arrowhead = IN.</p></div>' +
    '<div class="section"><h3>Meaning</h3><p>' + escapeHtml(e.detail) + '</p></div>' +
    '<div class="section"><h3>Source</h3><p><span class="code">' + escapeHtml(e.from) + '</span> - ' + escapeHtml(nodeById.get(e.from).summary) + '</p></div>' +
    '<div class="section"><h3>Target</h3><p><span class="code">' + escapeHtml(e.to) + '</span> - ' + escapeHtml(nodeById.get(e.to).summary) + '</p></div>';
}

function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }
function screenToWorld(ev) {
  const r = svg.getBoundingClientRect();
  return {x: (ev.clientX - r.left - transform.x) / transform.k, y: (ev.clientY - r.top - transform.y) / transform.k};
}
function isInteractiveTarget(target) { return target && target.closest && (target.closest('.node') || target.classList.contains('edge')); }

svg.addEventListener('pointerdown', ev => {
  if (isInteractiveTarget(ev.target)) return;
  hideHelp();
  panning = true;
  panStart = {x: ev.clientX, y: ev.clientY, tx: transform.x, ty: transform.y};
  svg.classList.add('dragging');
});
svg.addEventListener('pointermove', ev => {
  if (!panning) return;
  transform.x = panStart.tx + ev.clientX - panStart.x;
  transform.y = panStart.ty + ev.clientY - panStart.y;
  render();
});
svg.addEventListener('pointerup', () => { panning = false; svg.classList.remove('dragging'); });
svg.addEventListener('pointerleave', () => { panning = false; svg.classList.remove('dragging'); });
svg.addEventListener('click', ev => {
  if (isInteractiveTarget(ev.target)) return;
  selected = null; selectedEdge = null; hideHelp(); detailIntro(); render();
});
svg.addEventListener('wheel', ev => {
  ev.preventDefault();
  const r = svg.getBoundingClientRect();
  const mx = ev.clientX - r.left;
  const my = ev.clientY - r.top;
  const before = {x: (mx - transform.x) / transform.k, y: (my - transform.y) / transform.k};
  const scale = Math.exp(-ev.deltaY * 0.0012);
  transform.k = Math.max(.22, Math.min(1.8, transform.k * scale));
  transform.x = mx - before.x * transform.k;
  transform.y = my - before.y * transform.k;
  render();
}, {passive: false});

function fit() {
  const pad = 70;
  const topPad = 125;
  const minX = Math.min(...nodes.map(n => n.x));
  const minY = Math.min(...nodes.map(n => n.y));
  const maxX = Math.max(...nodes.map(n => n.x + n.w));
  const maxY = Math.max(...nodes.map(n => n.y + n.h));
  const r = svg.getBoundingClientRect();
  const k = Math.min((r.width - pad * 2) / (maxX - minX), (r.height - topPad - pad) / (maxY - minY));
  transform.k = Math.max(.18, Math.min(1.25, k));
  transform.x = pad - minX * transform.k;
  transform.y = topPad - minY * transform.k;
  render();
}
function homeView() { transform = (typeof HOME !== 'undefined') ? {...HOME} : {x: 45, y: 100, k: .6}; render(); }
function focusNode(n) {
  const r = svg.getBoundingClientRect();
  transform.k = Math.max(.62, Math.min(1.15, transform.k));
  transform.x = r.width / 2 - (n.x + n.w / 2) * transform.k;
  transform.y = r.height / 2 - (n.y + n.h / 2) * transform.k;
  render();
}

const originalLayout = nodes.map(n => ({id: n.id, x: n.x, y: n.y}));
document.getElementById('fit').onclick = fit;
document.getElementById('sideToggle').onclick = () => {
  const app = document.getElementById('app');
  const wide = app.classList.toggle('side-wide');
  document.getElementById('sideToggle').textContent = wide ? 'Collapse' : 'Expand';
  requestAnimationFrame(render);
};
document.getElementById('reset').onclick = () => {
  for (const p of originalLayout) { const n = nodeById.get(p.id); n.x = p.x; n.y = p.y; }
  selected = null; selectedEdge = null; hideHelp(); detailIntro(); homeView();
};

function applyMeta() {
  document.title = META.title + ' - Gamentic';
  document.getElementById('metaTitle').textContent = META.title;
  document.getElementById('metaSub').innerHTML = META.subtitle + ' <a href="index.html">all docs</a>';
  document.getElementById('legend').innerHTML = (META.legend || []).map(l =>
    '<span class="pill"><i class="dot" style="background:' + l.color + '"></i>' + escapeHtml(l.label) + '</span>').join('');
}
function detailIntro() {
  document.getElementById('detailKind').textContent = INTRO.kind;
  document.getElementById('detailTitle').textContent = INTRO.title;
  document.getElementById('detailSummary').textContent = INTRO.summary;
  document.getElementById('detail').innerHTML = (INTRO.sections || []).map(s =>
    '<div class="section"><h3>' + s.h3 + '</h3>' + s.html + '</div>').join('');
}

applyMeta();
buildMarkers();
detailIntro();
homeView();
window.addEventListener('resize', render);
</script>
</body>
</html>
